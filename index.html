// ===== INFLUENCE SCORE → NODE RADIUS =====
NODES.forEach(n => {
  n.influence = LINKS.filter(l => l.s === n.id).reduce((sum, l) => sum + l.w, 0);
});
const maxInfluence = Math.max(...NODES.map(n => n.influence));
const rScale = d3.scaleSqrt().domain([0, maxInfluence]).range([28, 112]);
NODES.forEach(n => { n.r = Math.max(28, rScale(n.influence)); });

// ===== CATEGORY COLORS =====
const CAT_COLOR = {
  roots:      "#888",
  early_elec: "#5C7CFA",
  synthpop:   "#845EF7",
  industrial: "#607080",
  ambient:    "#607D8B",
  house:      "#9C27B0",
  techno:     "#1565C0",
  trance:     "#00838F",
  hardcore:   "#C62828",
  dnb:        "#E65100",
  dubstep:    "#5D4037",
  eurodance:  "#AD1457",
  edm:        "#F57F17",
  synthwave:  "#6A1B9A",
  hiphop:     "#2E7D32",
  chiptune:   "#00695C",
};

// ===== GRAPH SETUP =====
const svg = d3.select("#graph");
const w = window.innerWidth, h = window.innerHeight;
const g = svg.append("g");

svg.call(d3.zoom().scaleExtent([0.05, 6]).on("zoom", e => g.attr("transform", e.transform)));

// arrow markers per category
Object.entries(CAT_COLOR).forEach(([cat, color]) => {
  svg.append("defs").append("marker")
    .attr("id", `arrow-${cat}`)
    .attr("viewBox", "0 -4 8 8")
    .attr("refX", 8).attr("refY", 0)
    .attr("markerWidth", 5).attr("markerHeight", 5)
    .attr("orient", "auto")
    .append("path")
    .attr("d", "M0,-4L8,0L0,4")
    .attr("fill", color)
    .attr("opacity", 0.7);
});

const nodeMap = Object.fromEntries(NODES.map(n => [n.id, n]));

const linkData = LINKS.map(l => ({...l, source: l.s, target: l.t}));

const simulation = d3.forceSimulation(NODES)
  .force("link", d3.forceLink(linkData).id(d=>d.id).distance(d => 280 - d.w * 0.8).strength(0.3))
  .force("charge", d3.forceManyBody().strength(-900))
  .force("center", d3.forceCenter(w/2, h/2))
  .force("collision", d3.forceCollide(d => d.r + 20))
  .alphaDecay(0.02);

const link = g.append("g").selectAll("line")
  .data(linkData)
  .join("line")
  .attr("class", "link")
  .attr("stroke", d => CAT_COLOR[nodeMap[d.s]?.cat] || "#555")
  .attr("stroke-width", d => 0.5 + d.w / 60)
  .attr("marker-end", d => `url(#arrow-${nodeMap[d.s]?.cat || "roots"})`);

// edge label group: background rect + text
const linkLabelG = g.append("g").selectAll("g")
  .data(linkData)
  .join("g");

linkLabelG.append("rect")
  .attr("class", "link-label-bg")
  .attr("rx", 3).attr("ry", 3)
  .attr("width", 48).attr("height", 24)
  .attr("x", -24).attr("y", -15);

linkLabelG.append("text")
  .attr("class", "link-label")
  .attr("text-anchor", "middle")
  .attr("dominant-baseline", "central")
  .text(d => d.w + "%");

const node = g.append("g").selectAll("g")
  .data(NODES)
  .join("g")
  .attr("class", "node")
  .call(d3.drag()
    .on("start", (e,d) => { if(!e.active) simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
    .on("drag",  (e,d) => { d.fx=e.x; d.fy=e.y; })
    .on("end",   (e,d) => { if(!e.active) simulation.alphaTarget(0); }));

node.append("circle")
  .attr("r", d => d.r)
  .attr("fill", d => CAT_COLOR[d.cat] || "#555")
  .attr("class", d => d.suno ? "suno" : "")
  .attr("fill-opacity", d => d.suno ? 0.92 : 0.72);

node.append("text")
  .text(d => d.label.split("\n")[0])
  .attr("dy", d => d.label.includes("\n") ? -3 : 1)
  .style("font-size", d => Math.max(18, Math.min(26, d.r * 0.5)) + "px")
  .style("font-weight", d => d.suno ? "700" : "400")
  .style("fill", d => d.suno ? "#FFD700" : "#eee");

node.filter(d => d.label.includes("\n")).append("text")
  .text(d => d.label.split("\n")[1])
  .attr("dy", 22)
  .style("font-size", d => Math.max(18, Math.min(26, d.r * 0.5)) + "px")
  .style("font-weight", d => d.suno ? "700" : "400")
  .style("fill", d => d.suno ? "#FFD700" : "#eee");

// hover: 軽量ツールチップ（ジャンル名のみ）
const tooltip = document.getElementById("tooltip");
node.on("mouseover", (e, d) => {
  tooltip.textContent = d.label.replace("\n", " ");
  tooltip.style.display = "block";
  tooltip.style.left = (e.pageX + 14) + "px";
  tooltip.style.top  = (e.pageY - 10) + "px";
})
.on("mousemove", e => {
  tooltip.style.left = (e.pageX + 14) + "px";
  tooltip.style.top  = (e.pageY - 10) + "px";
})
.on("mouseout", () => tooltip.style.display = "none");

// click: 右サイドパネルを開く
const panel     = document.getElementById("side-panel");
const spTag     = document.getElementById("sp-tag");
const spCopy    = document.getElementById("sp-copy");
const spClose   = document.getElementById("sp-close");
const spSunoW   = document.getElementById("sp-suno-wrap");
const spEra     = document.getElementById("sp-era");
const spDesc    = document.getElementById("sp-desc");
const spIn      = document.getElementById("sp-in");
const spOut     = document.getElementById("sp-out");
const spYt      = document.getElementById("sp-yt-link");

let dragMoved = false;
node.on("mousedown.drag", null);  // 既存drag再バインド前にリセット
node.call(d3.drag()
  .on("start", (e,d) => { dragMoved=false; if(!e.active) simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
  .on("drag",  (e,d) => { dragMoved=true; d.fx=e.x; d.fy=e.y; })
  .on("end",   (e,d) => { if(!e.active) simulation.alphaTarget(0); }));

node.on("click", (e, d) => {
  if(dragMoved) return; // ドラッグ後のクリックは無視
  e.stopPropagation();

  const name = d.label.replace("\n", " ");
  spTag.textContent = name;
  spSunoW.innerHTML = d.suno ? '<span class="sp-suno">Suno有効タグ</span>' : '';
  spEra.textContent  = d.era ? `発祥時期：${d.era}` : '';
  spDesc.textContent = d.desc || '（説明なし）';

  // ルーツの経緯
  const spRootsStory = document.getElementById("sp-roots-story");
  const spRootsStorySec = document.getElementById("sp-roots-story-sec");
  if (d.roots_story) {
    spRootsStory.textContent = d.roots_story;
    spRootsStorySec.style.display = '';
  } else {
    spRootsStorySec.style.display = 'none';
  }

  // ルーツ
  const incoming = LINKS.filter(l => l.t === d.id);
  spIn.innerHTML = incoming.length
    ? incoming.map(l => `<div class="sp-influence-row"><span class="pct">${l.w}%</span><b>${nodeMap[l.s]?.label?.replace("\n"," ")}</b><span class="reason">— ${l.desc||''}</span></div>`).join('')
    : '<span style="color:#666">なし（ルーツジャンル）</span>';

  // 影響先
  const outgoing = LINKS.filter(l => l.s === d.id);
  spOut.innerHTML = outgoing.length
    ? outgoing.map(l => `<div class="sp-influence-row"><span class="pct">${l.w}%</span><b>${nodeMap[l.t]?.label?.replace("\n"," ")}</b><span class="reason">— ${l.desc||''}</span></div>`).join('')
    : '<span style="color:#666">（データなし）</span>';

  // YouTube
  const q = encodeURIComponent(name + " music genre");
  spYt.href = `https://www.youtube.com/results?search_query=${q}`;
  spYt.textContent = `▶ YouTubeで「${name}」を検索`;

  // コピー
  spCopy.onclick = () => { navigator.clipboard.writeText(d.id).then(() => { spCopy.textContent='コピー済み'; setTimeout(()=>spCopy.textContent='コピー', 1500); }); };

  panel.style.display = "block";
});

spClose.onclick = () => panel.style.display = "none";
svg.on("click", () => panel.style.display = "none");

simulation.on("tick", () => {
  link
    .attr("x1", d => d.source.x)
    .attr("y1", d => d.source.y)
    .attr("x2", d => {
      const dx = d.target.x - d.source.x, dy = d.target.y - d.source.y;
      const dist = Math.sqrt(dx*dx + dy*dy) || 1;
      const r = d.target.r + 7;
      return dist > r ? d.target.x - dx/dist * r : d.target.x;
    })
    .attr("y2", d => {
      const dx = d.target.x - d.source.x, dy = d.target.y - d.source.y;
      const dist = Math.sqrt(dx*dx + dy*dy) || 1;
      const r = d.target.r + 7;
      return dist > r ? d.target.y - dy/dist * r : d.target.y;
    });
  node.attr("transform", d => `translate(${d.x},${d.y})`);
  linkLabelG.attr("transform", d =>
    `translate(${(d.source.x + d.target.x)/2},${(d.source.y + d.target.y)/2})`
  );
});

// Search
document.getElementById("search").addEventListener("input", e => {
  const q = e.target.value.toLowerCase();
  node.classed("highlighted", d => q.length > 0 && (d.id.includes(q) || d.label.toLowerCase().includes(q)));
  node.select("circle").attr("opacity", d => {
    if(!q) return 1;
    return (d.id.includes(q) || d.label.toLowerCase().includes(q)) ? 1 : 0.25;
  });
});

// Legend hover: カテゴリにカーソルを乗せると対応ノードをパルス点灯、他を暗く
document.querySelectorAll('.legend-item[data-cat]').forEach(item => {
  const cat = item.dataset.cat;
  item.addEventListener('mouseenter', () => {
    if (cat === 'suno') {
      node.classed('cat-highlight', d => d.suno);
      node.classed('cat-dim',       d => !d.suno);
    } else {
      node.classed('cat-highlight', d => d.cat === cat);
      node.classed('cat-dim',       d => d.cat !== cat);
    }
  });
  item.addEventListener('mouseleave', () => {
    node.classed('cat-highlight', false);
    node.classed('cat-dim',       false);
  });
});

// Filter
document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", e => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    const f = btn.dataset.filter;
    node.style("display", d => {
      if(f === "all") return null;
      if(f === "suno") return d.suno ? null : "none";
      return null;
    });
    link.style("display", d => {
      if(f !== "suno") return null;
      return (nodeMap[d.s]?.suno && nodeMap[d.t]?.suno) ? null : "none";
    });
  });
});
</script>
</body>
</html>
