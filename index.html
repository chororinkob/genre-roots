<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>音楽ジャンルルーツ辞典（電子音楽系）</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", sans-serif; background: #1a1a2e; color: #eee; overflow: hidden; }

#header { position: fixed; top: 0; left: 0; right: 0; z-index: 20; background: rgba(15,15,26,0.92); padding: 10px 16px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid #333; }
#header h1 { font-size: 15px; font-weight: 700; color: #fff; white-space: nowrap; }
#header .sub { font-size: 12px; color: #888; }

#left-sidebar { position: fixed; top: 50px; left: 14px; bottom: 10px; z-index: 20; width: 200px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
#legend { background: rgba(15,15,26,0.88); border: 1px solid #333; border-radius: 8px; padding: 10px 12px; font-size: 12px; }
#legend h3 { font-size: 11px; color: #aaa; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.legend-item { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; }
.legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.legend-label { color: #ccc; font-size: 11px; }
.legend-sep { border-top: 1px solid #333; margin: 8px 0; }
.suno-ring { width: 12px; height: 12px; border-radius: 50%; border: 2px solid #FFD700; flex-shrink: 0; }

#controls { background: rgba(15,15,26,0.88); border: 1px solid #333; border-radius: 8px; padding: 10px 12px; font-size: 12px; }
#controls h3 { font-size: 11px; color: #aaa; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
#search { width: 100%; padding: 5px 8px; background: #1a1a2e; border: 1px solid #444; border-radius: 5px; color: #eee; font-size: 12px; margin-bottom: 8px; }
#search::placeholder { color: #666; }
.filter-btn { display: inline-block; padding: 3px 8px; border-radius: 4px; border: 1px solid #444; background: #1a1a2e; color: #ccc; font-size: 11px; cursor: pointer; margin: 2px 2px 2px 0; }
.filter-btn.active { background: #FFD700; color: #000; border-color: #FFD700; font-weight: 700; }

/* hover tooltip (軽量版) */
#tooltip { position: fixed; background: rgba(20,20,40,0.92); border: 1px solid #555; border-radius: 6px; padding: 6px 10px; font-size: 12px; pointer-events: none; display: none; z-index: 30; white-space: nowrap; color: #eee; }

/* 右サイドパネル */
#side-panel { position: fixed; right: 0; top: 50px; bottom: 0; width: 320px; background: #16162a; border-left: 1px solid #444; padding: 0; overflow-y: auto; z-index: 25; display: none; font-size: 13px; }
#sp-header { position: sticky; top: 0; background: #1e1e38; padding: 14px 16px 10px; border-bottom: 1px solid #333; display: flex; align-items: flex-start; gap: 8px; }
#sp-tag { font-size: 18px; font-weight: 700; color: #fff; flex: 1; line-height: 1.3; }
#sp-copy { padding: 4px 10px; background: #2a2a50; border: 1px solid #555; border-radius: 5px; color: #ccc; font-size: 11px; cursor: pointer; white-space: nowrap; }
#sp-copy:hover { background: #3a3a70; color: #fff; }
#sp-close { padding: 4px 8px; background: none; border: none; color: #888; font-size: 18px; cursor: pointer; line-height: 1; }
#sp-close:hover { color: #fff; }
#sp-body { padding: 14px 16px; }
.sp-suno { display: inline-block; background: #FFD700; color: #000; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px; margin-bottom: 10px; }
.sp-era { font-size: 11px; color: #888; margin-bottom: 10px; }
.sp-section { margin-bottom: 14px; }
.sp-section h4 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #888; margin-bottom: 6px; border-bottom: 1px solid #2a2a50; padding-bottom: 4px; }
.sp-section p { color: #ccc; line-height: 1.6; font-size: 13px; }
.sp-influence-row { display: flex; align-items: baseline; gap: 6px; margin-bottom: 4px; font-size: 12px; color: #bbb; }
.sp-influence-row .pct { font-weight: 700; color: #7ecfff; font-size: 11px; min-width: 32px; }
.sp-influence-row .reason { color: #888; font-size: 11px; }
#sp-yt-link { display: block; margin-top: 6px; padding: 8px 12px; background: #cc0000; color: #fff; border-radius: 6px; text-decoration: none; font-size: 13px; font-weight: 700; text-align: center; }
#sp-yt-link:hover { background: #e60000; }

svg { width: 100vw; height: 100vh; }
.link { stroke-opacity: 0.45; fill: none; }
.link:hover { stroke-opacity: 0.9; }
.node circle { cursor: pointer; stroke-width: 2; }
.node circle.suno { stroke: #FFD700; stroke-width: 2.5; }
.node text { pointer-events: none; font-size: 11px; fill: #eee; text-anchor: middle; dominant-baseline: central; }
.node.highlighted circle { stroke: #fff !important; stroke-width: 3 !important; }
.link-label { font-size: 20px; fill: #fff; pointer-events: none; font-weight: 700; }
.link-label-bg { fill: rgba(26,26,46,0.82); pointer-events: none; }

@keyframes cat-pulse {
  0%   { stroke: #ffffff; stroke-width: 3; }
  50%  { stroke: #ffffff; stroke-width: 8; filter: drop-shadow(0 0 10px #fff) drop-shadow(0 0 20px rgba(255,255,255,0.6)); }
  100% { stroke: #ffffff; stroke-width: 3; }
}
.node.cat-highlight circle { animation: cat-pulse 0.85s ease-in-out infinite !important; stroke: #fff !important; }
.node.cat-dim { opacity: 0.1; pointer-events: none; }
.legend-item[data-cat] { cursor: pointer; padding: 2px 5px; border-radius: 4px; margin-left: -5px; transition: background 0.15s; }
.legend-item[data-cat]:hover { background: rgba(255,255,255,0.12); }
</style>
</head>

<script>
// ===== DATA =====
const NODES = [
  // ルーツ
  {id:"jazz", label:"Jazz", cat:"roots", era:"1900s", suno:false,
    desc:"スウィング感のあるリズムに乗せた即興演奏（アドリブ）が最大の魅力。演奏者がその場の空気で旋律を自由に変え、予測できない展開が生まれるのがジャズ独特の面白さ。コード進行は複雑でおしゃれな響きを持ち、サックスやトランペットの艶やかな音色がムードを作る。テンポはスローバラードからアップテンポまで幅広いが、どのスタイルにも共通する「揺れるグルーヴ」がある。夜のバーが似合う大人びた雰囲気で、時にメランコリック、時に高揚感にあふれる。",
    roots_story:"19世紀末〜20世紀初頭、ニューオーリンズの黒人コミュニティでブルース、ラグタイム、ゴスペル、マーチングバンドの要素が融合して誕生した。Buddy Bolden、King Oliver、Louis Armstrongらが初期のスタイルを確立。1920年代にシカゴ・NYへ広がり「ジャズ・エイジ」と呼ばれる社会現象に。Duke Ellington、Charlie Parker、Miles Davisらが時代ごとに革新を起こし、ビバップ→クールジャズ→フリージャズと進化。その即興精神とハーモニーの豊かさは、後のあらゆるポピュラー音楽の基盤となった。"},

  {id:"blues", label:"Blues", cat:"roots", era:"1900s", suno:false,
    desc:"哀愁と情感を込めたギターとボーカルが中心の音楽。「泣き」のギターフレーズ、ブルーノートと呼ばれる独特の音階が醸し出す切なさが最大の特徴。テンポはゆったりめで、同じコード進行をくり返しながら感情を深く掘り下げていく。声を絞り出すような歌い方、ギターを泣かせるようなベンド（チョーキング）、ハーモニカのむせび泣く音色が胸に刺さる。晴れた日でもどこか物悲しい空気を纏っており、聴く人の心の奥にじんわり響く音楽。",
    roots_story:"19世紀後半、ミシシッピ・デルタ地域のアフリカ系アメリカ人の労働歌（ワークソング）、フィールドハラー、スピリチュアルが融合して形成された。Robert Johnsonの伝説的な「クロスロード」の逸話に象徴されるデルタ・ブルースが原型。1940年代にMuddy WatersやHowlin' Wolfがシカゴに移住し、エレキギターとバンド編成を導入してシカゴ・ブルースを確立。B.B. Kingは洗練されたギタープレイで「ブルースの王」と呼ばれた。このシカゴ・ブルースをイギリスの若者が聴いてロックンロールが生まれ、音楽史全体を変えた。"},

  {id:"funk", label:"Funk", cat:"roots", era:"1960s", suno:false,
    desc:"とにかく体が動く、リズム最優先の音楽。1拍目にズドンと来るキックとベースの「うねり」が全身を揺さぶる。スラップベースのバチバチした音、ギターのチャカチャカしたカッティング、ホーンセクションの分厚い咆哮が絡み合って強烈なグルーヴを生む。メロディよりもリズムの気持ちよさを追求しており、同じリフを延々と繰り返しながらどんどんテンションが上がっていく快感がある。底抜けに明るくて汗臭い、踊るための音楽。",
    roots_story:"1960年代半ば、James Brownが「Papa's Got a Brand New Bag」(1965)で従来のR&Bから脱却し、リズムを前面に押し出した革命的なサウンドを生み出した。「ファンクの帝王」と呼ばれた彼の「1拍目を強調する」スタイルは音楽の概念を変えた。Sly and the Family Stoneはサイケデリック・ロックと融合させ、Parliament/FunkadelicのGeorge Clintonは宇宙的な世界観の「Pファンク」を確立。Bootsy Collins、Earth, Wind & Fire、Tower of Powerらがジャンルを拡張した。ファンクのブレイクビーツは後にヒップホップのサンプリング素材として無数に引用された。"},

  {id:"disco", label:"Disco", cat:"roots", era:"1970s", suno:false,
    desc:"キラキラした華やかさと高揚感にあふれたダンスミュージック。「ドン・ドン・ドン・ドン」と一定のテンポで刻む4つ打ちキック、シャカシャカ鳴り続けるハイハット、オクターブで跳ねるベースラインが基本骨格。その上にストリングス（弦楽器）の煌びやかなアレンジとソウルフルなボーカルが乗り、ミラーボールの下で踊り明かすための音楽を作り出す。テンポはBPM 110〜130で、速すぎず遅すぎない踊りやすさが心地よい。開放的で多幸感のある雰囲気が最大の魅力。",
    roots_story:"1970年代初頭、NYのゲイ・黒人・ラテン系コミュニティのアンダーグラウンドクラブで誕生。DJ David Mancusoの「The Loft」やNicky Sianoの「The Gallery」が初期の拠点。Donna Summer「I Feel Love」(1977, Giorgio Moroder制作)はシンセサイザーを全面導入し電子音楽への橋渡しとなった。Bee Gees「Saturday Night Fever」(1977)で大衆化。しかし1979年の「Disco Demolition Night」事件に象徴されるバックラッシュで地上から姿を消す。だがシカゴのDJ達がディスコのビートをシンセで再構築し、ハウスミュージックとして再生させた。"},

  {id:"soul", label:"Soul", cat:"roots", era:"1960s", suno:false,
    desc:"ボーカルの感情表現がすべての中心にある音楽。歌い手が魂（ソウル）を込めて声を絞り出し、ささやきからシャウトまで感情の振り幅を全開で表現する。メリスマ（一つの音符を細かく揺らす節回し）やファルセット（裏声）を自在に使いこなす歌唱力が聴きどころ。バックはオルガン、ホーンセクション、温かいコーラスが歌を包み込む。テンポはミッドテンポが多く、バラードでは切なく胸に迫り、アップテンポでは喜びが爆発する。「人間の声そのものが楽器」と感じさせる、情感の塊のような音楽。",
    roots_story:"1950年代後半、Ray Charlesがゴスペルの歌唱スタイルを世俗的な歌詞に持ち込み「ソウルの父」と呼ばれた。Sam Cookeは洗練されたポップ寄りのソウルを、James Brownはよりリズミックなソウルを追求（後にファンクへ発展）。1960年代、Motownレコード（デトロイト）はSupremes、Temptations、Marvin Gayeらでポップ市場を制覇。Staxレコード（メンフィス）はOtis Redding、Booker T.らの泥臭いサザンソウルを発信。Aretha Franklinは「ソウルの女王」として君臨した。1970年代にはPhilly Soulが洗練されたストリングスを導入し、これがディスコへの直接の布石となった。"},

  {id:"reggae", label:"Reggae", cat:"roots", era:"1960s", suno:false,
    desc:"裏拍（オフビート）を強調した独特のリズムが最大の個性。ギターやキーボードが「ンチャ・ンチャ」と裏で刻み、その隙間を重く深いベースラインがズーンと埋める。テンポはゆったり（BPM 60〜90）で、南国の陽射しの下でのんびり揺れるような心地よさがある。一聴すると脱力感があるのに、ベースとドラムのコンビネーションには芯の強いグルーヴが宿っている。穏やかさの中に力強いメッセージを秘めた、不思議な包容力を持つ音楽。",
    roots_story:"1960年代後半、ジャマイカでスカ→ロックステディの進化を経て誕生。Toots and the Maytalsが「Do the Reggay」(1968)で初めて「レゲエ」という言葉を使用。Bob Marleyとthe Wailersが世界的なスターとなり、レゲエをグローバルな音楽に押し上げた。「No Woman, No Cry」「One Love」などの楽曲は今も世界中で愛される。同時期にLee \"Scratch\" Perryやking Tubbyがスタジオで録音テープを加工する「ダブ」技法を発明。これはリバーブ、ディレイ、エフェクト処理による音響実験であり、後の電子音楽・リミックス文化の原点となった。"},

  {id:"punk", label:"Punk Rock", cat:"roots", era:"1970s", suno:false,
    desc:"速い・短い・シンプル・うるさい。3コードのパワーコードをかき鳴らし、2分前後の短い曲を全力で叩きつけるロック。演奏技術よりも衝動と態度が重視され、怒りや反抗心をそのまま音にぶつける。ボーカルは叫ぶか吐き捨てるかで、美しく歌おうという気はない。テンポは速く、ドラムはひたすらビートを叩き続ける。聴くと「自分でもできそう」と思わせる敷居の低さがあるのに、そのエネルギーは圧倒的。粗削りで汚いのにカッコいい、反骨精神そのものの音楽。",
    roots_story:"1974〜76年、NYのCBGBというライブハウスでRamones、Television、Patti Smithらが従来のロックの複雑さを拒絶したシンプルで攻撃的な音楽を演奏。ほぼ同時期にロンドンでSex Pistolsが「Anarchy in the U.K.」(1976)でデビューし、社会的衝撃を与えた。マネージャーMalcolm McLarenがファッションと反体制思想を結びつけ、パンクを音楽を超えた文化運動に変えた。The Clashは政治的メッセージとレゲエなど多様な要素を取り入れ「パンクの良心」と呼ばれた。パンクは長くは持たなかったが、そのDIY精神はポストパンク、ニューウェーブ、インダストリアルへ受け継がれ、電子音楽への扉を開いた。"},

  {id:"hiphop", label:"Hip Hop", cat:"roots", era:"1970s", suno:false,
    desc:"ビート（打ち込みのリズム）の上でラップ（韻を踏みながら語る歌唱法）を乗せる音楽。ドラムマシンやサンプリングで作られた重い低音とタイトなビートが土台で、そこにMCの言葉のフロウが絡む。DJのスクラッチ音、既存の曲から切り取ったサンプルのループも重要な音響要素。テンポはBPM 80〜100が主流で、頭を縦に振りたくなる「首振りビート」が気持ちいい。ストリートの空気感、言葉の力強さ、ビートの中毒性が三位一体になった、声とリズムの音楽。",
    roots_story:"1973年8月11日、DJ Kool Hercがブロンクスのアパートのパーティでファンクレコードのブレイク部分（ドラムだけの間奏）を2枚のレコードで交互に繰り返す「ブレイクビーツ」を発明。これがヒップホップの起源とされる。Grandmaster FlashはスクラッチやビートジャグリングなどのDJ技法を開発。Afrika Bambaataaはファンクにシンセサイザーを導入した「Planet Rock」(1982)でエレクトロとヒップホップを架橋した。Run-D.M.C.がロックと融合させメインストリームへ。Public Enemyは政治的メッセージを、N.W.A.はギャングスタ・ラップを確立。サンプリング文化は電子音楽全般のリミックス・マッシュアップ文化の基盤となった。"},

  {id:"newage", label:"New Age", cat:"roots", era:"1970s", suno:false,
    desc:"聴いていると心が静まり、ふわっと浮遊感に包まれるような穏やかな音楽。シンセサイザーの柔らかいパッド音、ピアノやハープの繊細な旋律、水の流れや鳥のさえずりといった自然音が組み合わさる。リズムは控えめか存在せず、メロディはゆったりと反復する。瞑想やヨガ、マッサージのBGMとしてよく使われるが、単なる背景音楽ではなく、聴く人を日常から切り離して穏やかな内面世界へ誘う力がある。明るく透明感のある響きが特徴で、暗さや攻撃性とは無縁の癒やしの音楽。",
    roots_story:"1970年代、Brian Enoのアンビエント実験とは別の流れとして、スピリチュアリズムやニューエイジ思想と結びついた音楽が形成された。ドイツのKlaus Schulze、Tangerine Dreamの電子音楽、日本の喜多郎のシンセサイザー作品が初期の代表格。Windham Hillレコード（1976年設立）がアコースティックなニューエイジを確立し、George Winston、Will Ackermannらがピアノ・ギター主体の作品で人気を得た。Enya「Orinoco Flow」(1988)が世界的ヒットとなりジャンルを大衆化。1987年にはグラミー賞にニューエイジ部門が新設された。スパやヨガスタジオのBGMとしても広く浸透し、後のチルアウト・アンビエント文化の下地を作った。"},

  {id:"classical", label:"Classical", cat:"roots", era:"~1900", suno:false,
    desc:"オーケストラ（管弦楽団）が奏でる壮大で格式高い音楽。バイオリン、チェロ、フルート、トランペットなど数十種の楽器が楽譜に従って精密にハーモニーを紡ぐ。静寂から大音量まで劇的なダイナミクスの変化があり、聴く者の感情を大きく揺さぶる。ピアノ独奏の繊細さ、弦楽四重奏の親密さ、フルオーケストラの圧倒的なスケール感など表現の幅が極めて広い。荘厳で美しい響きの中に、喜び、悲しみ、怒り、崇高さなど人間のあらゆる感情が詰まっている。聴き手に集中と没入を求める、「聴く芸術」としての音楽。",
    roots_story:"千年以上の歴史を持つ西洋音楽の伝統。電子音楽との接点は20世紀初頭から始まる。Claude Debussyの印象主義音楽（1890年代〜）は調性の束縛を緩め、後のアンビエントの浮遊感に影響。Arnold Schoenbergの十二音技法（1920年代）は従来の調性を解体し、実験音楽への道を開いた。Karlheinz Stockhausen（1950年代〜）は電子音響を正統的な作曲技法に取り入れた最初の主要な作曲家で、Kraftwerkからビョークまで多大な影響を与えた。Philip Glass、Steve Reichらのミニマル音楽（1960年代〜）は反復構造でテクノ・アンビエントの直接の先駆けとなった。"},

  // 初期電子音楽
  {id:"musique_concrete", label:"Musique\nConcrète", cat:"early_elec", era:"1948", suno:false,
    desc:"録音された現実の音（ドアの軋み、列車の音、人の声、工場の騒音など）を切り貼りして構成する音楽。メロディやリズムといった従来の音楽的要素はほぼなく、音そのものの質感・響き・重なりを聴かせる。聴いていると日常の音が全く違って聞こえてくる不思議な体験がある。心地よさとは無縁だが、耳をすませば環境音の中に隠れた音楽性を発見する知的興奮がある。",
    roots_story:"1948年、フランスの放送技師Pierre Schaefferがパリの国営放送局（RTF）で「鉄道のエチュード」を発表。列車の音をテープに録音し、速度変更・逆再生・ループなどの加工を施して作品にした。「具体音楽」と名付けられたこの手法は、音楽の素材を楽器の音から解放した革命的な概念だった。Pierre Henryとの共同制作「一人の男のための交響曲」(1950)で手法を確立。Karlheinz Stockhausenがドイツで電子音と融合させ、後のノイズミュージック、グリッチ、サウンドアートの源流となった。"},

  {id:"experimental_elec",label:"Experimental\nElectronic", cat:"early_elec", era:"1950s", suno:false,
    desc:"シンセサイザーや電子回路が生み出す、それまで存在しなかった音だけで構成された音楽。人工的な正弦波、ノコギリ波、ホワイトノイズなどの電子音が主役で、楽器らしい音色は使わない。未知の惑星や深海を想像させるような異世界感があり、時に美しく、時に不気味。拍子やメロディが曖昧なことが多く、聴き手の想像力に委ねる自由な音響空間が広がる。",
    roots_story:"1950年代、ドイツのケルンにあるWDR電子音楽スタジオでKarlheinz Stockhausenが純粋な電子音による作曲を開始。「習作I・II」(1953-54)は電子音のみで作られた最初の本格的な楽曲とされる。同時期にアメリカではColumbia-Princeton Electronic Music Centerが設立され、Milton BabbittやVladimir Ussachevskyが電子音楽を研究。1960年代にはRobert Moogがモーグ・シンセサイザーを開発し、Wendy Carlosの「Switched-On Bach」(1968)がグラミー賞を受賞して電子音楽を一般に知らしめた。"},

  {id:"krautrock", label:"Krautrock", cat:"early_elec", era:"1968", suno:false,
    desc:"ロックの衝動とエレクトロニクスの冷徹さが融合した、ドイツ独自のサウンド。同じリズムパターンを延々と繰り返す「モーターリック・ビート」が最大の特徴で、トランス状態に引き込まれるような陶酔感がある。シンセサイザーの無機質な電子音とロックバンドの生演奏が共存し、宇宙的な広がりと機械的な反復が同居する独特の世界観。テンポは中程度だが、反復の中に微細な変化を重ねることで催眠的な没入感を生む。",
    roots_story:"1968年頃、戦後ドイツの若い世代がアメリカやイギリスのロックを模倣することを拒否し、独自の音楽を模索し始めた。Kraftwerkはデュッセルドルフで完全に電子的なポップミュージックを追求し、「Autobahn」(1974)で世界的成功を収めた。彼らの機械的ビートは後のテクノ・シンセポップの直接の親となる。Can（ケルン）はフリージャズとロックを融合させた即興性の高いサウンドを展開。Tangerine Dream（ベルリン）はシンセサイザーで宇宙的な音響世界を構築し、アンビエントの先駆者に。Neu!のMichael Rotherは「モーターリック・ビート」を生み出し、これがテクノの反復構造の原型となった。"},

  {id:"dub", label:"Dub", cat:"early_elec", era:"1970s", suno:true,
    desc:"音が空間の中で跳ね返り、溶け、遠ざかっていくような独特の音響体験。レゲエの楽曲からボーカルを抜き、残った演奏にリバーブ（残響）やディレイ（エコー）を大量にかけて音の立体感を極端に強調する。重く深いベースラインが地を這い、スネアドラムの一打が宇宙に反響するような感覚。テンポはゆっくりで、音と音の「隙間」が多く、その余白が独特の浮遊感と瞑想的な空気を生む。霧の中を歩いているような、夢うつつの音楽。",
    roots_story:"1960年代末〜70年代、ジャマイカのサウンドエンジニアたちがスタジオの機材を「楽器」として使い始めたのが起源。King Tubbyは自身のスタジオでミキシング・コンソールをリアルタイムに操作し、各トラックのフェーダーを上げ下げしながらリバーブやディレイを即興的にかけていく手法を発明した。Lee \"Scratch\" Perryは自身のBlack Ark Studioでさらに実験的なサウンドを追求し、テープの逆再生や奇妙なエフェクトを駆使。Scientist、Augustus Pabloらがスタイルを発展させた。「スタジオそのものが楽器である」というダブの概念は、リミックス文化、電子音楽のエフェクト処理、ダブステップ、トリップホップなど後の音楽に計り知れない影響を与えた。"},

  // シンセポップ系
  {id:"new_wave", label:"New Wave", cat:"synthpop", era:"1977", suno:false,
    desc:"パンクのエネルギーを残しつつ、シンセサイザーやアートな感覚を取り入れたポップ・ロック。パンクほど攻撃的ではなく、どこかスタイリッシュでクールな佇まいがある。シンセの冷たい音色とギターが共存し、キャッチーなメロディラインと少しひねった歌詞が特徴。テンポは軽快で、踊れるリズムのものも多い。80年代のMTVカルチャーと結びつき、ビジュアル面でも独特のファッションやヘアスタイルが印象的だった。おしゃれで知的、でもどこか影のある大人のポップス。",
    roots_story:"1977年頃、パンクの「何でもあり」精神に触発されつつ、より幅広い音楽的実験に向かったアーティストたちが登場。Talking Headsはファンクとアートロックを融合、Blondieはディスコやラップまで取り入れた。イギリスではGary Numanが「Are 'Friends' Electric?」(1979)でシンセサイザー主体のヒットを飛ばし、Duran Duranはルックスとシンセを武器にMTVの寵児に。The Carsはアメリカン・ニューウェーブを代表し、Devoは奇抜なコンセプトで異彩を放った。パンクが破壊した音楽の枠組みの上に、より洗練された新しいポップを建設した世代。"},

  {id:"electro", label:"Electro", cat:"synthpop", era:"1982", suno:false,
    desc:"Roland TR-808ドラムマシンの乾いたキックとカチッとしたスネア、機械的に正確なビートが生み出すファンキーなグルーヴ。人間の演奏では出せない精密さとファンクの黒いノリが同居する独特のサウンド。シンセベースが太く弾み、ボコーダー（ロボット声）で処理されたボーカルが近未来的な空気を演出する。テンポは中程度でヘッドノッキングに最適。冷たくて硬質なのにどこか踊りたくなる、人間と機械の間にある音楽。",
    roots_story:"1982年、Afrika Bambaataaが「Planet Rock」をリリース。Kraftwerkの「Trans-Europe Express」をサンプリングし、TR-808のビートに乗せたこの曲がエレクトロの誕生を告げた。ヒップホップのDJ文化とヨーロッパの電子音楽が初めて直接融合した瞬間でもあった。Hashim「Al-Naafiysh」、Mantronix、Egyptian Loverらがスタイルを発展。フロリダではMiami BassとしてTR-808の重低音を極端に強調した変種が生まれ、2 Live Crewらが人気を博した。ヨーロッパではエレクトロクラッシュ（2000年代）として再解釈された。"},

  {id:"synth_pop", label:"Synth Pop", cat:"synthpop", era:"1978", suno:true,
    desc:"シンセサイザーがメインの楽器となったポップミュージック。キラキラした電子音のメロディ、打ち込みのリズム、甘くメランコリックな歌声が三位一体になった80年代を象徴するサウンド。生楽器をほとんど使わず、すべてをシンセとドラムマシンで構築する潔さがある。テンポはダンサブルな中速が多い。切なさと高揚感が同居する独特のエモーションがあり、夜のドライブや都会の夜景が似合う。ポップスなのにどこか孤独な匂いがする。",
    roots_story:"Kraftwerkの電子的サウンドとパンク/ニューウェーブのポップセンスが出会って生まれた。Gary Numan「Cars」(1979)、Orchestral Manoeuvres in the Dark、Ultravoxが初期のパイオニア。Depeche Modeはダークなシンセポップを極め、「Enjoy the Silence」(1990)は名曲中の名曲。Pet Shop Boysはインテリジェントなダンスポップを確立。日本ではYMO（Yellow Magic Orchestra）が1978年に独自のテクノポップを世界に発信し、後の日本の電子音楽シーン全体に影響を与えた。Erasure、A-ha、Howard Jonesらが80年代チャートを席巻した。"},

  {id:"electropop", label:"Electropop", cat:"synthpop", era:"2000s", suno:true,
    desc:"シンセポップを現代的なプロダクション技術で蘇らせた、きらびやかで弾むようなポップス。80年代のノスタルジーと最新のデジタル音響が融合し、分厚いシンセの壁、自動補正されたキラキラのボーカル、パンチの効いたビートが特徴。テンポはアップテンポでフロア向けのものが多い。とにかくキャッチーで耳に残り、一度聴いたらサビが離れない中毒性がある。明るくてカラフル、深刻さとは無縁の快楽主義的なポップミュージック。",
    roots_story:"2000年代後半、80年代シンセポップへのリバイバルとデジタルプロダクションの進化が合流。La Rouxの「Bulletproof」(2009)、Robynの「Dancing On My Own」(2010)がジャンルの代表曲。Lady Gagaは「Just Dance」(2008)でエレクトロポップをメインストリームの中心に据えた。Charli XCX、Carly Rae Jepsenらがさらにポップに振り切り、Grimes、CHVRCHESはインディー寄りのアプローチで批評家からも支持された。現在もポップスの主流サウンドの一つとして定着している。"},

  // インダストリアル系
  {id:"industrial", label:"Industrial", cat:"industrial", era:"1977", suno:false,
    desc:"金属を叩く音、機械の軋み、工場の騒音をそのまま音楽にしたような攻撃的なサウンド。ドラムは硬質で打撃的、ベースは歪んで唸り、ボーカルは叫ぶか機械的に加工される。不快感や緊張感を意図的に生み出す音楽で、聴いていると心拍数が上がる。美しさよりも衝撃と挑発を追求しており、反社会的・反権威的なメッセージを込めることが多い。工業地帯の灰色の風景がそのまま音になったような、重く冷たいサウンドスケープ。",
    roots_story:"1976年、Throbbing GristleがイギリスのシェフィールドでIndustrial Recordsを設立。バンド名通り「脈打つ軟骨」のような不気味なパフォーマンスで、テープコラージュ、自作電子機器、歪んだボーカルを駆使した。「Industrial Music for Industrial People」という標語がジャンル名の由来。ドイツのEinstürzende Neubauten（崩壊する新建築）は文字通り建設現場の廃材を楽器にした。Cabaret Voltaireはシンセサイザーとテープ操作で独自路線を、SPKはオーストラリアからより過激なノイズを発信。アメリカではMinistryやNine Inch Nailsがロック寄りのインダストリアルを大衆化させた。"},

  {id:"ebm", label:"EBM", cat:"industrial", era:"1981", suno:false,
    desc:"インダストリアルの攻撃性にダンスフロアのビートを注入した音楽。硬質な4つ打ちキック、反復するシンセベースのシーケンス、咆哮するようなボーカルが基本構成。テンポは中速〜やや速め（BPM 110〜140）で、体を前後に揺らしたくなるような無骨なグルーヴがある。冷たく暗いが、踊れる。ゴスクラブやインダストリアル系クラブの定番で、黒い服に身を包んだ集団が無表情で踊っている光景が似合う。",
    roots_story:"1981年、ベルギーのFront 242が「Body to Body」を発表し、Electronic Body Music（EBM）を提唱。インダストリアルの実験性をダンスフロア向けに再構築したスタイルだった。ドイツのDAF（Deutsch Amerikanische Freundschaft）は最小限のシンセとドラムマシンで粗野なダンスビートを生み出し、EBMの原型を作った。Nitzer Ebbはよりハードでアグレッシブなスタイルを確立。これらのバンドの「シーケンサーで駆動する反復ビート」はデトロイト・テクノに大きな影響を与え、電子ダンス音楽全体の重要な礎となった。"},

  {id:"post_punk", label:"Post-Punk", cat:"industrial", era:"1978", suno:false,
    desc:"パンクの「何でもあり」精神を引き継ぎつつ、より暗く、実験的で、知的な方向へ進んだ音楽。ギターはコードを掻き鳴らすのではなくリバーブやディレイで空間的な音を作り、ベースラインが楽曲を引っ張ることが多い。ボーカルは低く抑制的で、歌詞は内省的・文学的。テンポは様々だが中速が多く、どこか不安定で落ち着かない空気が漂う。暗いけれど美しく、冷たいけれど感情的。曇り空の都市の風景が似合う音楽。",
    roots_story:"1978年頃、パンクの短命な爆発の後に、より持続可能な音楽表現を求めたアーティストたちが現れた。Joy Divisionは重く暗いサウンドとIan Curtisの切迫した歌唱で「ポストパンクの象徴」となり、彼の死後New Orderとしてエレクトロニックダンスへ転身。Siouxsie and the Bansheesはゴシックな美学を導入。Wire、Gang of Four、Bauhaus、The Cureがそれぞれ独自の方向を開拓。このジャンルは直接コールドウェーブ、ダークウェーブ、ゴシックロックに分岐し、電子音楽との架け橋となった。"},

  {id:"coldwave", label:"Coldwave", cat:"industrial", era:"1979", suno:true,
    desc:"名前の通り「冷たい波」。シンセサイザーの氷のような音色、ミニマルなドラムマシン、抑揚を抑えた冷淡なボーカルが、凍りつくような無機質な美を生む。感情を表に出さず、内側に閉じ込めたような張り詰めた緊張感が全体を支配する。テンポは中速で、同じフレーズが繰り返される催眠的な構成。真冬の深夜、人気のない都市の路地裏を歩いているような孤独感と美しさが共存する音楽。",
    roots_story:"1970年代末、フランスとベルギーのアーティストがイギリスのポストパンク/ニューウェーブを独自に解釈した。フランスのMartin Dupont、Trisomie 21、KaS Product、ベルギーのSignal Aoutが代表格。英語圏のニューウェーブより暗く、ミニマルで、感情を抑制した冷たい質感が特徴だった。フランス語の響き自体がクールな雰囲気を生み出し、英米のポストパンクとは明らかに異なる空気感があった。長らくアンダーグラウンドに留まっていたが、2010年代にDrab Majesty、Lebanon Hanoverらによってリバイバルされた。"},

  {id:"darkwave", label:"Darkwave", cat:"industrial", era:"1980s", suno:false,
    desc:"暗く神秘的な電子音楽。シンセサイザーの深い残響、荘厳なストリングスパッド、エコーのかかったボーカルが織りなす、闇の中の美しさ。ゴシックの退廃的な美学と電子音楽の冷たさが融合しており、中世の城や月光に照らされた墓地のような幻想的な世界観がある。テンポはゆったり〜中速で、ダンスフロアで流れることもあるが、むしろ暗闇に沈み込むように聴く音楽。悲しみや孤独を美に変換する耽美的なサウンド。",
    roots_story:"1980年代、ポストパンクとゴシックロックのダークな美学がシンセサイザーと出会って生まれた。Clan of Xymox（オランダ）はシンセポップとゴシックを融合させた初期の代表格。Dead Can Dance（オーストラリア）は中世音楽やワールドミュージックの要素を取り入れ、ジャンルの幅を大きく広げた。Cocteau Twinsの幻想的なサウンドも影響を与えた。ドイツではDas Ich、Goethes Erbenがドイツ語ダークウェーブを確立。後にネオクラシカルダークウェーブ、エセリアルウェーブに分岐し、現在もゴス系クラブシーンの中核を成している。"},

  {id:"gothic_rock", label:"Gothic Rock", cat:"industrial", era:"1979", suno:false,
    desc:"パンクの攻撃性をダークでドラマチックな方向に昇華させたロック。リバーブの深いギター、太く唸るベースライン、荘厳でバリトン気味のボーカルが暗黒の美世界を描く。歌詞は死、愛、孤独、超自然的テーマを扱い、黒い衣装、蒼白なメイク、コウモリ的なビジュアルと一体化したサブカルチャー。テンポは中速で重厚感があり、パンクのスピード感よりも雰囲気と世界観の構築に重きを置く。美しくも退廃的な闇のロック。",
    roots_story:"1979年、Bauhaus「Bela Lugosi's Dead」が9分半の暗黒叙事詩でゴシックロックの誕生を告げた。吸血鬼映画俳優の名を冠したこの曲は、パンクの攻撃性をホラー映画的な美学に変換した。Siouxsie and the Bansheesはエキゾチックで呪術的なサウンドを展開、The Sistersof Mercyはドラムマシンを使った重厚なロックを確立、The Cureは「Seventeen Seconds」(1980)から暗い方向へ。The Missionはよりロック寄りのゴシックを追求。ゴシックロックはファッション・文学・映画を含む一大サブカルチャーを生み、ダークウェーブとともに現在もゴスシーンの中心にある。"},

  {id:"neoclassical_dw", label:"Neoclassical\nDarkwave", cat:"industrial", era:"1990s", suno:true,
    desc:"クラシック音楽の荘厳さとダークウェーブの暗い神秘性が融合した音楽。弦楽四重奏やピアノの旋律、聖歌隊のようなコーラスが電子音のドローンやパッドの上に重なる。大聖堂の中で聴いているような残響と荘厳さがあり、中世ヨーロッパや暗黒時代を連想させる世界観。テンポはゆっくりで、感情は内に秘めた悲壮感や崇高さを表現する。美しさと畏怖が同居する、芸術性の高い暗黒音楽。",
    roots_story:"1990年代初頭、Dead Can Danceの壮大な音楽世界に触発されたアーティストたちがクラシック楽器と電子音の融合を本格化。Arcana（スウェーデン）は弦楽器とエレクトロニクスの幽玄な融合を追求。Elend（フランス）はフルオーケストラと合唱を使った壮大な暗黒交響曲を作り上げた。Stoa、Ophelia's Dream、In Slaughter Nativesらがスタイルを発展。ドイツのSopor Aeternus & the Ensemble of Shadowsは一人多重録音で独自の世界を構築。Projekt Records（アメリカ）とHyperiumレコード（ドイツ）がジャンルの拠点レーベルとなった。"},

  {id:"ethereal_wave", label:"Ethereal Wave", cat:"industrial", era:"1980s", suno:true,
    desc:"「天上の波」という名の通り、この世のものとは思えない幻想的で透明な音楽。深いリバーブの中を漂う女性ボーカル（歌詞が聞き取れないほど加工されることも）、揺らめくギターのアルペジオ、シンセの靄のようなパッドが、夢の中にいるような浮遊感を生む。テンポはゆったりで、メロディは美しく儚い。月明かりの下で花が咲くような、触れたら消えてしまいそうな繊細さがある。暗さの中の光のような音楽。",
    roots_story:"1980年代、Cocteau Twinsがジャンルの最重要バンドとして君臨。Elizabeth Fraserの言語を超越した歌唱（造語や聞き取れない言葉で歌う「グロソラリア」的手法）とRobin Guthrieの極端にリバーブをかけたギターが、他に類を見ない音響世界を生んだ。「Heaven or Las Vegas」(1990)が代表作。4AD Recordsがジャンルの中心レーベルとなり、This Mortal Coil、Lush、Pale Saintsらが所属。Dead Can Danceのリサ・ジェラルドの声楽も大きな影響を与えた。シューゲイザーとも重なる部分があり、My Bloody Valentineとも共鳴していた。"},

  {id:"harsh_noise", label:"Harsh Noise", cat:"industrial", era:"1980s", suno:true,
    desc:"音楽と騒音の境界を完全に消し去った極限の音響表現。フィードバック、歪み、静電気のような電子ノイズが壁のように押し寄せ、メロディ・リズム・ハーモニーといった音楽の要素は一切存在しない。耳が痛くなるほどの音圧で聴く者の感覚を圧倒する。心地よさとは対極にあるが、その激しさの中に「音そのものの力」を純粋に体験する独特のカタルシスがある。聴覚の限界に挑戦する、最も過激な音楽表現の一つ。",
    roots_story:"1970年代後半のインダストリアル音楽を極端に推し進めた形で誕生。日本のMerzbow（秋田昌美）が1980年代からハーシュノイズの最重要アーティストとして膨大な作品を発表し続けており、ジャンルの代名詞的存在。「パルスデーモン」(1996)は400作以上あるディスコグラフィーの中でも代表作。Masonna、Incapacitants、非常階段ら日本のジャパノイズ（Japanoise）勢がジャンルを牽引。アメリカではWolf Eyes、Prurient、Kevin Drumm、ヨーロッパではVomir（フランス）のHNW（Harsh Noise Wall）が一つのサブジャンルとして確立された。"},

  // アンビエント系
  {id:"ambient", label:"Ambient", cat:"ambient", era:"1978", suno:false,
    desc:"空間そのものが音楽になったような、極めて静かで穏やかな音響芸術。シンセサイザーの長いドローン（持続音）、かすかな電子音の揺らぎ、時折聞こえる環境音が、広大で透明な音の風景を描く。ビートはなく、メロディもあるかないかの境界を漂う。集中して聴いても、BGMとして流しても成立する不思議な二面性がある。時間の流れが遅くなるような、部屋の空気が変わるような、音楽というより「場」を作る音。",
    roots_story:"1978年、Brian Enoが「Music for Airports」を発表し「アンビエント」を音楽用語として定義した。空港の待合ロビーで流れることを想定し、「注意を引くことなく空間に溶け込む音楽」というコンセプトだった。Enoは先立つ「Discreet Music」(1975)で既にこの方向性を示していた。Kraftwerkやクラウトロックの反復性、Erik Satieの「家具の音楽」(1917)というコンセプトも源流にある。Harold Budd、Laraaji、Roger Enoらが初期のコラボレーターとなり、後にThe Orbがダンスフロア向けのアンビエントハウスを、Aphex Twinが実験的なアンビエントを追求した。"},

  {id:"dark_ambient", label:"Dark Ambient", cat:"ambient", era:"1980s", suno:true,
    desc:"闇の底から響いてくるような、不穏で重苦しい音響世界。低周波のドローンが地鳴りのように空間を満たし、金属的な軋み、遠くの叫び声のようなサンプル、不気味な残響音が断片的に現れては消える。ビートはなく、聴いていると暗闇に目が慣れるように恐怖が日常化していく感覚がある。廃墟、地下洞窟、深夜の工場跡地といった場所の空気をそのまま真空パックしたような音楽。心地よくはないが、奇妙な中毒性がある。",
    roots_story:"1980年代、インダストリアル音楽の攻撃性を取り除き、暗く静的な音響空間だけを残す方向に進んだアーティストたちが登場。Lustmordがジャンルの創始者として広く認められており、「Heresy」(1990)は代表作。洞窟や屠殺場で録音したフィールドレコーディングと低周波ドローンを融合させた。Raison d'être（スウェーデン）はCold Meat Industryレーベルを拠点に教会の残響を取り入れた荘厳なダークアンビエントを展開。Atrium Carceri、Desiderii Marginis、Kammarheitらスウェーデン勢が特に強く、同国のCMI、Cyclic Lawが主要レーベルとなった。"},

  {id:"space_ambient", label:"Space Ambient", cat:"ambient", era:"1970s", suno:true,
    desc:"無限の宇宙空間を音で描いた、壮大で広がりのあるアンビエント。煌めくシンセのパッドが星雲のように広がり、深い残響が無重力空間を表現する。時折キラキラした高音が流れ星のように通り過ぎ、低いドローンが宇宙の深淵を感じさせる。ゆったりとしたテンポ（あるいはテンポなし）で、聴いていると地球から離れていくような浮遊感に包まれる。プラネタリウムのBGMとして最適な、壮大で静謐な音楽。",
    roots_story:"1970年代、Tangerine Dreamが「Phaedra」(1974)でシンセサイザーによる宇宙的音響を確立した最初のバンドの一つ。Klaus Schulzeも壮大な電子音空間を構築した。Brian Enoの「Apollo: Atmospheres and Soundtracks」(1983)はNASAのアポロ計画を題材にした傑作で、ジャンルの金字塔。Steve Roach「Structures from Silence」(1984)は静寂からの音の構築を極めた。Aglaia、Oöphoi、Jonn Serrie、Robert Richらが宇宙的テーマを追求し続けている。NASAが公開した惑星の電磁波データを音に変換する「ソニフィケーション」もこのジャンルと共鳴している。"},

  {id:"ritual_ambient", label:"Ritual Ambient", cat:"ambient", era:"1980s", suno:true,
    desc:"古代の儀式や祈りの場にいるような、神秘的で呪術的な音響空間。民族楽器（ディジュリドゥ、シンギングボウル、フレームドラム）の倍音、詠唱のようなボーカル、鈴や鐘の残響が電子音のドローンと混ざり合う。聴いていると意識が変容するような、トランス状態に近い感覚を生む。テンポはゆったりか、パーカッションの原始的リズムが催眠的に繰り返される。焚き火を囲む夜の儀式、寺院の読経、シャーマンの太鼓のような原始的な神聖さを帯びた音楽。",
    roots_story:"1980年代、ダークアンビエント/インダストリアルのアーティストたちが古代の儀式や異教文化に目を向け始めた。Zero Kama（ドイツ）は人骨で作った楽器で演奏するという極端なコンセプトで話題に。Ain Soph（日本）、Hybryds（ベルギー）が初期の代表格。1990年代にはAenigma Project、Daemonia Nymphe（ギリシャ）が古代ギリシャの音楽を再構築。Heilung（デンマーク/ノルウェー）は2010年代にバイキング時代の儀式音楽を壮大なパフォーマンスで再現し、一般の注目を集めた。Wardruna（ノルウェー）もTV番組「ヴァイキング」のサウンドトラックで知名度を上げた。"},

  {id:"horror_ambient", label:"Horror Ambient", cat:"ambient", era:"1980s", suno:true,
    desc:"ホラー映画の中に放り込まれたような、純粋な恐怖を音で再現する音楽。突然の金属的な衝撃音、忍び寄るような低周波のドローン、遠くから聞こえる不明瞭な囁き声、軋むドアの音。聴覚を通じて恐怖を体験させることに特化しており、暗い部屋で聴くと本能的に背後を確認したくなる。テンポはほぼなく、沈黙と音の落差で聴く者の神経を逆なでする。ダークアンビエントよりも直接的に「怖い」ことを目指した、恐怖体験としての音楽。",
    roots_story:"ホラー映画のサウンドトラックとダークアンビエントの交差点で生まれた。John Carpenter自身が作曲した「ハロウィン」テーマ(1978)のミニマルなシンセサウンドが原型の一つ。Goblinのイタリアンホラー映画音楽（「サスペリア」1977等）も大きな影響源。アンビエントシーンではAtrium Carceri「Cellblock」(2003)が荒廃した精神病院を音で描き、ジャンルの代表作に。Cryo Chamber、Malignant Recordsがジャンルの中心レーベル。近年はホラーゲーム（Silent Hillシリーズの山岡晃の音楽など）との相互影響も強い。"},

  {id:"underwater_ambient", label:"Underwater\nAmbient", cat:"ambient", era:"1990s", suno:true,
    desc:"深海に潜っているような、水の中の世界を音で再現したアンビエント。すべての音がくぐもったフィルターを通したように丸く柔らかく、泡がぽこぽこと立ち上る音、遠くのクジラの歌声のような低音、水流のゆらめきが意識の底に沈んでいく感覚を生む。地上の喧騒から完全に遮断された静寂と、水圧を感じるような包み込まれる安心感がある。テンポはなく、ゆっくりと揺蕩うような音の動きだけがある。胎内回帰的な安らぎに満ちた音楽。",
    roots_story:"1990年代、アンビエントの細分化の中で水をテーマにした作品が一つのカテゴリとして認識され始めた。Biosphere（ノルウェー）の「Substrata」(1997)は北極の海中をイメージさせる作品でジャンルの金字塔。Aphex Twin「Selected Ambient Works Volume II」(1994)の一部トラックも水中的な質感を持つ。Irresistible Force「Global Chillage」(1994)は海の音をサンプリングした初期の例。Alio Die（イタリア）は水の音と有機的なテクスチャーを融合。近年ではハイドロフォン（水中マイク）を使った実際の海中録音を素材にするアーティストも増えている。"},

  // ハウス系
  {id:"chicago_house", label:"Chicago House", cat:"house", era:"1983", suno:false,
    desc:"ディスコの4つ打ちビートをシンセサイザーとドラムマシンで再構築した、ダンスミュージックの新しい形。ドンドンドンドンと刻む規則正しいキックの上に、温かみのあるシンセパッド、ソウルフルなボーカルサンプル、シンプルなベースラインが乗る。テンポはBPM 118〜128でまさに踊るために最適化されている。ディスコの華やかさを最小限の機材で再現した、手作り感と高揚感が共存するサウンド。フロアが一体になる多幸感がこの音楽の本質。",
    roots_story:"1983〜84年、シカゴのゲイクラブ「The Warehouse」のDJ Frankie Knucklesがディスコレコードにドラムマシンのビートを重ね、テンポを上げて再構築するプレイを始めた。クラブの名前から「House Music」と呼ばれるようになった。Jesse Saunders「On and On」(1984)が最初のハウスレコードとされる。Marshall Jeffersonは「Move Your Body」(1986)でピアノハウスを確立。Larry Heardは「Can You Feel It」(1986)でディープハウスの原型を作った。Trax RecordsとDJ International Recordsがシカゴハウスの2大レーベルとなった。"},

  {id:"deep_house", label:"Deep House", cat:"house", era:"1986", suno:false,
    desc:"ハウスミュージックの中でも最も「聴かせる」スタイル。ジャジーなコード進行、柔らかく温かいシンセパッド、深みのあるベースライン、ソウルフルなボーカルが、洗練された大人の空間を演出する。テンポはBPM 118〜125とハウスの中ではやや遅めで、激しく踊るよりも体を揺らして心地よくなる音楽。夜のラウンジやビーチサイドのバーが似合う。派手さはないが、何時間聴いても疲れない上質なグルーヴが魅力。",
    roots_story:"1986年、シカゴのLarry Heard（Mr. Fingers）が「Can You Feel It」「Mystery of Love」をリリースし、ハウスに深みと感情を持ち込んだ。従来のシカゴハウスよりもテンポを落とし、ジャズやソウルの要素を取り入れたこのスタイルが「ディープハウス」と呼ばれるようになった。Ron Trentはよりスピリチュアルな方向を追求。Kerri Chandlerはニューヨークから独自のディープサウンドを発信。2010年代にはDisclosureの「Latch」がメインストリームでヒットし、ディープハウスが広く認知された。"},

  {id:"acid_house", label:"Acid House", cat:"house", era:"1987", suno:false,
    desc:"Roland TB-303ベースラインシンセサイザーの「ビヨヨヨーン」とうねる独特の音色が主役。フィルターを開閉することで生まれるヌルヌルと粘りつくような電子音が、4つ打ちビートの上で催眠的にうねり続ける。テンポはBPM 120〜130。聴いていると脳が溶けるようなトリッピーな感覚があり、意識が変容するようなサイケデリックな体験を生む。スマイリーフェイスのロゴに象徴される享楽的なエネルギーに満ちた音楽。",
    roots_story:"1987年、シカゴのDJ Pierre、Spanky、Herbが偶然TB-303（本来はベース伴奏用の不人気機材）のツマミをいじっていた時に、あの独特の「アシッド」サウンドを発見。「Acid Tracks」としてTrax Recordsからリリースされ、新しいサウンドの幕が開けた。この音がイギリスに渡り、1988年の「セカンド・サマー・オブ・ラブ」と呼ばれるレイブムーブメントを引き起こした。数万人規模の違法レイブパーティーがイギリス各地で開催され、社会現象に。スマイリーフェイスがシンボルとなり、アシッドハウスは音楽だけでなく文化革命となった。"},

  {id:"funky_house", label:"Funky House", cat:"house", era:"1990s", suno:true,
    desc:"ファンクのグルーヴとハウスの4つ打ちが融合した、底抜けにノリのいいダンスミュージック。チャカチャカしたカッティングギター、スラップベース風のベースライン、ファンキーなホーンのサンプルが4つ打ちキックの上で踊る。テンポはBPM 125前後。とにかく楽しくて明るく、深刻さゼロ。聴いた瞬間に笑顔になれるようなパーティーミュージックで、クラブの盛り上がりを最大化する。難しいことを考えずに踊り狂うための音楽。",
    roots_story:"1990年代後半にイギリスで流行が本格化。ハウスの4つ打ちにファンクやディスコのサンプルを大量に取り入れたスタイルで、特にUKのクラブシーンで人気を博した。DJ Sneak、Roger Sanchezが初期の主要アーティスト。イギリスではKenny Dopeが人気を集め、Defected Recordsがレーベルとして中心的な存在に。Purple Music（スイス）も重要なレーベル。2000年代にはDavid Guettaらがよりポップな方向へ発展させ、メインストリームのダンスポップへの橋渡し役となった。"},

  {id:"uk_garage", label:"UK Garage", cat:"house", era:"1996", suno:false,
    desc:"シャッフルする跳ねたリズム、R&B風のセクシーなボーカル、パンチのあるベースラインが特徴のUK独自のダンスミュージック。ハウスの4つ打ちをベースにしつつ、リズムを崩して「タッタタ・タッタタ」と跳ねさせることでグルーヴを生む。テンポはBPM 130前後。洗練されていてストリート感もあり、チャラいけどカッコいい。シャンパンを片手にクラブで踊るような都会的な空気感が漂う。UKの独自進化を象徴するジャンル。",
    roots_story:"1990年代半ば、ニューヨークのガレージハウス（Paradise GarageのLarry Levanに由来）がイギリスに渡り、独自に変容した。Todd Edwards（アメリカ）のボーカルを細切れにサンプリングする手法がUKのプロデューサーに大きな影響を与えた。MJ Cole「Sincere」(2000)、Artful Dodger ft. Craig David「Re-Rewind」(1999)がメインストリームでヒット。Craig Davidはこのジャンルから世界的スターに。London系のクラブ（Twice As Nice等）が拠点となり、後に2-Step、Speed Garageに分岐。さらにそこからダブステップとグライムが誕生した。"},

  {id:"two_step", label:"2-Step", cat:"house", era:"1997", suno:true,
    desc:"UK Garageの中でもリズムの跳ね方が極端に強調されたスタイル。4つ打ちの2拍目と4拍目のキックを抜くことで生まれる「空白」がスウィング感を最大化し、体が勝手にステップを踏み始めるようなリズム。R&B的な甘いボーカル、シャリシャリしたハイハット、ベースの「ブン」という弾み。テンポはBPM 130前後だが、跳ねるリズムのおかげで体感的にはもっと軽快。都会的でスタイリッシュ、夜の街を歩くBGMにぴったり。",
    roots_story:"1997年頃、UK Garageのプロデューサーたちがキックパターンを実験する中で、4つ打ちの一部を抜くことで独特のスウィング感を生むスタイルが確立された。名前は「2拍子ステップ」に由来。MJ Cole、Zed Bias、El-Bが代表的プロデューサー。2000年前後のUKチャートを席巻し、Artful Dodger、Sweet Female Attitudeらがヒットを連発。Craig Davidのデビューアルバム「Born to Do It」(2000)は2-Stepの集大成的作品。2010年代にはJames Blake、Disclosureが2-Stepの要素を現代的に再解釈した。"},

  {id:"speed_garage", label:"Speed Garage", cat:"house", era:"1996", suno:true,
    desc:"UK Garageのベースラインを極端に太く重くしたスタイル。「ブルルルル」とうねるワブリーなベースが全身を振動させ、タイトでスピーディーなリズムが疾走感を生む。テンポはBPM 130〜140とガレージの中では速め。ダブの重低音とガレージの跳ねるリズムが同居する、ヘッドバンキングしながら腰も動くような二刀流のグルーヴ。重くてスピーディー、都会の地下を猛スピードで走り抜けるような音楽。",
    roots_story:"1996〜97年、UK Garageのプロデューサーたちがベースラインをより重く、うねるように加工し始めた。Armand Van Helden「Sugar」のリミックス(1997)がスピードガレージの代表曲としてよく挙げられる。187 Lockdown「Gunman」もジャンルを代表する一曲。Dreem Teem、DJ Narrows、DJ Eternityらがスタイルを発展。ベースの重さを追求する方向はこの後UK Garageからさらに低速化・重量化されてダブステップへと進化していく、重要な通過点となった。"},

  {id:"progressive_house", label:"Progressive\nHouse", cat:"house", era:"1991", suno:false,
    desc:"長い時間をかけてじわじわと盛り上がっていく、壮大な展開を持つハウス。1曲の中で少しずつ要素を足し引きしながらクライマックスに向かう「ビルドアップ」が最大の特徴。シンセのパッドが幾層にも重なり、フィルターが徐々に開いていく高揚感は、まるで夜明けを待つような体験。テンポはBPM 124〜130。聴いていると時間を忘れる没入感があり、DJセットの中で真価を発揮する。即効性よりも旅のような体験を提供する音楽。",
    roots_story:"1991年頃、ハウスミュージックがよりドラマチックで展開のある方向へ進化。Sasha & John Digweedのコンビが「Renaissance」ミックスシリーズ（1994〜）で長い展開のDJプレイを確立し、ジャンルの代名詞的存在に。Leftfield「Leftism」(1995)、Underworld「Born Slippy .NUXX」(1996)も重要作品。2000年代にはDeadmau5がシンプルでメロディアスなプログレッシブハウスでEDMシーンに参入。Eric Prydz「Call on Me」(2004)はメインストリームでの大ヒット。現在もアンダーグラウンドからメインストリームまで幅広く支持されている。"},

  {id:"electro_house", label:"Electro House", cat:"house", era:"2000s", suno:false,
    desc:"ハウスのビートにエレクトロの鋭いシンセ音とディストーションを注入した、攻撃的でエネルギッシュなスタイル。歪んだベースライン、ギラギラしたシンセのリード音、ドカンと落ちるドロップが特徴。テンポはBPM 125〜130。プログレッシブハウスのようにゆっくり盛り上がるのではなく、ビルドアップからドロップへの「落差」で一気にフロアを爆発させる。大音量で浴びるのが最高のサウンド。フェスティバルのメインステージ向け。",
    roots_story:"2000年代前半、ハウスとエレクトロの境界が崩れ始めた。Justice「†」(2007)はフランスから登場したエレクトロハウスの金字塔で、ロック的な歪みと攻撃性をダンスミュージックに持ち込んだ。Benny Benassi「Satisfaction」(2002)は初期の代表曲。Daft Punk「Human After All」(2005)も影響を与えた。Skrillex、Feed Me、Wolfgang Gartnerらが2010年前後にスタイルを発展。EDMブームの最中ではビッグルームハウスと合流し、フェスティバルEDMの主要な構成要素となった。"},

  {id:"big_room", label:"Big Room House", cat:"house", era:"2010s", suno:false,
    desc:"数万人収容のフェスティバル会場で最大のインパクトを出すために設計された、極めて分かりやすいダンスミュージック。シンプルで覚えやすいシンセのリフ、長いビルドアップ、そして「ドーン！」と落ちる大きなドロップの繰り返し。テンポはBPM 126〜130。繊細さよりもインパクト、複雑さよりもシンプルさを追求。巨大なスピーカーから放たれる重低音と花火や照明の演出で、フェスの群衆を一斉にジャンプさせる。体験型エンターテイメントとしての音楽。",
    roots_story:"2010年代前半、Hardwell、Dimitri Vegas & Like Mike、Martin Garrixらオランダ・ベルギーのDJ/プロデューサーが確立。Martin Garrixが17歳で発表した「Animals」(2013)がジャンルを象徴する大ヒットとなった。Tomorrowland、Ultra Music Festivalなどの巨大EDMフェスティバルの成長と完全にシンクロしており、フェスのメインステージで最大のインパクトを出すことに最適化されたスタイル。Spinnin' Records、Revealed Recordingsが主要レーベル。2010年代半ばにはピークを過ぎ、より多様なサウンドへシフトしていった。"},

  {id:"moombahton", label:"Moombahton", cat:"house", era:"2010", suno:true,
    desc:"レゲトンのゆったりしたデンボウリズム（ドッ・カッ・ドド・カッ）をハウスのプロダクションで磨き上げた、腰が勝手に動くラテン系ダンスミュージック。テンポはBPM 108前後とハウスよりかなり遅く、その分ベースの一発一発が重く響く。シンセのキラキラした音色とラテン的なパーカッションが夏の空気を運ぶ。攻撃的すぎず、おしゃれすぎず、老若男女が自然に体を揺らせる間口の広さがある。BBQパーティーやプールサイドが似合う陽気な音楽。",
    roots_story:"2009年、アメリカのDJ/プロデューサーDave Nadaがパーティーで思いつきでDutch Houseのトラックを半分のテンポ（BPM 108）に落としてプレイしたところ、予想外にフロアが盛り上がった。レゲトンのテンポと一致したこの発見から「Moombahton」が命名された（レゲトンの曲「Moombah」に由来）。Dillon Francis、Munchi（オランダ）がスタイルを発展。Major Lazer（Diplo）はムーンバートンの要素を取り入れてグローバルヒットを連発し、ジャンルの知名度を大きく上げた。ラテン音楽とEDMの架け橋となった。"},

  // テクノ系
  {id:"detroit_techno", label:"Detroit Techno", cat:"techno", era:"1985", suno:false,
    desc:"機械的な正確さと人間的な感情が共存する、未来的でメランコリックな電子音楽。シンセサイザーのクリスタルのような音色、精密に打ち込まれた4つ打ちビート、深いリバーブに包まれたパッドが、荒廃した工業都市デトロイトの寂寥感と未来への希望を同時に表現する。テンポはBPM 125〜135。冷たいのに温かい、機械的なのに感情的という矛盾がこの音楽の核心。宇宙と都市の風景が重なる、孤独で美しいサウンド。",
    roots_story:"1985年、デトロイトの3人の高校の同級生「ベルヴィル・スリー」がジャンルを創始。Juan Atkins「No UFOs」(1985)が最初のテクノレコードとされる。KraftwerkとParliament/Funkadelicを等しく愛した彼らは、ヨーロッパの電子音楽とアメリカのファンクを融合させた。Derrick May「Strings of Life」(1987)は「テクノの国歌」と呼ばれ、ピアノの旋律が機械ビートの上で感動的に響く名曲。Kevin Saundersonは「Big Fun」をポップヒットさせた。彼らの音楽がイギリス・ヨーロッパに渡り、ベルリンを中心とした世界的なテクノシーンを生んだ。"},

  {id:"techno", label:"Techno", cat:"techno", era:"1988", suno:false,
    desc:"4つ打ちキックの反復を基盤に、シンセサイザーの無機質な音色とミニマルな構成で構築されるダンスミュージック。同じパターンが延々と繰り返される中で、微細な音の変化やフィルターの開閉が催眠的なトランス状態を生む。テンポはBPM 125〜145と幅広い。装飾を排した禁欲的なサウンドで、歌やメロディはほぼない。深夜のクラブで大音量に身を委ねると、体がビートに同期して思考が消える没入体験が得られる。暗い箱の中で踊り続けるための機能的音楽。",
    roots_story:"デトロイトで誕生したテクノが1988年頃にヨーロッパに渡り、特にベルリンの壁崩壊(1989)後の旧東ベルリンで爆発的に広がった。放棄された建物が不法クラブとなり、東西統合の混乱と自由のエネルギーがテクノと結びついた。Tresorクラブ(1991年開店)がベルリンテクノの拠点となり、Jeff Mills、Robert Hood（デトロイト勢）とSven Väth、Richie Hawtin（ヨーロッパ勢）が交流。Berghainクラブ（2004年〜）は世界最高峰のテクノクラブとして君臨。Love Paradeフェスティバル(1989〜)は100万人以上を集める社会現象に。テクノはベルリンの文化的アイデンティティそのものとなった。"},

  {id:"acid_techno", label:"Acid Techno", cat:"techno", era:"1988", suno:true,
    desc:"TB-303のうねるアシッドサウンドをテクノの硬質なビートに乗せた、攻撃的でサイケデリックなスタイル。グニョグニョと歪みながらフィルターが開閉するベースラインが脳を直接揺さぶり、正確無比な4つ打ちキックが体を前に押し出す。テンポはBPM 130〜145とテクノの中でもやや速め。アシッドハウスのトリッピーさとテクノの硬さが共存し、暗いクラブで浴びると視覚的な効果すら感じるような強烈な音響体験。容赦ない反復が恍惚を生む。",
    roots_story:"アシッドハウスの発明（1987年）とほぼ同時に、TB-303のサウンドをよりハードでテクノ寄りに使うアーティストが現れた。ロンドンではSpiral Tribe（フリーパーティー集団）がアシッドテクノをスクワットパーティーやフリーレイブで演奏し、体制への抵抗の音楽としての側面を持った。Chris Liberator、Dave the Drummerらがロンドンのアシッドテクノシーンを牽引。Hardfloorはドイツからよりメロディアスなアシッドテクノを発信。Stay Up Foreverレーベルがジャンルの拠点に。現在もアンダーグラウンドシーンで根強い人気がある。"},

  {id:"hard_techno", label:"Hard Techno", cat:"techno", era:"1990s", suno:true,
    desc:"テクノの反復ビートをより速く、よりラウドに、より攻撃的にしたスタイル。歪んだキックドラムが腹にズシンと来る重量感で連打され、金属的なパーカッションが容赦なく叩きつける。テンポはBPM 140〜155と速く、エネルギーの放出を全力で追求する。繊細さゼロ、容赦なし。大音量で浴びると音が物理的な力に変わり、体が否応なく動かされる。暗くて激しいクラブの奥で、汗まみれになって踊り続ける人々のための音楽。",
    roots_story:"1990年代、テクノの速度と激しさを追求するアーティストが増加。フランクフルトのシーンが初期の中心で、Sven Väthが拠点としたCocoonクラブが重要な役割を果たした。Chris Liebing、Adam Beyerがハードテクノの代名詞的存在に。Ben Sims、Speedy Jも重要なアーティスト。2000年代にはAmalgamate、CLR（Chris Liebing Records）、Drumcode（Adam Beyer）が主要レーベルとして確立。2020年代には若い世代のDJ（VTSS、999999999等）がさらに過激なスタイルを追求し、ジャンルは再び勢いを増している。"},

  {id:"minimal_techno", label:"Minimal Techno", cat:"techno", era:"1990s", suno:true,
    desc:"音を極限まで削ぎ落とし、最小限の要素だけで成立するテクノ。キック、ハイハット、1〜2種類のパーカッション音だけで構成されることも珍しくない。その「ない」ことの美学の中で、わずかな音の変化——フィルターの微調整、クリックの位置のずれ——が巨大な出来事になる。テンポはBPM 120〜130でゆったりめ。聴き始めは「何もない」と感じるが、耳が慣れると微細な変化の宇宙が見えてくる。静寂の中の豊かさ、引き算の美学。",
    roots_story:"1990年代半ば、ベルリンのBasic Channel（Moritz von Oswald & Mark Ernestus）がダブの残響感とテクノのミニマリズムを融合させ、ダブテクノ/ミニマルの方向性を示した。Robert Hood（デトロイト）は「Minimal Nation」(1994)で「ミニマルテクノ」という言葉を定義。Richie HawtinはPlastikmanプロジェクトで極端にストリップダウンしたテクノを追求。2000年代にはRicardo Villalobos、Luciano（チリ）がミニマルにラテンの要素を加えた「ミニマルハウス」で世界を席巻。ベルリンのBerghain/Panorama Barがミニマルテクノの聖地として機能した。"},

  {id:"industrial_techno", label:"Industrial\nTechno", cat:"techno", era:"1990s", suno:true,
    desc:"工場の轟音と機械の振動をそのままダンスフロアに持ち込んだような、極めて攻撃的なテクノ。歪んだキック、金属を叩きつけるようなパーカッション、不穏なノイズがBPM 130〜145で容赦なく叩きつける。インダストリアルの不気味さ・暴力性とテクノの反復構造が完全に融合しており、工業地帯の灰色の美学がダンスミュージックになったようなサウンド。暗闘的な緊張感と圧倒的な音圧の中に、不思議な快感がある。",
    roots_story:"1990年代、インダストリアル音楽とテクノの合流が本格化。Surgeon（バーミンガム）とRegis（同）がBirmingham Technoとして知られるハードで暗いスタイルを確立し、Downwardsレーベルを設立。Ansome、Blawan、Paula Templeらが2010年代に新世代のインダストリアルテクノを牽引。Perc Traxレーベルも重要。2010年代後半にはBerghainクラブのブッキングポリシーの影響もあり、インダストリアルテクノはテクノシーン全体のトレンドとなった。Kobosil、SPFDJ、I Hate Modelsらが現在の中心アーティスト。"},

  {id:"dub_techno", label:"Dub Techno", cat:"techno", era:"1994", suno:true,
    desc:"テクノのミニマルなビートにダブの深い残響（リバーブとディレイ）を重ねた、瞑想的で幻想的なサウンド。コードが霧のように空間に広がり、キックとハイハットが奥まった場所からぼんやりと聞こえてくる。すべての音がエコーの海に溶け込み、輪郭がぼやけていく心地よさがある。テンポはBPM 120〜128でゆったり。深夜から明け方にかけて、意識が朦朧とする時間帯に完璧にフィットする。眠りに落ちる直前の意識の状態を音にしたような音楽。",
    roots_story:"1994年、ベルリンのBasic Channel（Moritz von Oswald & Mark Ernestus）が自主レーベルから発表した一連の12インチシングルでダブテクノを確立。ジャマイカのダブのエコー処理とデトロイトテクノのミニマリズムを融合させた独自のサウンドは、一聴してそれとわかる唯一無二のものだった。Chain Reactionレーベル（Basic Channelの傘下）にはMikkel Metal、Vladislav Delay、Monolakeらが集結。DeepChord（アメリカ）は「Liumin」(2007)で環境音とダブテクノを融合。日本のShinichi Atobe「Ship-Scope」(2001)も傑作とされる。"},

  {id:"intelligent_techno", label:"Intelligent\nTechno", cat:"techno", era:"1990s", suno:true,
    desc:"踊ることよりも「聴くこと」に重きを置いたテクノ。複雑に組み合わされたリズムパターン、予測不能な音の配置、緻密な音響デザインが知的好奇心を刺激する。ビートはあるが不規則で、聴いていると脳が音のパズルを解こうとする面白さがある。テンポは様々。イヤホンで細部まで聴き込むと新しい発見がある、何度聴いても飽きない奥深さ。踊るためではなく考えるための電子音楽。ソファに座って深夜に一人で聴くのが最高のシチュエーション。",
    roots_story:"1990年代初頭、Warp Records（イギリス）が「Artificial Intelligence」シリーズ(1992〜)をリリースし、「ソファで聴く電子音楽」というコンセプトを打ち出した。Autechre、Aphex Twin、Black Dog、B12らが所属し、IDM（Intelligent Dance Music）というジャンル名が生まれた。Aphex Twin「Selected Ambient Works 85-92」(1992)は電子音楽史上の傑作。Autechreは極端に複雑なリズムプログラミングで知られ、作品ごとにさらに抽象的な方向へ進んだ。Boards of Canada、Plaid、Squarepusherらもジャンルの重要人物。"},

  {id:"schranz", label:"Schranz", cat:"techno", era:"1990s", suno:true,
    desc:"テクノをさらにハードに、さらに速く、さらにうるさくした極限のスタイル。極端に歪んだキック、金切り声のようなシンセ、鉄板を引っかくようなノイズがBPM 145〜160の超高速で叩きつけられる。「シュランツ」はドイツ語でギシギシ軋む音を表す擬音語。繊細さは皆無だが、その暴力的な音圧の中に奇妙な爽快感がある。巨大なサウンドシステムで浴びると、音が皮膚を突き抜けて内臓を揺さぶる物理的な体験になる。",
    roots_story:"1990年代半ば、ドイツ（特にフランクフルト周辺）のハードテクノシーンから派生。Chris Liebing、DJ Rush（シカゴ出身だがドイツで活躍）が初期の主要アーティスト。名前の由来はドイツのDJ Zenkerが使い始めた俗語とされる。StreetparadeやMayday等のドイツ/オーストリアの大型レイブで特に人気を博した。CLR Records、Works Recordsが主要レーベル。2000年代以降は「ハードテクノ」という呼称に吸収されていく傾向があるが、その超攻撃的な美学は現在のインダストリアルテクノにも受け継がれている。"},
  {id:"techno_kayo",     label:"Techno Kayō",     cat:"techno", era:"1980s", suno:true,  desc:"日本の歌謡曲とテクノが融合。YMOが代表的存在。"},

  // トランス系
  {id:"trance",          label:"Trance",          cat:"trance", era:"1990", suno:false, desc:"繰り返しのメロディとビルドアップ・ドロップ構造。トランス状態を誘う音楽。"},
  {id:"goa_trance",      label:"Goa Trance",      cat:"trance", era:"1989", suno:true,  desc:"インドのゴア発。サイケデリックな電子音とスピリチュアルな雰囲気。"},
  {id:"psytrance",       label:"Psychedelic\nTrance", cat:"trance", era:"1990s", suno:true, desc:"ゴアトランスから派生。より多様化・高速化した形。"},
  {id:"acid_trance",     label:"Acid Trance",     cat:"trance", era:"1992", suno:true,  desc:"TB-303のアシッドサウンドとトランスが融合。"},
  {id:"euro_trance",     label:"Euro Trance",     cat:"trance", era:"1995", suno:true,  desc:"ヨーロッパ発のポップなトランス。キャッチーなメロディ。"},
  {id:"euphoric_trance", label:"Euphoric Trance", cat:"trance", era:"1990s", suno:true,  desc:"高揚感・感動を最大化したトランス。"},
  {id:"nrg_trance",      label:"NRG Trance",      cat:"trance", era:"1990s", suno:true,  desc:"エネルギッシュで速いトランス。Hard Tranceと近い。"},
  {id:"progressive_trance",label:"Progressive\nTrance",cat:"trance", era:"1993", suno:false, desc:"長い展開とグラデーション的なビルドアップ。"},

  {s:"j_eurobeat", t:"parapara_eurobeat",w:70, desc:"J-ユーロビートの文化的文脈"},

  // EDM系
  {s:"chicago_house",t:"edm",           w:35, desc:"ハウスはEDMの重要な柱"},
  {s:"trance",     t:"edm",             w:30, desc:"トランスはEDMの重要な柱"},
  {s:"big_room",   t:"festival_edm",    w:70, desc:"ビッグルームのフェス展開"},
  {s:"festival_edm",t:"melodic_edm",    w:60, desc:"感動的な方向"},
  {s:"festival_edm",t:"dark_edm",       w:55, desc:"ダークな方向"},
  {s:"festival_edm",t:"heavy_edm",      w:55, desc:"ヘビーな方向"},
  {s:"festival_edm",t:"pop_edm",        w:60, desc:"ポップな方向"},

  // シンセウェーブ系
  {s:"synthwave",  t:"retrowave",       w:85, desc:"ほぼ同義語のスタイル"},
  {s:"synthwave",  t:"darksynth",       w:60, desc:"シンセウェーブの暗い方向"},
  {s:"synthwave",  t:"sovietwave",      w:50, desc:"旧ソ連美学との融合"},
  {s:"vaporwave",  t:"synthwave",       w:40, desc:"ヴェイパーウェーブとシンセウェーブの相互影響"},

  // チップチューン
  {s:"experimental_elec",t:"chiptune",  w:45, desc:"ゲーム機音源の電子音楽化"},
];

// ===== INFLUENCE SCORE → NODE RADIUS =====
NODES.forEach(n => {
  n.influence = LINKS.filter(l => l.s === n.id).reduce((sum, l) => sum + l.w, 0);
});
const maxInfluence = Math.max(...NODES.map(n => n.influence));
const rScale = d3.scaleSqrt().domain([0, maxInfluence]).range([28, 112]);
NODES.forEach(n => { n.r = Math.max(28, rScale(n.influence)); });

// ===== CATEGORY COLORS =====
const CAT_COLOR = {
  roots:      "#888",
  early_elec: "#5C7CFA",
  synthpop:   "#845EF7",
  industrial: "#607080",
  ambient:    "#607D8B",
  house:      "#9C27B0",
  techno:     "#1565C0",
  trance:     "#00838F",
  hardcore:   "#C62828",
  dnb:        "#E65100",
  dubstep:    "#5D4037",
  eurodance:  "#AD1457",
  edm:        "#F57F17",
  synthwave:  "#6A1B9A",
  hiphop:     "#2E7D32",
  chiptune:   "#00695C",
};

// ===== GRAPH SETUP =====
const svg = d3.select("#graph");
const w = window.innerWidth, h = window.innerHeight;
const g = svg.append("g");

svg.call(d3.zoom().scaleExtent([0.05, 6]).on("zoom", e => g.attr("transform", e.transform)));

// arrow markers per category
Object.entries(CAT_COLOR).forEach(([cat, color]) => {
  svg.append("defs").append("marker")
    .attr("id", `arrow-${cat}`)
    .attr("viewBox", "0 -4 8 8")
    .attr("refX", 8).attr("refY", 0)
    .attr("markerWidth", 5).attr("markerHeight", 5)
    .attr("orient", "auto")
    .append("path")
    .attr("d", "M0,-4L8,0L0,4")
    .attr("fill", color)
    .attr("opacity", 0.7);
});

const nodeMap = Object.fromEntries(NODES.map(n => [n.id, n]));

const linkData = LINKS.map(l => ({...l, source: l.s, target: l.t}));

const simulation = d3.forceSimulation(NODES)
  .force("link", d3.forceLink(linkData).id(d=>d.id).distance(d => 280 - d.w * 0.8).strength(0.3))
  .force("charge", d3.forceManyBody().strength(-900))
  .force("center", d3.forceCenter(w/2, h/2))
  .force("collision", d3.forceCollide(d => d.r + 20))
  .alphaDecay(0.02);

const link = g.append("g").selectAll("line")
  .data(linkData)
  .join("line")
  .attr("class", "link")
  .attr("stroke", d => CAT_COLOR[nodeMap[d.s]?.cat] || "#555")
  .attr("stroke-width", d => 0.5 + d.w / 60)
  .attr("marker-end", d => `url(#arrow-${nodeMap[d.s]?.cat || "roots"})`);

// edge label group: background rect + text
const linkLabelG = g.append("g").selectAll("g")
  .data(linkData)
  .join("g");

linkLabelG.append("rect")
  .attr("class", "link-label-bg")
  .attr("rx", 3).attr("ry", 3)
  .attr("width", 48).attr("height", 24)
  .attr("x", -24).attr("y", -15);

linkLabelG.append("text")
  .attr("class", "link-label")
  .attr("text-anchor", "middle")
  .attr("dominant-baseline", "central")
  .text(d => d.w + "%");

const node = g.append("g").selectAll("g")
  .data(NODES)
  .join("g")
  .attr("class", "node")
  .call(d3.drag()
    .on("start", (e,d) => { if(!e.active) simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
    .on("drag",  (e,d) => { d.fx=e.x; d.fy=e.y; })
    .on("end",   (e,d) => { if(!e.active) simulation.alphaTarget(0); }));

node.append("circle")
  .attr("r", d => d.r)
  .attr("fill", d => CAT_COLOR[d.cat] || "#555")
  .attr("class", d => d.suno ? "suno" : "")
  .attr("fill-opacity", d => d.suno ? 0.92 : 0.72);

node.append("text")
  .text(d => d.label.split("\n")[0])
  .attr("dy", d => d.label.includes("\n") ? -3 : 1)
  .style("font-size", d => Math.max(18, Math.min(26, d.r * 0.5)) + "px")
  .style("font-weight", d => d.suno ? "700" : "400")
  .style("fill", d => d.suno ? "#FFD700" : "#eee");

node.filter(d => d.label.includes("\n")).append("text")
  .text(d => d.label.split("\n")[1])
  .attr("dy", 22)
  .style("font-size", d => Math.max(18, Math.min(26, d.r * 0.5)) + "px")
  .style("font-weight", d => d.suno ? "700" : "400")
  .style("fill", d => d.suno ? "#FFD700" : "#eee");

// hover: 軽量ツールチップ（ジャンル名のみ）
const tooltip = document.getElementById("tooltip");
node.on("mouseover", (e, d) => {
  tooltip.textContent = d.label.replace("\n", " ");
  tooltip.style.display = "block";
  tooltip.style.left = (e.pageX + 14) + "px";
  tooltip.style.top  = (e.pageY - 10) + "px";
})
.on("mousemove", e => {
  tooltip.style.left = (e.pageX + 14) + "px";
  tooltip.style.top  = (e.pageY - 10) + "px";
})
.on("mouseout", () => tooltip.style.display = "none");

// click: 右サイドパネルを開く
const panel     = document.getElementById("side-panel");
const spTag     = document.getElementById("sp-tag");
const spCopy    = document.getElementById("sp-copy");
const spClose   = document.getElementById("sp-close");
const spSunoW   = document.getElementById("sp-suno-wrap");
const spEra     = document.getElementById("sp-era");
const spDesc    = document.getElementById("sp-desc");
const spIn      = document.getElementById("sp-in");
const spOut     = document.getElementById("sp-out");
const spYt      = document.getElementById("sp-yt-link");

let dragMoved = false;
node.on("mousedown.drag", null);  // 既存drag再バインド前にリセット
node.call(d3.drag()
  .on("start", (e,d) => { dragMoved=false; if(!e.active) simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
  .on("drag",  (e,d) => { dragMoved=true; d.fx=e.x; d.fy=e.y; })
  .on("end",   (e,d) => { if(!e.active) simulation.alphaTarget(0); }));

node.on("click", (e, d) => {
  if(dragMoved) return; // ドラッグ後のクリックは無視
  e.stopPropagation();

  const name = d.label.replace("\n", " ");
  spTag.textContent = name;
  spSunoW.innerHTML = d.suno ? '<span class="sp-suno">Suno有効タグ</span>' : '';
  spEra.textContent  = d.era ? `発祥時期：${d.era}` : '';
  spDesc.textContent = d.desc || '（説明なし）';

  // ルーツの経緯
  const spRootsStory = document.getElementById("sp-roots-story");
  const spRootsStorySec = document.getElementById("sp-roots-story-sec");
  if (d.roots_story) {
    spRootsStory.textContent = d.roots_story;
    spRootsStorySec.style.display = '';
  } else {
    spRootsStorySec.style.display = 'none';
  }

  // ルーツ
  const incoming = LINKS.filter(l => l.t === d.id);
  spIn.innerHTML = incoming.length
    ? incoming.map(l => `<div class="sp-influence-row"><span class="pct">${l.w}%</span><b>${nodeMap[l.s]?.label?.replace("\n"," ")}</b><span class="reason">— ${l.desc||''}</span></div>`).join('')
    : '<span style="color:#666">なし（ルーツジャンル）</span>';

  // 影響先
  const outgoing = LINKS.filter(l => l.s === d.id);
  spOut.innerHTML = outgoing.length
    ? outgoing.map(l => `<div class="sp-influence-row"><span class="pct">${l.w}%</span><b>${nodeMap[l.t]?.label?.replace("\n"," ")}</b><span class="reason">— ${l.desc||''}</span></div>`).join('')
    : '<span style="color:#666">（データなし）</span>';

  // YouTube
  const q = encodeURIComponent(name + " music genre");
  spYt.href = `https://www.youtube.com/results?search_query=${q}`;
  spYt.textContent = `▶ YouTubeで「${name}」を検索`;

  // コピー
  spCopy.onclick = () => { navigator.clipboard.writeText(d.id).then(() => { spCopy.textContent='コピー済み'; setTimeout(()=>spCopy.textContent='コピー', 1500); }); };

  panel.style.display = "block";
});

spClose.onclick = () => panel.style.display = "none";
svg.on("click", () => panel.style.display = "none");

simulation.on("tick", () => {
  link
    .attr("x1", d => d.source.x)
    .attr("y1", d => d.source.y)
    .attr("x2", d => {
      const dx = d.target.x - d.source.x, dy = d.target.y - d.source.y;
      const dist = Math.sqrt(dx*dx + dy*dy) || 1;
      const r = d.target.r + 7;
      return dist > r ? d.target.x - dx/dist * r : d.target.x;
    })
    .attr("y2", d => {
      const dx = d.target.x - d.source.x, dy = d.target.y - d.source.y;
      const dist = Math.sqrt(dx*dx + dy*dy) || 1;
      const r = d.target.r + 7;
      return dist > r ? d.target.y - dy/dist * r : d.target.y;
    });
  node.attr("transform", d => `translate(${d.x},${d.y})`);
  linkLabelG.attr("transform", d =>
    `translate(${(d.source.x + d.target.x)/2},${(d.source.y + d.target.y)/2})`
  );
});

// Search
document.getElementById("search").addEventListener("input", e => {
  const q = e.target.value.toLowerCase();
  node.classed("highlighted", d => q.length > 0 && (d.id.includes(q) || d.label.toLowerCase().includes(q)));
  node.select("circle").attr("opacity", d => {
    if(!q) return 1;
    return (d.id.includes(q) || d.label.toLowerCase().includes(q)) ? 1 : 0.25;
  });
});

// Legend hover: カテゴリにカーソルを乗せると対応ノードをパルス点灯、他を暗く
document.querySelectorAll('.legend-item[data-cat]').forEach(item => {
  const cat = item.dataset.cat;
  item.addEventListener('mouseenter', () => {
    if (cat === 'suno') {
      node.classed('cat-highlight', d => d.suno);
      node.classed('cat-dim',       d => !d.suno);
    } else {
      node.classed('cat-highlight', d => d.cat === cat);
      node.classed('cat-dim',       d => d.cat !== cat);
    }
  });
  item.addEventListener('mouseleave', () => {
    node.classed('cat-highlight', false);
    node.classed('cat-dim',       false);
  });
});

// Filter
document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", e => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    const f = btn.dataset.filter;
    node.style("display", d => {
      if(f === "all") return null;
      if(f === "suno") return d.suno ? null : "none";
      return null;
    });
    link.style("display", d => {
      if(f !== "suno") return null;
      return (nodeMap[d.s]?.suno && nodeMap[d.t]?.suno) ? null : "none";
    });
  });
});
</script>
</body>
</html>
