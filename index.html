<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>音楽ジャンルルーツ辞典（電子音楽系）</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", sans-serif; background: #1a1a2e; color: #eee; overflow: hidden; }

#header { position: fixed; top: 0; left: 0; right: 0; z-index: 20; background: rgba(15,15,26,0.92); padding: 10px 16px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid #333; }
#header h1 { font-size: 15px; font-weight: 700; color: #fff; white-space: nowrap; }
#header .sub { font-size: 12px; color: #888; }

#left-sidebar { position: fixed; top: 50px; left: 14px; bottom: 10px; z-index: 20; width: 200px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
#legend { background: rgba(15,15,26,0.88); border: 1px solid #333; border-radius: 8px; padding: 10px 12px; font-size: 12px; }
#legend h3 { font-size: 11px; color: #aaa; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.legend-item { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; }
.legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.legend-label { color: #ccc; font-size: 11px; }
.legend-sep { border-top: 1px solid #333; margin: 8px 0; }
.suno-ring { width: 12px; height: 12px; border-radius: 50%; border: 2px solid #FFD700; flex-shrink: 0; }

#controls { background: rgba(15,15,26,0.88); border: 1px solid #333; border-radius: 8px; padding: 10px 12px; font-size: 12px; }
#controls h3 { font-size: 11px; color: #aaa; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
#search { width: 100%; padding: 5px 8px; background: #1a1a2e; border: 1px solid #444; border-radius: 5px; color: #eee; font-size: 12px; margin-bottom: 8px; }
#search::placeholder { color: #666; }
.filter-btn { display: inline-block; padding: 3px 8px; border-radius: 4px; border: 1px solid #444; background: #1a1a2e; color: #ccc; font-size: 11px; cursor: pointer; margin: 2px 2px 2px 0; }
.filter-btn.active { background: #FFD700; color: #000; border-color: #FFD700; font-weight: 700; }

/* hover tooltip (軽量版) */
#tooltip { position: fixed; background: rgba(20,20,40,0.92); border: 1px solid #555; border-radius: 6px; padding: 6px 10px; font-size: 12px; pointer-events: none; display: none; z-index: 30; white-space: nowrap; color: #eee; }

/* 右サイドパネル */
#side-panel { position: fixed; right: 0; top: 50px; bottom: 0; width: 320px; background: #16162a; border-left: 1px solid #444; padding: 0; overflow-y: auto; z-index: 25; display: none; font-size: 13px; }
#sp-header { position: sticky; top: 0; background: #1e1e38; padding: 14px 16px 10px; border-bottom: 1px solid #333; display: flex; align-items: flex-start; gap: 8px; }
#sp-tag { font-size: 18px; font-weight: 700; color: #fff; flex: 1; line-height: 1.3; }
#sp-copy { padding: 4px 10px; background: #2a2a50; border: 1px solid #555; border-radius: 5px; color: #ccc; font-size: 11px; cursor: pointer; white-space: nowrap; }
#sp-copy:hover { background: #3a3a70; color: #fff; }
#sp-close { padding: 4px 8px; background: none; border: none; color: #888; font-size: 18px; cursor: pointer; line-height: 1; }
#sp-close:hover { color: #fff; }
#sp-body { padding: 14px 16px; }
.sp-suno { display: inline-block; background: #FFD700; color: #000; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px; margin-bottom: 10px; }
.sp-era { font-size: 11px; color: #888; margin-bottom: 10px; }
.sp-section { margin-bottom: 14px; }
.sp-section h4 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #888; margin-bottom: 6px; border-bottom: 1px solid #2a2a50; padding-bottom: 4px; }
.sp-section p { color: #ccc; line-height: 1.6; font-size: 13px; }
.sp-influence-row { display: flex; align-items: baseline; gap: 6px; margin-bottom: 4px; font-size: 12px; color: #bbb; }
.sp-influence-row .pct { font-weight: 700; color: #7ecfff; font-size: 11px; min-width: 32px; }
.sp-influence-row .reason { color: #888; font-size: 11px; }
#sp-yt-link { display: block; margin-top: 6px; padding: 8px 12px; background: #cc0000; color: #fff; border-radius: 6px; text-decoration: none; font-size: 13px; font-weight: 700; text-align: center; }
#sp-yt-link:hover { background: #e60000; }

svg { width: 100vw; height: 100vh; }
.link { stroke-opacity: 0.45; fill: none; }
.link:hover { stroke-opacity: 0.9; }
.node circle { cursor: pointer; stroke-width: 2; }
.node circle.suno { stroke: #FFD700; stroke-width: 2.5; }
.node text { pointer-events: none; font-size: 11px; fill: #eee; text-anchor: middle; dominant-baseline: central; }
.node.highlighted circle { stroke: #fff !important; stroke-width: 3 !important; }
.link-label { font-size: 10px; fill: #fff; pointer-events: none; font-weight: 700; }
.link-label-bg { fill: rgba(26,26,46,0.82); pointer-events: none; }

@keyframes cat-pulse {
  0%   { stroke: #ffffff; stroke-width: 3; }
  50%  { stroke: #ffffff; stroke-width: 8; filter: drop-shadow(0 0 10px #fff) drop-shadow(0 0 20px rgba(255,255,255,0.6)); }
  100% { stroke: #ffffff; stroke-width: 3; }
}
.node.cat-highlight circle { animation: cat-pulse 0.85s ease-in-out infinite !important; stroke: #fff !important; }
.node.cat-dim { opacity: 0.1; pointer-events: none; }
.legend-item[data-cat] { cursor: pointer; padding: 2px 5px; border-radius: 4px; margin-left: -5px; transition: background 0.15s; }
.legend-item[data-cat]:hover { background: rgba(255,255,255,0.12); }
</style>
</head>

<script>
// ===== DATA =====
const NODES = [
  // ルーツ
  {id:"jazz", label:"Jazz", cat:"roots", era:"1900s", suno:false,
    desc:"スウィング感のあるリズムに乗せた即興演奏（アドリブ）が最大の魅力。演奏者がその場の空気で旋律を自由に変え、予測できない展開が生まれるのがジャズ独特の面白さ。コード進行は複雑でおしゃれな響きを持ち、サックスやトランペットの艶やかな音色がムードを作る。テンポはスローバラードからアップテンポまで幅広いが、どのスタイルにも共通する「揺れるグルーヴ」がある。夜のバーが似合う大人びた雰囲気で、時にメランコリック、時に高揚感にあふれる。",
    roots_story:"19世紀末〜20世紀初頭、ニューオーリンズの黒人コミュニティでブルース、ラグタイム、ゴスペル、マーチングバンドの要素が融合して誕生した。Buddy Bolden、King Oliver、Louis Armstrongらが初期のスタイルを確立。1920年代にシカゴ・NYへ広がり「ジャズ・エイジ」と呼ばれる社会現象に。Duke Ellington、Charlie Parker、Miles Davisらが時代ごとに革新を起こし、ビバップ→クールジャズ→フリージャズと進化。その即興精神とハーモニーの豊かさは、後のあらゆるポピュラー音楽の基盤となった。"},

  {id:"blues", label:"Blues", cat:"roots", era:"1900s", suno:false,
    desc:"哀愁と情感を込めたギターとボーカルが中心の音楽。「泣き」のギターフレーズ、ブルーノートと呼ばれる独特の音階が醸し出す切なさが最大の特徴。テンポはゆったりめで、同じコード進行をくり返しながら感情を深く掘り下げていく。声を絞り出すような歌い方、ギターを泣かせるようなベンド（チョーキング）、ハーモニカのむせび泣く音色が胸に刺さる。晴れた日でもどこか物悲しい空気を纏っており、聴く人の心の奥にじんわり響く音楽。",
    roots_story:"19世紀後半、ミシシッピ・デルタ地域のアフリカ系アメリカ人の労働歌（ワークソング）、フィールドハラー、スピリチュアルが融合して形成された。Robert Johnsonの伝説的な「クロスロード」の逸話に象徴されるデルタ・ブルースが原型。1940年代にMuddy WatersやHowlin' Wolfがシカゴに移住し、エレキギターとバンド編成を導入してシカゴ・ブルースを確立。B.B. Kingは洗練されたギタープレイで「ブルースの王」と呼ばれた。このシカゴ・ブルースをイギリスの若者が聴いてロックンロールが生まれ、音楽史全体を変えた。"},

  {id:"funk", label:"Funk", cat:"roots", era:"1960s", suno:false,
    desc:"とにかく体が動く、リズム最優先の音楽。1拍目にズドンと来るキックとベースの「うねり」が全身を揺さぶる。スラップベースのバチバチした音、ギターのチャカチャカしたカッティング、ホーンセクションの分厚い咆哮が絡み合って強烈なグルーヴを生む。メロディよりもリズムの気持ちよさを追求しており、同じリフを延々と繰り返しながらどんどんテンションが上がっていく快感がある。底抜けに明るくて汗臭い、踊るための音楽。",
    roots_story:"1960年代半ば、James Brownが「Papa's Got a Brand New Bag」(1965)で従来のR&Bから脱却し、リズムを前面に押し出した革命的なサウンドを生み出した。「ファンクの帝王」と呼ばれた彼の「1拍目を強調する」スタイルは音楽の概念を変えた。Sly and the Family Stoneはサイケデリック・ロックと融合させ、Parliament/FunkadelicのGeorge Clintonは宇宙的な世界観の「Pファンク」を確立。Bootsy Collins、Earth, Wind & Fire、Tower of Powerらがジャンルを拡張した。ファンクのブレイクビーツは後にヒップホップのサンプリング素材として無数に引用された。"},

  {id:"disco", label:"Disco", cat:"roots", era:"1970s", suno:false,
    desc:"キラキラした華やかさと高揚感にあふれたダンスミュージック。「ドン・ドン・ドン・ドン」と一定のテンポで刻む4つ打ちキック、シャカシャカ鳴り続けるハイハット、オクターブで跳ねるベースラインが基本骨格。その上にストリングス（弦楽器）の煌びやかなアレンジとソウルフルなボーカルが乗り、ミラーボールの下で踊り明かすための音楽を作り出す。テンポはBPM 110〜130で、速すぎず遅すぎない踊りやすさが心地よい。開放的で多幸感のある雰囲気が最大の魅力。",
    roots_story:"1970年代初頭、NYのゲイ・黒人・ラテン系コミュニティのアンダーグラウンドクラブで誕生。DJ David Mancusoの「The Loft」やNicky Sianoの「The Gallery」が初期の拠点。Donna Summer「I Feel Love」(1977, Giorgio Moroder制作)はシンセサイザーを全面導入し電子音楽への橋渡しとなった。Bee Gees「Saturday Night Fever」(1977)で大衆化。しかし1979年の「Disco Demolition Night」事件に象徴されるバックラッシュで地上から姿を消す。だがシカゴのDJ達がディスコのビートをシンセで再構築し、ハウスミュージックとして再生させた。"},

  {id:"soul", label:"Soul", cat:"roots", era:"1960s", suno:false,
    desc:"ボーカルの感情表現がすべての中心にある音楽。歌い手が魂（ソウル）を込めて声を絞り出し、ささやきからシャウトまで感情の振り幅を全開で表現する。メリスマ（一つの音符を細かく揺らす節回し）やファルセット（裏声）を自在に使いこなす歌唱力が聴きどころ。バックはオルガン、ホーンセクション、温かいコーラスが歌を包み込む。テンポはミッドテンポが多く、バラードでは切なく胸に迫り、アップテンポでは喜びが爆発する。「人間の声そのものが楽器」と感じさせる、情感の塊のような音楽。",
    roots_story:"1950年代後半、Ray Charlesがゴスペルの歌唱スタイルを世俗的な歌詞に持ち込み「ソウルの父」と呼ばれた。Sam Cookeは洗練されたポップ寄りのソウルを、James Brownはよりリズミックなソウルを追求（後にファンクへ発展）。1960年代、Motownレコード（デトロイト）はSupremes、Temptations、Marvin Gayeらでポップ市場を制覇。Staxレコード（メンフィス）はOtis Redding、Booker T.らの泥臭いサザンソウルを発信。Aretha Franklinは「ソウルの女王」として君臨した。1970年代にはPhilly Soulが洗練されたストリングスを導入し、これがディスコへの直接の布石となった。"},

  {id:"reggae", label:"Reggae", cat:"roots", era:"1960s", suno:false,
    desc:"裏拍（オフビート）を強調した独特のリズムが最大の個性。ギターやキーボードが「ンチャ・ンチャ」と裏で刻み、その隙間を重く深いベースラインがズーンと埋める。テンポはゆったり（BPM 60〜90）で、南国の陽射しの下でのんびり揺れるような心地よさがある。一聴すると脱力感があるのに、ベースとドラムのコンビネーションには芯の強いグルーヴが宿っている。穏やかさの中に力強いメッセージを秘めた、不思議な包容力を持つ音楽。",
    roots_story:"1960年代後半、ジャマイカでスカ→ロックステディの進化を経て誕生。Toots and the Maytalsが「Do the Reggay」(1968)で初めて「レゲエ」という言葉を使用。Bob Marleyとthe Wailersが世界的なスターとなり、レゲエをグローバルな音楽に押し上げた。「No Woman, No Cry」「One Love」などの楽曲は今も世界中で愛される。同時期にLee \"Scratch\" Perryやking Tubbyがスタジオで録音テープを加工する「ダブ」技法を発明。これはリバーブ、ディレイ、エフェクト処理による音響実験であり、後の電子音楽・リミックス文化の原点となった。"},

  {id:"punk", label:"Punk Rock", cat:"roots", era:"1970s", suno:false,
    desc:"速い・短い・シンプル・うるさい。3コードのパワーコードをかき鳴らし、2分前後の短い曲を全力で叩きつけるロック。演奏技術よりも衝動と態度が重視され、怒りや反抗心をそのまま音にぶつける。ボーカルは叫ぶか吐き捨てるかで、美しく歌おうという気はない。テンポは速く、ドラムはひたすらビートを叩き続ける。聴くと「自分でもできそう」と思わせる敷居の低さがあるのに、そのエネルギーは圧倒的。粗削りで汚いのにカッコいい、反骨精神そのものの音楽。",
    roots_story:"1974〜76年、NYのCBGBというライブハウスでRamones、Television、Patti Smithらが従来のロックの複雑さを拒絶したシンプルで攻撃的な音楽を演奏。ほぼ同時期にロンドンでSex Pistolsが「Anarchy in the U.K.」(1976)でデビューし、社会的衝撃を与えた。マネージャーMalcolm McLarenがファッションと反体制思想を結びつけ、パンクを音楽を超えた文化運動に変えた。The Clashは政治的メッセージとレゲエなど多様な要素を取り入れ「パンクの良心」と呼ばれた。パンクは長くは持たなかったが、そのDIY精神はポストパンク、ニューウェーブ、インダストリアルへ受け継がれ、電子音楽への扉を開いた。"},

  {id:"hiphop", label:"Hip Hop", cat:"roots", era:"1970s", suno:false,
    desc:"ビート（打ち込みのリズム）の上でラップ（韻を踏みながら語る歌唱法）を乗せる音楽。ドラムマシンやサンプリングで作られた重い低音とタイトなビートが土台で、そこにMCの言葉のフロウが絡む。DJのスクラッチ音、既存の曲から切り取ったサンプルのループも重要な音響要素。テンポはBPM 80〜100が主流で、頭を縦に振りたくなる「首振りビート」が気持ちいい。ストリートの空気感、言葉の力強さ、ビートの中毒性が三位一体になった、声とリズムの音楽。",
    roots_story:"1973年8月11日、DJ Kool Hercがブロンクスのアパートのパーティでファンクレコードのブレイク部分（ドラムだけの間奏）を2枚のレコードで交互に繰り返す「ブレイクビーツ」を発明。これがヒップホップの起源とされる。Grandmaster FlashはスクラッチやビートジャグリングなどのDJ技法を開発。Afrika Bambaataaはファンクにシンセサイザーを導入した「Planet Rock」(1982)でエレクトロとヒップホップを架橋した。Run-D.M.C.がロックと融合させメインストリームへ。Public Enemyは政治的メッセージを、N.W.A.はギャングスタ・ラップを確立。サンプリング文化は電子音楽全般のリミックス・マッシュアップ文化の基盤となった。"},

  {id:"newage", label:"New Age", cat:"roots", era:"1970s", suno:false,
    desc:"聴いていると心が静まり、ふわっと浮遊感に包まれるような穏やかな音楽。シンセサイザーの柔らかいパッド音、ピアノやハープの繊細な旋律、水の流れや鳥のさえずりといった自然音が組み合わさる。リズムは控えめか存在せず、メロディはゆったりと反復する。瞑想やヨガ、マッサージのBGMとしてよく使われるが、単なる背景音楽ではなく、聴く人を日常から切り離して穏やかな内面世界へ誘う力がある。明るく透明感のある響きが特徴で、暗さや攻撃性とは無縁の癒やしの音楽。",
    roots_story:"1970年代、Brian Enoのアンビエント実験とは別の流れとして、スピリチュアリズムやニューエイジ思想と結びついた音楽が形成された。ドイツのKlaus Schulze、Tangerine Dreamの電子音楽、日本の喜多郎のシンセサイザー作品が初期の代表格。Windham Hillレコード（1976年設立）がアコースティックなニューエイジを確立し、George Winston、Will Ackermannらがピアノ・ギター主体の作品で人気を得た。Enya「Orinoco Flow」(1988)が世界的ヒットとなりジャンルを大衆化。1987年にはグラミー賞にニューエイジ部門が新設された。スパやヨガスタジオのBGMとしても広く浸透し、後のチルアウト・アンビエント文化の下地を作った。"},

  {id:"classical", label:"Classical", cat:"roots", era:"~1900", suno:false,
    desc:"オーケストラ（管弦楽団）が奏でる壮大で格式高い音楽。バイオリン、チェロ、フルート、トランペットなど数十種の楽器が楽譜に従って精密にハーモニーを紡ぐ。静寂から大音量まで劇的なダイナミクスの変化があり、聴く者の感情を大きく揺さぶる。ピアノ独奏の繊細さ、弦楽四重奏の親密さ、フルオーケストラの圧倒的なスケール感など表現の幅が極めて広い。荘厳で美しい響きの中に、喜び、悲しみ、怒り、崇高さなど人間のあらゆる感情が詰まっている。聴き手に集中と没入を求める、「聴く芸術」としての音楽。",
    roots_story:"千年以上の歴史を持つ西洋音楽の伝統。電子音楽との接点は20世紀初頭から始まる。Claude Debussyの印象主義音楽（1890年代〜）は調性の束縛を緩め、後のアンビエントの浮遊感に影響。Arnold Schoenbergの十二音技法（1920年代）は従来の調性を解体し、実験音楽への道を開いた。Karlheinz Stockhausen（1950年代〜）は電子音響を正統的な作曲技法に取り入れた最初の主要な作曲家で、Kraftwerkからビョークまで多大な影響を与えた。Philip Glass、Steve Reichらのミニマル音楽（1960年代〜）は反復構造でテクノ・アンビエントの直接の先駆けとなった。"},

// ===== INFLUENCE SCORE → NODE RADIUS =====
NODES.forEach(n => {
  n.influence = LINKS.filter(l => l.s === n.id).reduce((sum, l) => sum + l.w, 0);
});
const maxInfluence = Math.max(...NODES.map(n => n.influence));
const rScale = d3.scaleSqrt().domain([0, maxInfluence]).range([28, 112]);
NODES.forEach(n => { n.r = Math.max(28, rScale(n.influence)); });

// ===== CATEGORY COLORS =====
const CAT_COLOR = {
  roots:      "#888",
  early_elec: "#5C7CFA",
  synthpop:   "#845EF7",
  industrial: "#607080",
  ambient:    "#607D8B",
  house:      "#9C27B0",
  techno:     "#1565C0",
  trance:     "#00838F",
  hardcore:   "#C62828",
  dnb:        "#E65100",
  dubstep:    "#5D4037",
  eurodance:  "#AD1457",
  edm:        "#F57F17",
  synthwave:  "#6A1B9A",
  hiphop:     "#2E7D32",
  chiptune:   "#00695C",
};

// ===== GRAPH SETUP =====
const svg = d3.select("#graph");
const w = window.innerWidth, h = window.innerHeight;
const g = svg.append("g");

svg.call(d3.zoom().scaleExtent([0.05, 6]).on("zoom", e => g.attr("transform", e.transform)));

// arrow markers per category
Object.entries(CAT_COLOR).forEach(([cat, color]) => {
  svg.append("defs").append("marker")
    .attr("id", `arrow-${cat}`)
    .attr("viewBox", "0 -4 8 8")
    .attr("refX", 8).attr("refY", 0)
    .attr("markerWidth", 5).attr("markerHeight", 5)
    .attr("orient", "auto")
    .append("path")
    .attr("d", "M0,-4L8,0L0,4")
    .attr("fill", color)
    .attr("opacity", 0.7);
});

const nodeMap = Object.fromEntries(NODES.map(n => [n.id, n]));

const linkData = LINKS.map(l => ({...l, source: l.s, target: l.t}));

const simulation = d3.forceSimulation(NODES)
  .force("link", d3.forceLink(linkData).id(d=>d.id).distance(d => 120 - d.w * 0.5).strength(0.4))
  .force("charge", d3.forceManyBody().strength(-350))
  .force("center", d3.forceCenter(w/2, h/2))
  .force("collision", d3.forceCollide(d => d.r + 5))
  .alphaDecay(0.02);

const link = g.append("g").selectAll("line")
  .data(linkData)
  .join("line")
  .attr("class", "link")
  .attr("stroke", d => CAT_COLOR[nodeMap[d.s]?.cat] || "#555")
  .attr("stroke-width", d => 0.5 + d.w / 60)
  .attr("marker-end", d => `url(#arrow-${nodeMap[d.s]?.cat || "roots"})`);

// edge label group: background rect + text
const linkLabelG = g.append("g").selectAll("g")
  .data(linkData)
  .join("g");

linkLabelG.append("rect")
  .attr("class", "link-label-bg")
  .attr("rx", 2).attr("ry", 2)
  .attr("width", 24).attr("height", 12)
  .attr("x", -12).attr("y", -9);

linkLabelG.append("text")
  .attr("class", "link-label")
  .attr("text-anchor", "middle")
  .attr("dominant-baseline", "central")
  .text(d => d.w + "%");

const node = g.append("g").selectAll("g")
  .data(NODES)
  .join("g")
  .attr("class", "node")
  .call(d3.drag()
    .on("start", (e,d) => { if(!e.active) simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
    .on("drag",  (e,d) => { d.fx=e.x; d.fy=e.y; })
    .on("end",   (e,d) => { if(!e.active) simulation.alphaTarget(0); }));

node.append("circle")
  .attr("r", d => d.r)
  .attr("fill", d => CAT_COLOR[d.cat] || "#555")
  .attr("class", d => d.suno ? "suno" : "")
  .attr("fill-opacity", d => d.suno ? 0.92 : 0.72);

node.append("text")
  .text(d => d.label.split("\n")[0])
  .attr("dy", d => d.label.includes("\n") ? -3 : 1)
  .style("font-size", d => Math.max(9, Math.min(13, d.r * 0.55)) + "px")
  .style("font-weight", d => d.suno ? "700" : "400")
  .style("fill", d => d.suno ? "#FFD700" : "#eee");

node.filter(d => d.label.includes("\n")).append("text")
  .text(d => d.label.split("\n")[1])
  .attr("dy", 11)
  .style("font-size", d => Math.max(9, Math.min(13, d.r * 0.55)) + "px")
  .style("font-weight", d => d.suno ? "700" : "400")
  .style("fill", d => d.suno ? "#FFD700" : "#eee");

// hover: 軽量ツールチップ（ジャンル名のみ）
const tooltip = document.getElementById("tooltip");
node.on("mouseover", (e, d) => {
  tooltip.textContent = d.label.replace("\n", " ");
  tooltip.style.display = "block";
  tooltip.style.left = (e.pageX + 14) + "px";
  tooltip.style.top  = (e.pageY - 10) + "px";
})
.on("mousemove", e => {
  tooltip.style.left = (e.pageX + 14) + "px";
  tooltip.style.top  = (e.pageY - 10) + "px";
})
.on("mouseout", () => tooltip.style.display = "none");

// click: 右サイドパネルを開く
const panel     = document.getElementById("side-panel");
const spTag     = document.getElementById("sp-tag");
const spCopy    = document.getElementById("sp-copy");
const spClose   = document.getElementById("sp-close");
const spSunoW   = document.getElementById("sp-suno-wrap");
const spEra     = document.getElementById("sp-era");
const spDesc    = document.getElementById("sp-desc");
const spIn      = document.getElementById("sp-in");
const spOut     = document.getElementById("sp-out");
const spYt      = document.getElementById("sp-yt-link");

let dragMoved = false;
node.on("mousedown.drag", null);  // 既存drag再バインド前にリセット
node.call(d3.drag()
  .on("start", (e,d) => { dragMoved=false; if(!e.active) simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
  .on("drag",  (e,d) => { dragMoved=true; d.fx=e.x; d.fy=e.y; })
  .on("end",   (e,d) => { if(!e.active) simulation.alphaTarget(0); }));

node.on("click", (e, d) => {
  if(dragMoved) return; // ドラッグ後のクリックは無視
  e.stopPropagation();

  const name = d.label.replace("\n", " ");
  spTag.textContent = name;
  spSunoW.innerHTML = d.suno ? '<span class="sp-suno">Suno有効タグ</span>' : '';
  spEra.textContent  = d.era ? `発祥時期：${d.era}` : '';
  spDesc.textContent = d.desc || '（説明なし）';

  // ルーツの経緯
  const spRootsStory = document.getElementById("sp-roots-story");
  const spRootsStorySec = document.getElementById("sp-roots-story-sec");
  if (d.roots_story) {
    spRootsStory.textContent = d.roots_story;
    spRootsStorySec.style.display = '';
  } else {
    spRootsStorySec.style.display = 'none';
  }

  // ルーツ
  const incoming = LINKS.filter(l => l.t === d.id);
  spIn.innerHTML = incoming.length
    ? incoming.map(l => `<div class="sp-influence-row"><span class="pct">${l.w}%</span><b>${nodeMap[l.s]?.label?.replace("\n"," ")}</b><span class="reason">— ${l.desc||''}</span></div>`).join('')
    : '<span style="color:#666">なし（ルーツジャンル）</span>';

  // 影響先
  const outgoing = LINKS.filter(l => l.s === d.id);
  spOut.innerHTML = outgoing.length
    ? outgoing.map(l => `<div class="sp-influence-row"><span class="pct">${l.w}%</span><b>${nodeMap[l.t]?.label?.replace("\n"," ")}</b><span class="reason">— ${l.desc||''}</span></div>`).join('')
    : '<span style="color:#666">（データなし）</span>';

  // YouTube
  const q = encodeURIComponent(name + " music genre");
  spYt.href = `https://www.youtube.com/results?search_query=${q}`;
  spYt.textContent = `▶ YouTubeで「${name}」を検索`;

  // コピー
  spCopy.onclick = () => { navigator.clipboard.writeText(d.id).then(() => { spCopy.textContent='コピー済み'; setTimeout(()=>spCopy.textContent='コピー', 1500); }); };

  panel.style.display = "block";
});

spClose.onclick = () => panel.style.display = "none";
svg.on("click", () => panel.style.display = "none");

simulation.on("tick", () => {
  link
    .attr("x1", d => d.source.x)
    .attr("y1", d => d.source.y)
    .attr("x2", d => {
      const dx = d.target.x - d.source.x, dy = d.target.y - d.source.y;
      const dist = Math.sqrt(dx*dx + dy*dy) || 1;
      const r = d.target.r + 7;
      return dist > r ? d.target.x - dx/dist * r : d.target.x;
    })
    .attr("y2", d => {
      const dx = d.target.x - d.source.x, dy = d.target.y - d.source.y;
      const dist = Math.sqrt(dx*dx + dy*dy) || 1;
      const r = d.target.r + 7;
      return dist > r ? d.target.y - dy/dist * r : d.target.y;
    });
  node.attr("transform", d => `translate(${d.x},${d.y})`);
  linkLabelG.attr("transform", d =>
    `translate(${(d.source.x + d.target.x)/2},${(d.source.y + d.target.y)/2})`
  );
});

// Search
document.getElementById("search").addEventListener("input", e => {
  const q = e.target.value.toLowerCase();
  node.classed("highlighted", d => q.length > 0 && (d.id.includes(q) || d.label.toLowerCase().includes(q)));
  node.select("circle").attr("opacity", d => {
    if(!q) return 1;
    return (d.id.includes(q) || d.label.toLowerCase().includes(q)) ? 1 : 0.25;
  });
});

// Legend hover: カテゴリにカーソルを乗せると対応ノードをパルス点灯、他を暗く
document.querySelectorAll('.legend-item[data-cat]').forEach(item => {
  const cat = item.dataset.cat;
  item.addEventListener('mouseenter', () => {
    if (cat === 'suno') {
      node.classed('cat-highlight', d => d.suno);
      node.classed('cat-dim',       d => !d.suno);
    } else {
      node.classed('cat-highlight', d => d.cat === cat);
      node.classed('cat-dim',       d => d.cat !== cat);
    }
  });
  item.addEventListener('mouseleave', () => {
    node.classed('cat-highlight', false);
    node.classed('cat-dim',       false);
  });
});

// Filter
document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", e => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    const f = btn.dataset.filter;
    node.style("display", d => {
      if(f === "all") return null;
      if(f === "suno") return d.suno ? null : "none";
      return null;
    });
    link.style("display", d => {
      if(f !== "suno") return null;
      return (nodeMap[d.s]?.suno && nodeMap[d.t]?.suno) ? null : "none";
    });
  });
});
</script>
</body>
</html>
