<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>音楽ジャンルルーツ辞典（電子音楽系）</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", sans-serif; background: #1a1a2e; color: #eee; overflow: hidden; }

#header { position: fixed; top: 0; left: 0; right: 0; z-index: 20; background: rgba(15,15,26,0.92); padding: 10px 16px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid #333; }
#header h1 { font-size: 15px; font-weight: 700; color: #fff; white-space: nowrap; }
#header .sub { font-size: 12px; color: #888; }

#left-sidebar { position: fixed; top: 50px; left: 14px; bottom: 10px; z-index: 20; width: 200px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
#legend { background: rgba(15,15,26,0.88); border: 1px solid #333; border-radius: 8px; padding: 10px 12px; font-size: 12px; }
#legend h3 { font-size: 11px; color: #aaa; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.legend-item { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; }
.legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.legend-label { color: #ccc; font-size: 11px; }
.legend-sep { border-top: 1px solid #333; margin: 8px 0; }
.suno-ring { width: 12px; height: 12px; border-radius: 50%; border: 2px solid #FFD700; flex-shrink: 0; }

#controls { background: rgba(15,15,26,0.88); border: 1px solid #333; border-radius: 8px; padding: 10px 12px; font-size: 12px; }
#controls h3 { font-size: 11px; color: #aaa; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
#search { width: 100%; padding: 5px 8px; background: #1a1a2e; border: 1px solid #444; border-radius: 5px; color: #eee; font-size: 12px; margin-bottom: 8px; }
#search::placeholder { color: #666; }
.filter-btn { display: inline-block; padding: 3px 8px; border-radius: 4px; border: 1px solid #444; background: #1a1a2e; color: #ccc; font-size: 11px; cursor: pointer; margin: 2px 2px 2px 0; }
.filter-btn.active { background: #FFD700; color: #000; border-color: #FFD700; font-weight: 700; }

/* hover tooltip (軽量版) */
#tooltip { position: fixed; background: rgba(20,20,40,0.92); border: 1px solid #555; border-radius: 6px; padding: 6px 10px; font-size: 12px; pointer-events: none; display: none; z-index: 30; white-space: nowrap; color: #eee; }

/* 右サイドパネル */
#side-panel { position: fixed; right: 0; top: 50px; bottom: 0; width: 320px; background: #16162a; border-left: 1px solid #444; padding: 0; overflow-y: auto; z-index: 25; display: none; font-size: 13px; }
#sp-header { position: sticky; top: 0; background: #1e1e38; padding: 14px 16px 10px; border-bottom: 1px solid #333; display: flex; align-items: flex-start; gap: 8px; }
#sp-tag { font-size: 18px; font-weight: 700; color: #fff; flex: 1; line-height: 1.3; }
#sp-copy { padding: 4px 10px; background: #2a2a50; border: 1px solid #555; border-radius: 5px; color: #ccc; font-size: 11px; cursor: pointer; white-space: nowrap; }
#sp-copy:hover { background: #3a3a70; color: #fff; }
#sp-close { padding: 4px 8px; background: none; border: none; color: #888; font-size: 18px; cursor: pointer; line-height: 1; }
#sp-close:hover { color: #fff; }
#sp-body { padding: 14px 16px; }
.sp-suno { display: inline-block; background: #FFD700; color: #000; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px; margin-bottom: 10px; }
.sp-era { font-size: 11px; color: #888; margin-bottom: 10px; }
.sp-section { margin-bottom: 14px; }
.sp-section h4 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #888; margin-bottom: 6px; border-bottom: 1px solid #2a2a50; padding-bottom: 4px; }
.sp-section p { color: #ccc; line-height: 1.6; font-size: 13px; }
.sp-influence-row { display: flex; align-items: baseline; gap: 6px; margin-bottom: 4px; font-size: 12px; color: #bbb; }
.sp-influence-row .pct { font-weight: 700; color: #7ecfff; font-size: 11px; min-width: 32px; }
.sp-influence-row .reason { color: #888; font-size: 11px; }
#sp-yt-link { display: block; margin-top: 6px; padding: 8px 12px; background: #cc0000; color: #fff; border-radius: 6px; text-decoration: none; font-size: 13px; font-weight: 700; text-align: center; }
#sp-yt-link:hover { background: #e60000; }

svg { width: 100vw; height: 100vh; }
.link { stroke-opacity: 0.45; fill: none; }
.link:hover { stroke-opacity: 0.9; }
.node circle { cursor: pointer; stroke-width: 2; }
.node circle.suno { stroke: #FFD700; stroke-width: 2.5; }
.node text { pointer-events: none; font-size: 11px; fill: #eee; text-anchor: middle; dominant-baseline: central; }
.node.highlighted circle { stroke: #fff !important; stroke-width: 3 !important; }
.link-label { font-size: 20px; fill: #fff; pointer-events: none; font-weight: 700; }
.link-label-bg { fill: rgba(26,26,46,0.82); pointer-events: none; }

@keyframes cat-pulse {
  0%   { stroke: #ffffff; stroke-width: 3; }
  50%  { stroke: #ffffff; stroke-width: 8; filter: drop-shadow(0 0 10px #fff) drop-shadow(0 0 20px rgba(255,255,255,0.6)); }
  100% { stroke: #ffffff; stroke-width: 3; }
}
.node.cat-highlight circle { animation: cat-pulse 0.85s ease-in-out infinite !important; stroke: #fff !important; }
.node.cat-dim { opacity: 0.1; pointer-events: none; }
.legend-item[data-cat] { cursor: pointer; padding: 2px 5px; border-radius: 4px; margin-left: -5px; transition: background 0.15s; }
.legend-item[data-cat]:hover { background: rgba(255,255,255,0.12); }
</style>
</head>

<script>
// ===== DATA =====
const NODES = [
  // ルーツ
  {id:"jazz", label:"Jazz", cat:"roots", era:"1900s", suno:false,
    desc:"スウィング感のあるリズムに乗せた即興演奏（アドリブ）が最大の魅力。演奏者がその場の空気で旋律を自由に変え、予測できない展開が生まれるのがジャズ独特の面白さ。コード進行は複雑でおしゃれな響きを持ち、サックスやトランペットの艶やかな音色がムードを作る。テンポはスローバラードからアップテンポまで幅広いが、どのスタイルにも共通する「揺れるグルーヴ」がある。夜のバーが似合う大人びた雰囲気で、時にメランコリック、時に高揚感にあふれる。",
    roots_story:"19世紀末〜20世紀初頭、ニューオーリンズの黒人コミュニティでブルース、ラグタイム、ゴスペル、マーチングバンドの要素が融合して誕生した。Buddy Bolden、King Oliver、Louis Armstrongらが初期のスタイルを確立。1920年代にシカゴ・NYへ広がり「ジャズ・エイジ」と呼ばれる社会現象に。Duke Ellington、Charlie Parker、Miles Davisらが時代ごとに革新を起こし、ビバップ→クールジャズ→フリージャズと進化。その即興精神とハーモニーの豊かさは、後のあらゆるポピュラー音楽の基盤となった。"},

  {id:"blues", label:"Blues", cat:"roots", era:"1900s", suno:false,
    desc:"哀愁と情感を込めたギターとボーカルが中心の音楽。「泣き」のギターフレーズ、ブルーノートと呼ばれる独特の音階が醸し出す切なさが最大の特徴。テンポはゆったりめで、同じコード進行をくり返しながら感情を深く掘り下げていく。声を絞り出すような歌い方、ギターを泣かせるようなベンド（チョーキング）、ハーモニカのむせび泣く音色が胸に刺さる。晴れた日でもどこか物悲しい空気を纏っており、聴く人の心の奥にじんわり響く音楽。",
    roots_story:"19世紀後半、ミシシッピ・デルタ地域のアフリカ系アメリカ人の労働歌（ワークソング）、フィールドハラー、スピリチュアルが融合して形成された。Robert Johnsonの伝説的な「クロスロード」の逸話に象徴されるデルタ・ブルースが原型。1940年代にMuddy WatersやHowlin' Wolfがシカゴに移住し、エレキギターとバンド編成を導入してシカゴ・ブルースを確立。B.B. Kingは洗練されたギタープレイで「ブルースの王」と呼ばれた。このシカゴ・ブルースをイギリスの若者が聴いてロックンロールが生まれ、音楽史全体を変えた。"},

  {id:"funk", label:"Funk", cat:"roots", era:"1960s", suno:false,
    desc:"とにかく体が動く、リズム最優先の音楽。1拍目にズドンと来るキックとベースの「うねり」が全身を揺さぶる。スラップベースのバチバチした音、ギターのチャカチャカしたカッティング、ホーンセクションの分厚い咆哮が絡み合って強烈なグルーヴを生む。メロディよりもリズムの気持ちよさを追求しており、同じリフを延々と繰り返しながらどんどんテンションが上がっていく快感がある。底抜けに明るくて汗臭い、踊るための音楽。",
    roots_story:"1960年代半ば、James Brownが「Papa's Got a Brand New Bag」(1965)で従来のR&Bから脱却し、リズムを前面に押し出した革命的なサウンドを生み出した。「ファンクの帝王」と呼ばれた彼の「1拍目を強調する」スタイルは音楽の概念を変えた。Sly and the Family Stoneはサイケデリック・ロックと融合させ、Parliament/FunkadelicのGeorge Clintonは宇宙的な世界観の「Pファンク」を確立。Bootsy Collins、Earth, Wind & Fire、Tower of Powerらがジャンルを拡張した。ファンクのブレイクビーツは後にヒップホップのサンプリング素材として無数に引用された。"},

  {id:"disco", label:"Disco", cat:"roots", era:"1970s", suno:false,
    desc:"キラキラした華やかさと高揚感にあふれたダンスミュージック。「ドン・ドン・ドン・ドン」と一定のテンポで刻む4つ打ちキック、シャカシャカ鳴り続けるハイハット、オクターブで跳ねるベースラインが基本骨格。その上にストリングス（弦楽器）の煌びやかなアレンジとソウルフルなボーカルが乗り、ミラーボールの下で踊り明かすための音楽を作り出す。テンポはBPM 110〜130で、速すぎず遅すぎない踊りやすさが心地よい。開放的で多幸感のある雰囲気が最大の魅力。",
    roots_story:"1970年代初頭、NYのゲイ・黒人・ラテン系コミュニティのアンダーグラウンドクラブで誕生。DJ David Mancusoの「The Loft」やNicky Sianoの「The Gallery」が初期の拠点。Donna Summer「I Feel Love」(1977, Giorgio Moroder制作)はシンセサイザーを全面導入し電子音楽への橋渡しとなった。Bee Gees「Saturday Night Fever」(1977)で大衆化。しかし1979年の「Disco Demolition Night」事件に象徴されるバックラッシュで地上から姿を消す。だがシカゴのDJ達がディスコのビートをシンセで再構築し、ハウスミュージックとして再生させた。"},

  {id:"soul", label:"Soul", cat:"roots", era:"1960s", suno:false,
    desc:"ボーカルの感情表現がすべての中心にある音楽。歌い手が魂（ソウル）を込めて声を絞り出し、ささやきからシャウトまで感情の振り幅を全開で表現する。メリスマ（一つの音符を細かく揺らす節回し）やファルセット（裏声）を自在に使いこなす歌唱力が聴きどころ。バックはオルガン、ホーンセクション、温かいコーラスが歌を包み込む。テンポはミッドテンポが多く、バラードでは切なく胸に迫り、アップテンポでは喜びが爆発する。「人間の声そのものが楽器」と感じさせる、情感の塊のような音楽。",
    roots_story:"1950年代後半、Ray Charlesがゴスペルの歌唱スタイルを世俗的な歌詞に持ち込み「ソウルの父」と呼ばれた。Sam Cookeは洗練されたポップ寄りのソウルを、James Brownはよりリズミックなソウルを追求（後にファンクへ発展）。1960年代、Motownレコード（デトロイト）はSupremes、Temptations、Marvin Gayeらでポップ市場を制覇。Staxレコード（メンフィス）はOtis Redding、Booker T.らの泥臭いサザンソウルを発信。Aretha Franklinは「ソウルの女王」として君臨した。1970年代にはPhilly Soulが洗練されたストリングスを導入し、これがディスコへの直接の布石となった。"},

  {id:"reggae", label:"Reggae", cat:"roots", era:"1960s", suno:false,
    desc:"裏拍（オフビート）を強調した独特のリズムが最大の個性。ギターやキーボードが「ンチャ・ンチャ」と裏で刻み、その隙間を重く深いベースラインがズーンと埋める。テンポはゆったり（BPM 60〜90）で、南国の陽射しの下でのんびり揺れるような心地よさがある。一聴すると脱力感があるのに、ベースとドラムのコンビネーションには芯の強いグルーヴが宿っている。穏やかさの中に力強いメッセージを秘めた、不思議な包容力を持つ音楽。",
    roots_story:"1960年代後半、ジャマイカでスカ→ロックステディの進化を経て誕生。Toots and the Maytalsが「Do the Reggay」(1968)で初めて「レゲエ」という言葉を使用。Bob Marleyとthe Wailersが世界的なスターとなり、レゲエをグローバルな音楽に押し上げた。「No Woman, No Cry」「One Love」などの楽曲は今も世界中で愛される。同時期にLee \"Scratch\" Perryやking Tubbyがスタジオで録音テープを加工する「ダブ」技法を発明。これはリバーブ、ディレイ、エフェクト処理による音響実験であり、後の電子音楽・リミックス文化の原点となった。"},

  {id:"punk", label:"Punk Rock", cat:"roots", era:"1970s", suno:false,
    desc:"速い・短い・シンプル・うるさい。3コードのパワーコードをかき鳴らし、2分前後の短い曲を全力で叩きつけるロック。演奏技術よりも衝動と態度が重視され、怒りや反抗心をそのまま音にぶつける。ボーカルは叫ぶか吐き捨てるかで、美しく歌おうという気はない。テンポは速く、ドラムはひたすらビートを叩き続ける。聴くと「自分でもできそう」と思わせる敷居の低さがあるのに、そのエネルギーは圧倒的。粗削りで汚いのにカッコいい、反骨精神そのものの音楽。",
    roots_story:"1974〜76年、NYのCBGBというライブハウスでRamones、Television、Patti Smithらが従来のロックの複雑さを拒絶したシンプルで攻撃的な音楽を演奏。ほぼ同時期にロンドンでSex Pistolsが「Anarchy in the U.K.」(1976)でデビューし、社会的衝撃を与えた。マネージャーMalcolm McLarenがファッションと反体制思想を結びつけ、パンクを音楽を超えた文化運動に変えた。The Clashは政治的メッセージとレゲエなど多様な要素を取り入れ「パンクの良心」と呼ばれた。パンクは長くは持たなかったが、そのDIY精神はポストパンク、ニューウェーブ、インダストリアルへ受け継がれ、電子音楽への扉を開いた。"},

  {id:"hiphop", label:"Hip Hop", cat:"roots", era:"1970s", suno:false,
    desc:"ビート（打ち込みのリズム）の上でラップ（韻を踏みながら語る歌唱法）を乗せる音楽。ドラムマシンやサンプリングで作られた重い低音とタイトなビートが土台で、そこにMCの言葉のフロウが絡む。DJのスクラッチ音、既存の曲から切り取ったサンプルのループも重要な音響要素。テンポはBPM 80〜100が主流で、頭を縦に振りたくなる「首振りビート」が気持ちいい。ストリートの空気感、言葉の力強さ、ビートの中毒性が三位一体になった、声とリズムの音楽。",
    roots_story:"1973年8月11日、DJ Kool Hercがブロンクスのアパートのパーティでファンクレコードのブレイク部分（ドラムだけの間奏）を2枚のレコードで交互に繰り返す「ブレイクビーツ」を発明。これがヒップホップの起源とされる。Grandmaster FlashはスクラッチやビートジャグリングなどのDJ技法を開発。Afrika Bambaataaはファンクにシンセサイザーを導入した「Planet Rock」(1982)でエレクトロとヒップホップを架橋した。Run-D.M.C.がロックと融合させメインストリームへ。Public Enemyは政治的メッセージを、N.W.A.はギャングスタ・ラップを確立。サンプリング文化は電子音楽全般のリミックス・マッシュアップ文化の基盤となった。"},

  {id:"newage", label:"New Age", cat:"roots", era:"1970s", suno:false,
    desc:"聴いていると心が静まり、ふわっと浮遊感に包まれるような穏やかな音楽。シンセサイザーの柔らかいパッド音、ピアノやハープの繊細な旋律、水の流れや鳥のさえずりといった自然音が組み合わさる。リズムは控えめか存在せず、メロディはゆったりと反復する。瞑想やヨガ、マッサージのBGMとしてよく使われるが、単なる背景音楽ではなく、聴く人を日常から切り離して穏やかな内面世界へ誘う力がある。明るく透明感のある響きが特徴で、暗さや攻撃性とは無縁の癒やしの音楽。",
    roots_story:"1970年代、Brian Enoのアンビエント実験とは別の流れとして、スピリチュアリズムやニューエイジ思想と結びついた音楽が形成された。ドイツのKlaus Schulze、Tangerine Dreamの電子音楽、日本の喜多郎のシンセサイザー作品が初期の代表格。Windham Hillレコード（1976年設立）がアコースティックなニューエイジを確立し、George Winston、Will Ackermannらがピアノ・ギター主体の作品で人気を得た。Enya「Orinoco Flow」(1988)が世界的ヒットとなりジャンルを大衆化。1987年にはグラミー賞にニューエイジ部門が新設された。スパやヨガスタジオのBGMとしても広く浸透し、後のチルアウト・アンビエント文化の下地を作った。"},

  {id:"classical", label:"Classical", cat:"roots", era:"~1900", suno:false,
    desc:"オーケストラ（管弦楽団）が奏でる壮大で格式高い音楽。バイオリン、チェロ、フルート、トランペットなど数十種の楽器が楽譜に従って精密にハーモニーを紡ぐ。静寂から大音量まで劇的なダイナミクスの変化があり、聴く者の感情を大きく揺さぶる。ピアノ独奏の繊細さ、弦楽四重奏の親密さ、フルオーケストラの圧倒的なスケール感など表現の幅が極めて広い。荘厳で美しい響きの中に、喜び、悲しみ、怒り、崇高さなど人間のあらゆる感情が詰まっている。聴き手に集中と没入を求める、「聴く芸術」としての音楽。",
    roots_story:"千年以上の歴史を持つ西洋音楽の伝統。電子音楽との接点は20世紀初頭から始まる。Claude Debussyの印象主義音楽（1890年代〜）は調性の束縛を緩め、後のアンビエントの浮遊感に影響。Arnold Schoenbergの十二音技法（1920年代）は従来の調性を解体し、実験音楽への道を開いた。Karlheinz Stockhausen（1950年代〜）は電子音響を正統的な作曲技法に取り入れた最初の主要な作曲家で、Kraftwerkからビョークまで多大な影響を与えた。Philip Glass、Steve Reichらのミニマル音楽（1960年代〜）は反復構造でテクノ・アンビエントの直接の先駆けとなった。"},

  // 初期電子音楽
  {id:"musique_concrete", label:"Musique\nConcrète", cat:"early_elec", era:"1948", suno:false,
    desc:"録音された現実の音（ドアの軋み、列車の音、人の声、工場の騒音など）を切り貼りして構成する音楽。メロディやリズムといった従来の音楽的要素はほぼなく、音そのものの質感・響き・重なりを聴かせる。聴いていると日常の音が全く違って聞こえてくる不思議な体験がある。心地よさとは無縁だが、耳をすませば環境音の中に隠れた音楽性を発見する知的興奮がある。",
    roots_story:"1948年、フランスの放送技師Pierre Schaefferがパリの国営放送局（RTF）で「鉄道のエチュード」を発表。列車の音をテープに録音し、速度変更・逆再生・ループなどの加工を施して作品にした。「具体音楽」と名付けられたこの手法は、音楽の素材を楽器の音から解放した革命的な概念だった。Pierre Henryとの共同制作「一人の男のための交響曲」(1950)で手法を確立。Karlheinz Stockhausenがドイツで電子音と融合させ、後のノイズミュージック、グリッチ、サウンドアートの源流となった。"},

  {id:"experimental_elec",label:"Experimental\nElectronic", cat:"early_elec", era:"1950s", suno:false,
    desc:"シンセサイザーや電子回路が生み出す、それまで存在しなかった音だけで構成された音楽。人工的な正弦波、ノコギリ波、ホワイトノイズなどの電子音が主役で、楽器らしい音色は使わない。未知の惑星や深海を想像させるような異世界感があり、時に美しく、時に不気味。拍子やメロディが曖昧なことが多く、聴き手の想像力に委ねる自由な音響空間が広がる。",
    roots_story:"1950年代、ドイツのケルンにあるWDR電子音楽スタジオでKarlheinz Stockhausenが純粋な電子音による作曲を開始。「習作I・II」(1953-54)は電子音のみで作られた最初の本格的な楽曲とされる。同時期にアメリカではColumbia-Princeton Electronic Music Centerが設立され、Milton BabbittやVladimir Ussachevskyが電子音楽を研究。1960年代にはRobert Moogがモーグ・シンセサイザーを開発し、Wendy Carlosの「Switched-On Bach」(1968)がグラミー賞を受賞して電子音楽を一般に知らしめた。"},

  {id:"krautrock", label:"Krautrock", cat:"early_elec", era:"1968", suno:false,
    desc:"ロックの衝動とエレクトロニクスの冷徹さが融合した、ドイツ独自のサウンド。同じリズムパターンを延々と繰り返す「モーターリック・ビート」が最大の特徴で、トランス状態に引き込まれるような陶酔感がある。シンセサイザーの無機質な電子音とロックバンドの生演奏が共存し、宇宙的な広がりと機械的な反復が同居する独特の世界観。テンポは中程度だが、反復の中に微細な変化を重ねることで催眠的な没入感を生む。",
    roots_story:"1968年頃、戦後ドイツの若い世代がアメリカやイギリスのロックを模倣することを拒否し、独自の音楽を模索し始めた。Kraftwerkはデュッセルドルフで完全に電子的なポップミュージックを追求し、「Autobahn」(1974)で世界的成功を収めた。彼らの機械的ビートは後のテクノ・シンセポップの直接の親となる。Can（ケルン）はフリージャズとロックを融合させた即興性の高いサウンドを展開。Tangerine Dream（ベルリン）はシンセサイザーで宇宙的な音響世界を構築し、アンビエントの先駆者に。Neu!のドラマーKlaus Dingerが「モーターリック・ビート」と呼ばれる一定速度で叩き続ける催眠的なドラムパターンを生み出し、これがテクノの反復構造の原型となった。"},

  {id:"dub", label:"Dub", cat:"early_elec", era:"1970s", suno:true,
    desc:"音が空間の中で跳ね返り、溶け、遠ざかっていくような独特の音響体験。レゲエの楽曲からボーカルを抜き、残った演奏にリバーブ（残響）やディレイ（エコー）を大量にかけて音の立体感を極端に強調する。重く深いベースラインが地を這い、スネアドラムの一打が宇宙に反響するような感覚。テンポはゆっくりで、音と音の「隙間」が多く、その余白が独特の浮遊感と瞑想的な空気を生む。霧の中を歩いているような、夢うつつの音楽。",
    roots_story:"1960年代末〜70年代、ジャマイカのサウンドエンジニアたちがスタジオの機材を「楽器」として使い始めたのが起源。King Tubbyは自身のスタジオでミキシング・コンソールをリアルタイムに操作し、各トラックのフェーダーを上げ下げしながらリバーブやディレイを即興的にかけていく手法を発明した。Lee \"Scratch\" Perryは自身のBlack Ark Studioでさらに実験的なサウンドを追求し、テープの逆再生や奇妙なエフェクトを駆使。Scientist、Augustus Pabloらがスタイルを発展させた。「スタジオそのものが楽器である」というダブの概念は、リミックス文化、電子音楽のエフェクト処理、ダブステップ、トリップホップなど後の音楽に計り知れない影響を与えた。"},

  // シンセポップ系
  {id:"new_wave", label:"New Wave", cat:"synthpop", era:"1977", suno:false,
    desc:"パンクのエネルギーを残しつつ、シンセサイザーやアートな感覚を取り入れたポップ・ロック。パンクほど攻撃的ではなく、どこかスタイリッシュでクールな佇まいがある。シンセの冷たい音色とギターが共存し、キャッチーなメロディラインと少しひねった歌詞が特徴。テンポは軽快で、踊れるリズムのものも多い。80年代のMTVカルチャーと結びつき、ビジュアル面でも独特のファッションやヘアスタイルが印象的だった。おしゃれで知的、でもどこか影のある大人のポップス。",
    roots_story:"1977年頃、パンクの「何でもあり」精神に触発されつつ、より幅広い音楽的実験に向かったアーティストたちが登場。Talking Headsはファンクとアートロックを融合、Blondieはディスコやラップまで取り入れた。イギリスではGary Numanが「Are 'Friends' Electric?」(1979)でシンセサイザー主体のヒットを飛ばし、Duran Duranはルックスとシンセを武器にMTVの寵児に。The Carsはアメリカン・ニューウェーブを代表し、Devoは奇抜なコンセプトで異彩を放った。パンクが破壊した音楽の枠組みの上に、より洗練された新しいポップを建設した世代。"},

  {id:"electro", label:"Electro", cat:"synthpop", era:"1982", suno:false,
    desc:"Roland TR-808ドラムマシンの乾いたキックとカチッとしたスネア、機械的に正確なビートが生み出すファンキーなグルーヴ。人間の演奏では出せない精密さとファンクの黒いノリが同居する独特のサウンド。シンセベースが太く弾み、ボコーダー（ロボット声）で処理されたボーカルが近未来的な空気を演出する。テンポは中程度でヘッドノッキングに最適。冷たくて硬質なのにどこか踊りたくなる、人間と機械の間にある音楽。",
    roots_story:"1982年、Afrika Bambaataaが「Planet Rock」をリリース。Kraftwerkの「Trans-Europe Express」をサンプリングし、TR-808のビートに乗せたこの曲がエレクトロの誕生を告げた。ヒップホップのDJ文化とヨーロッパの電子音楽が初めて直接融合した瞬間でもあった。Hashim「Al-Naafiysh」、Mantronix、Egyptian Loverらがスタイルを発展。フロリダではMiami BassとしてTR-808の重低音を極端に強調した変種が生まれ、2 Live Crewらが人気を博した。ヨーロッパではエレクトロクラッシュ（2000年代）として再解釈された。"},

  {id:"synth_pop", label:"Synth Pop", cat:"synthpop", era:"1978", suno:true,
    desc:"シンセサイザーがメインの楽器となったポップミュージック。キラキラした電子音のメロディ、打ち込みのリズム、甘くメランコリックな歌声が三位一体になった80年代を象徴するサウンド。生楽器をほとんど使わず、すべてをシンセとドラムマシンで構築する潔さがある。テンポはダンサブルな中速が多い。切なさと高揚感が同居する独特のエモーションがあり、夜のドライブや都会の夜景が似合う。ポップスなのにどこか孤独な匂いがする。",
    roots_story:"Kraftwerkの電子的サウンドとパンク/ニューウェーブのポップセンスが出会って生まれた。Gary Numan「Cars」(1979)、Orchestral Manoeuvres in the Dark、Ultravoxが初期のパイオニア。Depeche Modeはダークなシンセポップを極め、「Enjoy the Silence」(1990)は名曲中の名曲。Pet Shop Boysはインテリジェントなダンスポップを確立。日本ではYMO（Yellow Magic Orchestra）が1978年に独自のテクノポップを世界に発信し、後の日本の電子音楽シーン全体に影響を与えた。Erasure、A-ha、Howard Jonesらが80年代チャートを席巻した。"},

  {id:"electropop", label:"Electropop", cat:"synthpop", era:"2000s", suno:true,
    desc:"シンセポップを現代的なプロダクション技術で蘇らせた、きらびやかで弾むようなポップス。80年代のノスタルジーと最新のデジタル音響が融合し、分厚いシンセの壁、自動補正されたキラキラのボーカル、パンチの効いたビートが特徴。テンポはアップテンポでフロア向けのものが多い。とにかくキャッチーで耳に残り、一度聴いたらサビが離れない中毒性がある。明るくてカラフル、深刻さとは無縁の快楽主義的なポップミュージック。",
    roots_story:"2000年代後半、80年代シンセポップへのリバイバルとデジタルプロダクションの進化が合流。La Rouxの「Bulletproof」(2009)、Robynの「Dancing On My Own」(2010)がジャンルの代表曲。Lady Gagaは「Just Dance」(2008)でエレクトロポップをメインストリームの中心に据えた。Charli XCX、Carly Rae Jepsenらがさらにポップに振り切り、Grimes、CHVRCHESはインディー寄りのアプローチで批評家からも支持された。現在もポップスの主流サウンドの一つとして定着している。"},

  // インダストリアル系
  {id:"industrial", label:"Industrial", cat:"industrial", era:"1977", suno:false,
    desc:"金属を叩く音、機械の軋み、工場の騒音をそのまま音楽にしたような攻撃的なサウンド。ドラムは硬質で打撃的、ベースは歪んで唸り、ボーカルは叫ぶか機械的に加工される。不快感や緊張感を意図的に生み出す音楽で、聴いていると心拍数が上がる。美しさよりも衝撃と挑発を追求しており、反社会的・反権威的なメッセージを込めることが多い。工業地帯の灰色の風景がそのまま音になったような、重く冷たいサウンドスケープ。",
    roots_story:"1976年、Throbbing Gristleがロンドンを拠点にIndustrial Recordsを設立。バンド名通り「脈打つ軟骨」のような不気味なパフォーマンスで、テープコラージュ、自作電子機器、歪んだボーカルを駆使した。「Industrial Music for Industrial People」という標語がジャンル名の由来。ドイツのEinstürzende Neubauten（崩壊する新建築）は文字通り建設現場の廃材を楽器にした。Cabaret Voltaireはシンセサイザーとテープ操作で独自路線を、SPKはオーストラリアからより過激なノイズを発信。アメリカではMinistryやNine Inch Nailsがロック寄りのインダストリアルを大衆化させた。"},

  {id:"ebm", label:"EBM", cat:"industrial", era:"1981", suno:false,
    desc:"インダストリアルの攻撃性にダンスフロアのビートを注入した音楽。硬質な4つ打ちキック、反復するシンセベースのシーケンス、咆哮するようなボーカルが基本構成。テンポは中速〜やや速め（BPM 110〜140）で、体を前後に揺らしたくなるような無骨なグルーヴがある。冷たく暗いが、踊れる。ゴスクラブやインダストリアル系クラブの定番で、黒い服に身を包んだ集団が無表情で踊っている光景が似合う。",
    roots_story:"1981年、ベルギーのFront 242が「Body to Body」を発表し、Electronic Body Music（EBM）を提唱。インダストリアルの実験性をダンスフロア向けに再構築したスタイルだった。ドイツのDAF（Deutsch Amerikanische Freundschaft）は最小限のシンセとドラムマシンで粗野なダンスビートを生み出し、EBMの原型を作った。Nitzer Ebbはよりハードでアグレッシブなスタイルを確立。これらのバンドの「シーケンサーで駆動する反復ビート」はデトロイト・テクノに大きな影響を与え、電子ダンス音楽全体の重要な礎となった。"},

  {id:"post_punk", label:"Post-Punk", cat:"industrial", era:"1978", suno:false,
    desc:"パンクの「何でもあり」精神を引き継ぎつつ、より暗く、実験的で、知的な方向へ進んだ音楽。ギターはコードを掻き鳴らすのではなくリバーブやディレイで空間的な音を作り、ベースラインが楽曲を引っ張ることが多い。ボーカルは低く抑制的で、歌詞は内省的・文学的。テンポは様々だが中速が多く、どこか不安定で落ち着かない空気が漂う。暗いけれど美しく、冷たいけれど感情的。曇り空の都市の風景が似合う音楽。",
    roots_story:"1978年頃、パンクの短命な爆発の後に、より持続可能な音楽表現を求めたアーティストたちが現れた。Joy Divisionは重く暗いサウンドとIan Curtisの切迫した歌唱で「ポストパンクの象徴」となり、彼の死後New Orderとしてエレクトロニックダンスへ転身。Siouxsie and the Bansheesはゴシックな美学を導入。Wire、Gang of Four、Bauhaus、The Cureがそれぞれ独自の方向を開拓。このジャンルは直接コールドウェーブ、ダークウェーブ、ゴシックロックに分岐し、電子音楽との架け橋となった。"},

  {id:"coldwave", label:"Coldwave", cat:"industrial", era:"1979", suno:true,
    desc:"名前の通り「冷たい波」。シンセサイザーの氷のような音色、ミニマルなドラムマシン、抑揚を抑えた冷淡なボーカルが、凍りつくような無機質な美を生む。感情を表に出さず、内側に閉じ込めたような張り詰めた緊張感が全体を支配する。テンポは中速で、同じフレーズが繰り返される催眠的な構成。真冬の深夜、人気のない都市の路地裏を歩いているような孤独感と美しさが共存する音楽。",
    roots_story:"1970年代末、フランスとベルギーのアーティストがイギリスのポストパンク/ニューウェーブを独自に解釈した。フランスのMartin Dupont、Trisomie 21、KaS Product、ベルギーのSignal Aoutが代表格。英語圏のニューウェーブより暗く、ミニマルで、感情を抑制した冷たい質感が特徴だった。フランス語の響き自体がクールな雰囲気を生み出し、英米のポストパンクとは明らかに異なる空気感があった。長らくアンダーグラウンドに留まっていたが、2010年代にDrab Majesty、Lebanon Hanoverらによってリバイバルされた。"},

  {id:"darkwave", label:"Darkwave", cat:"industrial", era:"1980s", suno:false,
    desc:"暗く神秘的な電子音楽。シンセサイザーの深い残響、荘厳なストリングスパッド、エコーのかかったボーカルが織りなす、闇の中の美しさ。ゴシックの退廃的な美学と電子音楽の冷たさが融合しており、中世の城や月光に照らされた墓地のような幻想的な世界観がある。テンポはゆったり〜中速で、ダンスフロアで流れることもあるが、むしろ暗闇に沈み込むように聴く音楽。悲しみや孤独を美に変換する耽美的なサウンド。",
    roots_story:"1980年代、ポストパンクとゴシックロックのダークな美学がシンセサイザーと出会って生まれた。Clan of Xymox（オランダ）はシンセポップとゴシックを融合させた初期の代表格。Dead Can Dance（オーストラリア）は中世音楽やワールドミュージックの要素を取り入れ、ジャンルの幅を大きく広げた。Cocteau Twinsの幻想的なサウンドも影響を与えた。ドイツではDas Ich、Goethes Erbenがドイツ語ダークウェーブを確立。後にネオクラシカルダークウェーブ、エセリアルウェーブに分岐し、現在もゴス系クラブシーンの中核を成している。"},

  {id:"gothic_rock", label:"Gothic Rock", cat:"industrial", era:"1979", suno:false,
    desc:"パンクの攻撃性をダークでドラマチックな方向に昇華させたロック。リバーブの深いギター、太く唸るベースライン、荘厳でバリトン気味のボーカルが暗黒の美世界を描く。歌詞は死、愛、孤独、超自然的テーマを扱い、黒い衣装、蒼白なメイク、コウモリ的なビジュアルと一体化したサブカルチャー。テンポは中速で重厚感があり、パンクのスピード感よりも雰囲気と世界観の構築に重きを置く。美しくも退廃的な闇のロック。",
    roots_story:"1979年、Bauhaus「Bela Lugosi's Dead」が9分半の暗黒叙事詩でゴシックロックの誕生を告げた。吸血鬼映画俳優の名を冠したこの曲は、パンクの攻撃性をホラー映画的な美学に変換した。Siouxsie and the Bansheesはエキゾチックで呪術的なサウンドを展開、The Sistersof Mercyはドラムマシンを使った重厚なロックを確立、The Cureは「Seventeen Seconds」(1980)から暗い方向へ。The Missionはよりロック寄りのゴシックを追求。ゴシックロックはファッション・文学・映画を含む一大サブカルチャーを生み、ダークウェーブとともに現在もゴスシーンの中心にある。"},

  {id:"neoclassical_dw", label:"Neoclassical\nDarkwave", cat:"industrial", era:"1990s", suno:true,
    desc:"クラシック音楽の荘厳さとダークウェーブの暗い神秘性が融合した音楽。弦楽四重奏やピアノの旋律、聖歌隊のようなコーラスが電子音のドローンやパッドの上に重なる。大聖堂の中で聴いているような残響と荘厳さがあり、中世ヨーロッパや暗黒時代を連想させる世界観。テンポはゆっくりで、感情は内に秘めた悲壮感や崇高さを表現する。美しさと畏怖が同居する、芸術性の高い暗黒音楽。",
    roots_story:"1990年代初頭、Dead Can Danceの壮大な音楽世界に触発されたアーティストたちがクラシック楽器と電子音の融合を本格化。Arcana（スウェーデン）は弦楽器とエレクトロニクスの幽玄な融合を追求。Elend（フランス）はフルオーケストラと合唱を使った壮大な暗黒交響曲を作り上げた。Stoa、Ophelia's Dream、In Slaughter Nativesらがスタイルを発展。ドイツのSopor Aeternus & the Ensemble of Shadowsは一人多重録音で独自の世界を構築。Projekt Records（アメリカ）とHyperiumレコード（ドイツ）がジャンルの拠点レーベルとなった。"},

  {id:"ethereal_wave", label:"Ethereal Wave", cat:"industrial", era:"1980s", suno:true,
    desc:"「天上の波」という名の通り、この世のものとは思えない幻想的で透明な音楽。深いリバーブの中を漂う女性ボーカル（歌詞が聞き取れないほど加工されることも）、揺らめくギターのアルペジオ、シンセの靄のようなパッドが、夢の中にいるような浮遊感を生む。テンポはゆったりで、メロディは美しく儚い。月明かりの下で花が咲くような、触れたら消えてしまいそうな繊細さがある。暗さの中の光のような音楽。",
    roots_story:"1980年代、Cocteau Twinsがジャンルの最重要バンドとして君臨。Elizabeth Fraserの言語を超越した歌唱（造語や聞き取れない言葉で歌う「グロソラリア」的手法）とRobin Guthrieの極端にリバーブをかけたギターが、他に類を見ない音響世界を生んだ。「Heaven or Las Vegas」(1990)が代表作。4AD Recordsがジャンルの中心レーベルとなり、This Mortal Coil、Lush、Pale Saintsらが所属。Dead Can Danceのリサ・ジェラルドの声楽も大きな影響を与えた。シューゲイザーとも重なる部分があり、My Bloody Valentineとも共鳴していた。"},

  {id:"harsh_noise", label:"Harsh Noise", cat:"industrial", era:"1980s", suno:true,
    desc:"音楽と騒音の境界を完全に消し去った極限の音響表現。フィードバック、歪み、静電気のような電子ノイズが壁のように押し寄せ、メロディ・リズム・ハーモニーといった音楽の要素は一切存在しない。耳が痛くなるほどの音圧で聴く者の感覚を圧倒する。心地よさとは対極にあるが、その激しさの中に「音そのものの力」を純粋に体験する独特のカタルシスがある。聴覚の限界に挑戦する、最も過激な音楽表現の一つ。",
    roots_story:"1970年代後半のインダストリアル音楽を極端に推し進めた形で誕生。日本のMerzbow（秋田昌美）が1980年代からハーシュノイズの最重要アーティストとして膨大な作品を発表し続けており、ジャンルの代名詞的存在。「パルスデーモン」(1996)は400作以上あるディスコグラフィーの中でも代表作。Masonna、Incapacitants、非常階段ら日本のジャパノイズ（Japanoise）勢がジャンルを牽引。アメリカではWolf Eyes、Prurient、Kevin Drumm、ヨーロッパではVomir（フランス）のHNW（Harsh Noise Wall）が一つのサブジャンルとして確立された。"},

  // アンビエント系
  {id:"ambient", label:"Ambient", cat:"ambient", era:"1978", suno:false,
    desc:"空間そのものが音楽になったような、極めて静かで穏やかな音響芸術。シンセサイザーの長いドローン（持続音）、かすかな電子音の揺らぎ、時折聞こえる環境音が、広大で透明な音の風景を描く。ビートはなく、メロディもあるかないかの境界を漂う。集中して聴いても、BGMとして流しても成立する不思議な二面性がある。時間の流れが遅くなるような、部屋の空気が変わるような、音楽というより「場」を作る音。",
    roots_story:"1978年、Brian Enoが「Music for Airports」を発表し「アンビエント」を音楽用語として定義した。空港の待合ロビーで流れることを想定し、「注意を引くことなく空間に溶け込む音楽」というコンセプトだった。Enoは先立つ「Discreet Music」(1975)で既にこの方向性を示していた。Kraftwerkやクラウトロックの反復性、Erik Satieの「家具の音楽」(1917)というコンセプトも源流にある。Harold Budd、Laraaji、Roger Enoらが初期のコラボレーターとなり、後にThe Orbがダンスフロア向けのアンビエントハウスを、Aphex Twinが実験的なアンビエントを追求した。"},

  {id:"dark_ambient", label:"Dark Ambient", cat:"ambient", era:"1980s", suno:true,
    desc:"闇の底から響いてくるような、不穏で重苦しい音響世界。低周波のドローンが地鳴りのように空間を満たし、金属的な軋み、遠くの叫び声のようなサンプル、不気味な残響音が断片的に現れては消える。ビートはなく、聴いていると暗闇に目が慣れるように恐怖が日常化していく感覚がある。廃墟、地下洞窟、深夜の工場跡地といった場所の空気をそのまま真空パックしたような音楽。心地よくはないが、奇妙な中毒性がある。",
    roots_story:"1980年代、インダストリアル音楽の攻撃性を取り除き、暗く静的な音響空間だけを残す方向に進んだアーティストたちが登場。Lustmordがジャンルの創始者として広く認められており、「Heresy」(1990)は代表作。洞窟や屠殺場で録音したフィールドレコーディングと低周波ドローンを融合させた。Raison d'être（スウェーデン）はCold Meat Industryレーベルを拠点に教会の残響を取り入れた荘厳なダークアンビエントを展開。Atrium Carceri、Desiderii Marginis、Kammarheitらスウェーデン勢が特に強く、同国のCMI、Cyclic Lawが主要レーベルとなった。"},

  {id:"space_ambient", label:"Space Ambient", cat:"ambient", era:"1970s", suno:true,
    desc:"無限の宇宙空間を音で描いた、壮大で広がりのあるアンビエント。煌めくシンセのパッドが星雲のように広がり、深い残響が無重力空間を表現する。時折キラキラした高音が流れ星のように通り過ぎ、低いドローンが宇宙の深淵を感じさせる。ゆったりとしたテンポ（あるいはテンポなし）で、聴いていると地球から離れていくような浮遊感に包まれる。プラネタリウムのBGMとして最適な、壮大で静謐な音楽。",
    roots_story:"1970年代、Tangerine Dreamが「Phaedra」(1974)でシンセサイザーによる宇宙的音響を確立した最初のバンドの一つ。Klaus Schulzeも壮大な電子音空間を構築した。Brian Enoの「Apollo: Atmospheres and Soundtracks」(1983)はNASAのアポロ計画を題材にした傑作で、ジャンルの金字塔。Steve Roach「Structures from Silence」(1984)は静寂からの音の構築を極めた。Aglaia、Oöphoi、Jonn Serrie、Robert Richらが宇宙的テーマを追求し続けている。NASAが公開した惑星の電磁波データを音に変換する「ソニフィケーション」もこのジャンルと共鳴している。"},

  {id:"ritual_ambient", label:"Ritual Ambient", cat:"ambient", era:"1980s", suno:true,
    desc:"古代の儀式や祈りの場にいるような、神秘的で呪術的な音響空間。民族楽器（ディジュリドゥ、シンギングボウル、フレームドラム）の倍音、詠唱のようなボーカル、鈴や鐘の残響が電子音のドローンと混ざり合う。聴いていると意識が変容するような、トランス状態に近い感覚を生む。テンポはゆったりか、パーカッションの原始的リズムが催眠的に繰り返される。焚き火を囲む夜の儀式、寺院の読経、シャーマンの太鼓のような原始的な神聖さを帯びた音楽。",
    roots_story:"1980年代、ダークアンビエント/インダストリアルのアーティストたちが古代の儀式や異教文化に目を向け始めた。Zero Kama（ドイツ）は人骨で作った楽器で演奏するという極端なコンセプトで話題に。Ain Soph（日本）、Hybryds（ベルギー）が初期の代表格。1990年代にはAenigma Project、Daemonia Nymphe（ギリシャ）が古代ギリシャの音楽を再構築。Heilung（デンマーク/ノルウェー）は2010年代にバイキング時代の儀式音楽を壮大なパフォーマンスで再現し、一般の注目を集めた。Wardruna（ノルウェー）もTV番組「ヴァイキング」のサウンドトラックで知名度を上げた。"},

  {id:"horror_ambient", label:"Horror Ambient", cat:"ambient", era:"1980s", suno:true,
    desc:"ホラー映画の中に放り込まれたような、純粋な恐怖を音で再現する音楽。突然の金属的な衝撃音、忍び寄るような低周波のドローン、遠くから聞こえる不明瞭な囁き声、軋むドアの音。聴覚を通じて恐怖を体験させることに特化しており、暗い部屋で聴くと本能的に背後を確認したくなる。テンポはほぼなく、沈黙と音の落差で聴く者の神経を逆なでする。ダークアンビエントよりも直接的に「怖い」ことを目指した、恐怖体験としての音楽。",
    roots_story:"ホラー映画のサウンドトラックとダークアンビエントの交差点で生まれた。John Carpenter自身が作曲した「ハロウィン」テーマ(1978)のミニマルなシンセサウンドが原型の一つ。Goblinのイタリアンホラー映画音楽（「サスペリア」1977等）も大きな影響源。アンビエントシーンではAtrium Carceri「Cellblock」(2003)が荒廃した精神病院を音で描き、ジャンルの代表作に。Cryo Chamber、Malignant Recordsがジャンルの中心レーベル。近年はホラーゲーム（Silent Hillシリーズの山岡晃の音楽など）との相互影響も強い。"},

  {id:"underwater_ambient", label:"Underwater\nAmbient", cat:"ambient", era:"1990s", suno:true,
    desc:"深海に潜っているような、水の中の世界を音で再現したアンビエント。すべての音がくぐもったフィルターを通したように丸く柔らかく、泡がぽこぽこと立ち上る音、遠くのクジラの歌声のような低音、水流のゆらめきが意識の底に沈んでいく感覚を生む。地上の喧騒から完全に遮断された静寂と、水圧を感じるような包み込まれる安心感がある。テンポはなく、ゆっくりと揺蕩うような音の動きだけがある。胎内回帰的な安らぎに満ちた音楽。",
    roots_story:"1990年代、アンビエントの細分化の中で水をテーマにした作品が一つのカテゴリとして認識され始めた。Biosphere（ノルウェー）の「Substrata」(1997)は北極の海中をイメージさせる作品でジャンルの金字塔。Aphex Twin「Selected Ambient Works Volume II」(1994)の一部トラックも水中的な質感を持つ。Irresistible Force「Global Chillage」(1994)は海の音をサンプリングした初期の例。Alio Die（イタリア）は水の音と有機的なテクスチャーを融合。近年ではハイドロフォン（水中マイク）を使った実際の海中録音を素材にするアーティストも増えている。"},

  // ハウス系
  {id:"chicago_house", label:"Chicago House", cat:"house", era:"1983", suno:false,
    desc:"ディスコの4つ打ちビートをシンセサイザーとドラムマシンで再構築した、ダンスミュージックの新しい形。ドンドンドンドンと刻む規則正しいキックの上に、温かみのあるシンセパッド、ソウルフルなボーカルサンプル、シンプルなベースラインが乗る。テンポはBPM 118〜128でまさに踊るために最適化されている。ディスコの華やかさを最小限の機材で再現した、手作り感と高揚感が共存するサウンド。フロアが一体になる多幸感がこの音楽の本質。",
    roots_story:"1983〜84年、シカゴのゲイクラブ「The Warehouse」のDJ Frankie Knucklesがディスコレコードにドラムマシンのビートを重ね、テンポを上げて再構築するプレイを始めた。クラブの名前から「House Music」と呼ばれるようになった。Jesse Saunders「On and On」(1984)が最初のハウスレコードとされる。Marshall Jeffersonは「Move Your Body」(1986)でピアノハウスを確立。Larry Heardは「Can You Feel It」(1986)でディープハウスの原型を作った。Trax RecordsとDJ International Recordsがシカゴハウスの2大レーベルとなった。"},

  {id:"deep_house", label:"Deep House", cat:"house", era:"1986", suno:false,
    desc:"ハウスミュージックの中でも最も「聴かせる」スタイル。ジャジーなコード進行、柔らかく温かいシンセパッド、深みのあるベースライン、ソウルフルなボーカルが、洗練された大人の空間を演出する。テンポはBPM 118〜125とハウスの中ではやや遅めで、激しく踊るよりも体を揺らして心地よくなる音楽。夜のラウンジやビーチサイドのバーが似合う。派手さはないが、何時間聴いても疲れない上質なグルーヴが魅力。",
    roots_story:"1986年、シカゴのLarry Heard（Mr. Fingers）が「Can You Feel It」「Mystery of Love」をリリースし、ハウスに深みと感情を持ち込んだ。従来のシカゴハウスよりもテンポを落とし、ジャズやソウルの要素を取り入れたこのスタイルが「ディープハウス」と呼ばれるようになった。Ron Trentはよりスピリチュアルな方向を追求。Kerri Chandlerはニューヨークから独自のディープサウンドを発信。2010年代にはDisclosureの「Latch」がメインストリームでヒットし、ディープハウスが広く認知された。"},

  {id:"acid_house", label:"Acid House", cat:"house", era:"1987", suno:false,
    desc:"Roland TB-303ベースラインシンセサイザーの「ビヨヨヨーン」とうねる独特の音色が主役。フィルターを開閉することで生まれるヌルヌルと粘りつくような電子音が、4つ打ちビートの上で催眠的にうねり続ける。テンポはBPM 120〜130。聴いていると脳が溶けるようなトリッピーな感覚があり、意識が変容するようなサイケデリックな体験を生む。スマイリーフェイスのロゴに象徴される享楽的なエネルギーに満ちた音楽。",
    roots_story:"1987年、シカゴのDJ Pierre、Spanky、Herbが偶然TB-303（本来はベース伴奏用の不人気機材）のツマミをいじっていた時に、あの独特の「アシッド」サウンドを発見。「Acid Tracks」としてTrax Recordsからリリースされ、新しいサウンドの幕が開けた。この音がイギリスに渡り、1988年の「セカンド・サマー・オブ・ラブ」と呼ばれるレイブムーブメントを引き起こした。数万人規模の違法レイブパーティーがイギリス各地で開催され、社会現象に。スマイリーフェイスがシンボルとなり、アシッドハウスは音楽だけでなく文化革命となった。"},

  {id:"funky_house", label:"Funky House", cat:"house", era:"1990s", suno:true,
    desc:"ファンクのグルーヴとハウスの4つ打ちが融合した、底抜けにノリのいいダンスミュージック。チャカチャカしたカッティングギター、スラップベース風のベースライン、ファンキーなホーンのサンプルが4つ打ちキックの上で踊る。テンポはBPM 125前後。とにかく楽しくて明るく、深刻さゼロ。聴いた瞬間に笑顔になれるようなパーティーミュージックで、クラブの盛り上がりを最大化する。難しいことを考えずに踊り狂うための音楽。",
    roots_story:"1990年代後半にイギリスで流行が本格化。ハウスの4つ打ちにファンクやディスコのサンプルを大量に取り入れたスタイルで、特にUKのクラブシーンで人気を博した。DJ Sneak、Roger Sanchezが初期の主要アーティスト。イギリスではKenny Dopeが人気を集め、Defected Recordsがレーベルとして中心的な存在に。Purple Music（スイス）も重要なレーベル。2000年代にはDavid Guettaらがよりポップな方向へ発展させ、メインストリームのダンスポップへの橋渡し役となった。"},

  {id:"uk_garage", label:"UK Garage", cat:"house", era:"1996", suno:false,
    desc:"シャッフルする跳ねたリズム、R&B風のセクシーなボーカル、パンチのあるベースラインが特徴のUK独自のダンスミュージック。ハウスの4つ打ちをベースにしつつ、リズムを崩して「タッタタ・タッタタ」と跳ねさせることでグルーヴを生む。テンポはBPM 130前後。洗練されていてストリート感もあり、チャラいけどカッコいい。シャンパンを片手にクラブで踊るような都会的な空気感が漂う。UKの独自進化を象徴するジャンル。",
    roots_story:"1990年代半ば、ニューヨークのガレージハウス（Paradise GarageのLarry Levanに由来）がイギリスに渡り、独自に変容した。Todd Edwards（アメリカ）のボーカルを細切れにサンプリングする手法がUKのプロデューサーに大きな影響を与えた。MJ Cole「Sincere」(2000)、Artful Dodger ft. Craig David「Re-Rewind」(1999)がメインストリームでヒット。Craig Davidはこのジャンルから世界的スターに。London系のクラブ（Twice As Nice等）が拠点となり、後に2-Step、Speed Garageに分岐。さらにそこからダブステップとグライムが誕生した。"},

  {id:"two_step", label:"2-Step", cat:"house", era:"1997", suno:true,
    desc:"UK Garageの中でもリズムの跳ね方が極端に強調されたスタイル。4つ打ちの2拍目と4拍目のキックを抜くことで生まれる「空白」がスウィング感を最大化し、体が勝手にステップを踏み始めるようなリズム。R&B的な甘いボーカル、シャリシャリしたハイハット、ベースの「ブン」という弾み。テンポはBPM 130前後だが、跳ねるリズムのおかげで体感的にはもっと軽快。都会的でスタイリッシュ、夜の街を歩くBGMにぴったり。",
    roots_story:"1997年頃、UK Garageのプロデューサーたちがキックパターンを実験する中で、4つ打ちの一部を抜くことで独特のスウィング感を生むスタイルが確立された。名前は「2拍子ステップ」に由来。MJ Cole、Zed Bias、El-Bが代表的プロデューサー。2000年前後のUKチャートを席巻し、Artful Dodger、Sweet Female Attitudeらがヒットを連発。Craig Davidのデビューアルバム「Born to Do It」(2000)は2-Stepの集大成的作品。2010年代にはJames Blake、Disclosureが2-Stepの要素を現代的に再解釈した。"},

  {id:"speed_garage", label:"Speed Garage", cat:"house", era:"1996", suno:true,
    desc:"UK Garageのベースラインを極端に太く重くしたスタイル。「ブルルルル」とうねるワブリーなベースが全身を振動させ、タイトでスピーディーなリズムが疾走感を生む。テンポはBPM 130〜140とガレージの中では速め。ダブの重低音とガレージの跳ねるリズムが同居する、ヘッドバンキングしながら腰も動くような二刀流のグルーヴ。重くてスピーディー、都会の地下を猛スピードで走り抜けるような音楽。",
    roots_story:"1996〜97年、UK Garageのプロデューサーたちがベースラインをより重く、うねるように加工し始めた。Armand Van HeldenによるTori Amos「Professional Widow」のリミックス(1996)がスピードガレージの代表曲としてよく挙げられる。187 Lockdown「Gunman」もジャンルを代表する一曲。Dreem Teem、DJ Narrows、DJ Eternityらがスタイルを発展。ベースの重さを追求する方向はこの後UK Garageからさらに低速化・重量化されてダブステップへと進化していく、重要な通過点となった。"},

  {id:"progressive_house", label:"Progressive\nHouse", cat:"house", era:"1991", suno:false,
    desc:"長い時間をかけてじわじわと盛り上がっていく、壮大な展開を持つハウス。1曲の中で少しずつ要素を足し引きしながらクライマックスに向かう「ビルドアップ」が最大の特徴。シンセのパッドが幾層にも重なり、フィルターが徐々に開いていく高揚感は、まるで夜明けを待つような体験。テンポはBPM 124〜130。聴いていると時間を忘れる没入感があり、DJセットの中で真価を発揮する。即効性よりも旅のような体験を提供する音楽。",
    roots_story:"1991年頃、ハウスミュージックがよりドラマチックで展開のある方向へ進化。Sasha & John Digweedのコンビが「Renaissance」ミックスシリーズ（1994〜）で長い展開のDJプレイを確立し、ジャンルの代名詞的存在に。Leftfield「Leftism」(1995)、Underworld「Born Slippy .NUXX」(1996)も重要作品。2000年代にはDeadmau5がシンプルでメロディアスなプログレッシブハウスでEDMシーンに参入。Eric Prydz「Call on Me」(2004)はメインストリームでの大ヒット。現在もアンダーグラウンドからメインストリームまで幅広く支持されている。"},

  {id:"electro_house", label:"Electro House", cat:"house", era:"2000s", suno:false,
    desc:"ハウスのビートにエレクトロの鋭いシンセ音とディストーションを注入した、攻撃的でエネルギッシュなスタイル。歪んだベースライン、ギラギラしたシンセのリード音、ドカンと落ちるドロップが特徴。テンポはBPM 125〜130。プログレッシブハウスのようにゆっくり盛り上がるのではなく、ビルドアップからドロップへの「落差」で一気にフロアを爆発させる。大音量で浴びるのが最高のサウンド。フェスティバルのメインステージ向け。",
    roots_story:"2000年代前半、ハウスとエレクトロの境界が崩れ始めた。Justice「†」(2007)はフランスから登場したエレクトロハウスの金字塔で、ロック的な歪みと攻撃性をダンスミュージックに持ち込んだ。Benny Benassi「Satisfaction」(2002)は初期の代表曲。Daft Punk「Human After All」(2005)も影響を与えた。Skrillex、Feed Me、Wolfgang Gartnerらが2010年前後にスタイルを発展。EDMブームの最中ではビッグルームハウスと合流し、フェスティバルEDMの主要な構成要素となった。"},

  {id:"big_room", label:"Big Room House", cat:"house", era:"2010s", suno:false,
    desc:"数万人収容のフェスティバル会場で最大のインパクトを出すために設計された、極めて分かりやすいダンスミュージック。シンプルで覚えやすいシンセのリフ、長いビルドアップ、そして「ドーン！」と落ちる大きなドロップの繰り返し。テンポはBPM 126〜130。繊細さよりもインパクト、複雑さよりもシンプルさを追求。巨大なスピーカーから放たれる重低音と花火や照明の演出で、フェスの群衆を一斉にジャンプさせる。体験型エンターテイメントとしての音楽。",
    roots_story:"2010年代前半、Hardwell、Dimitri Vegas & Like Mike、Martin Garrixらオランダ・ベルギーのDJ/プロデューサーが確立。Martin Garrixが17歳で発表した「Animals」(2013)がジャンルを象徴する大ヒットとなった。Tomorrowland、Ultra Music Festivalなどの巨大EDMフェスティバルの成長と完全にシンクロしており、フェスのメインステージで最大のインパクトを出すことに最適化されたスタイル。Spinnin' Records、Revealed Recordingsが主要レーベル。2010年代半ばにはピークを過ぎ、より多様なサウンドへシフトしていった。"},

  {id:"moombahton", label:"Moombahton", cat:"house", era:"2010", suno:true,
    desc:"レゲトンのゆったりしたデンボウリズム（ドッ・カッ・ドド・カッ）をハウスのプロダクションで磨き上げた、腰が勝手に動くラテン系ダンスミュージック。テンポはBPM 108前後とハウスよりかなり遅く、その分ベースの一発一発が重く響く。シンセのキラキラした音色とラテン的なパーカッションが夏の空気を運ぶ。攻撃的すぎず、おしゃれすぎず、老若男女が自然に体を揺らせる間口の広さがある。BBQパーティーやプールサイドが似合う陽気な音楽。",
    roots_story:"2009年、アメリカのDJ/プロデューサーDave Nadaがパーティーで思いつきでDutch Houseのトラックを半分のテンポ（BPM 108）に落としてプレイしたところ、予想外にフロアが盛り上がった。レゲトンのテンポと一致したこの発見から「Moombahton」が命名された（レゲトンの曲「Moombah」に由来）。Dillon Francis、Munchi（オランダ）がスタイルを発展。Major Lazer（Diplo）はムーンバートンの要素を取り入れてグローバルヒットを連発し、ジャンルの知名度を大きく上げた。ラテン音楽とEDMの架け橋となった。"},

  // テクノ系
  {id:"detroit_techno", label:"Detroit Techno", cat:"techno", era:"1985", suno:false,
    desc:"機械的な正確さと人間的な感情が共存する、未来的でメランコリックな電子音楽。シンセサイザーのクリスタルのような音色、精密に打ち込まれた4つ打ちビート、深いリバーブに包まれたパッドが、荒廃した工業都市デトロイトの寂寥感と未来への希望を同時に表現する。テンポはBPM 125〜135。冷たいのに温かい、機械的なのに感情的という矛盾がこの音楽の核心。宇宙と都市の風景が重なる、孤独で美しいサウンド。",
    roots_story:"1985年、デトロイトの3人の高校の同級生「ベルヴィル・スリー」がジャンルを創始。Juan Atkins「No UFOs」(1985)が最初のテクノレコードとされる。KraftwerkとParliament/Funkadelicを等しく愛した彼らは、ヨーロッパの電子音楽とアメリカのファンクを融合させた。Derrick May「Strings of Life」(1987)は「テクノの国歌」と呼ばれ、ピアノの旋律が機械ビートの上で感動的に響く名曲。Kevin Saundersonは「Big Fun」をポップヒットさせた。彼らの音楽がイギリス・ヨーロッパに渡り、ベルリンを中心とした世界的なテクノシーンを生んだ。"},

  {id:"techno", label:"Techno", cat:"techno", era:"1988", suno:false,
    desc:"4つ打ちキックの反復を基盤に、シンセサイザーの無機質な音色とミニマルな構成で構築されるダンスミュージック。同じパターンが延々と繰り返される中で、微細な音の変化やフィルターの開閉が催眠的なトランス状態を生む。テンポはBPM 125〜145と幅広い。装飾を排した禁欲的なサウンドで、歌やメロディはほぼない。深夜のクラブで大音量に身を委ねると、体がビートに同期して思考が消える没入体験が得られる。暗い箱の中で踊り続けるための機能的音楽。",
    roots_story:"デトロイトで誕生したテクノが1988年頃にヨーロッパに渡り、特にベルリンの壁崩壊(1989)後の旧東ベルリンで爆発的に広がった。放棄された建物が不法クラブとなり、東西統合の混乱と自由のエネルギーがテクノと結びついた。Tresorクラブ(1991年開店)がベルリンテクノの拠点となり、Jeff Mills、Robert Hood（デトロイト勢）とSven Väth、Richie Hawtin（ヨーロッパ勢）が交流。Berghainクラブ（2004年〜）は世界最高峰のテクノクラブとして君臨。Love Paradeフェスティバル(1989〜)は100万人以上を集める社会現象に。テクノはベルリンの文化的アイデンティティそのものとなった。"},

  {id:"acid_techno", label:"Acid Techno", cat:"techno", era:"1988", suno:true,
    desc:"TB-303のうねるアシッドサウンドをテクノの硬質なビートに乗せた、攻撃的でサイケデリックなスタイル。グニョグニョと歪みながらフィルターが開閉するベースラインが脳を直接揺さぶり、正確無比な4つ打ちキックが体を前に押し出す。テンポはBPM 130〜145とテクノの中でもやや速め。アシッドハウスのトリッピーさとテクノの硬さが共存し、暗いクラブで浴びると視覚的な効果すら感じるような強烈な音響体験。容赦ない反復が恍惚を生む。",
    roots_story:"アシッドハウスの発明（1987年）とほぼ同時に、TB-303のサウンドをよりハードでテクノ寄りに使うアーティストが現れた。ロンドンではSpiral Tribe（フリーパーティー集団）がアシッドテクノをスクワットパーティーやフリーレイブで演奏し、体制への抵抗の音楽としての側面を持った。Chris Liberator、Dave the Drummerらがロンドンのアシッドテクノシーンを牽引。Hardfloorはドイツからよりメロディアスなアシッドテクノを発信。Stay Up Foreverレーベルがジャンルの拠点に。現在もアンダーグラウンドシーンで根強い人気がある。"},

  {id:"hard_techno", label:"Hard Techno", cat:"techno", era:"1990s", suno:true,
    desc:"テクノの反復ビートをより速く、よりラウドに、より攻撃的にしたスタイル。歪んだキックドラムが腹にズシンと来る重量感で連打され、金属的なパーカッションが容赦なく叩きつける。テンポはBPM 140〜155と速く、エネルギーの放出を全力で追求する。繊細さゼロ、容赦なし。大音量で浴びると音が物理的な力に変わり、体が否応なく動かされる。暗くて激しいクラブの奥で、汗まみれになって踊り続ける人々のための音楽。",
    roots_story:"1990年代、テクノの速度と激しさを追求するアーティストが増加。フランクフルトのシーンが初期の中心で、Sven Väthが拠点としたCocoonクラブが重要な役割を果たした。Chris Liebing、Adam Beyerがハードテクノの代名詞的存在に。Ben Sims、Speedy Jも重要なアーティスト。2000年代にはAmalgamate、CLR（Chris Liebing Records）、Drumcode（Adam Beyer）が主要レーベルとして確立。2020年代には若い世代のDJ（VTSS、999999999等）がさらに過激なスタイルを追求し、ジャンルは再び勢いを増している。"},

  {id:"minimal_techno", label:"Minimal Techno", cat:"techno", era:"1990s", suno:true,
    desc:"音を極限まで削ぎ落とし、最小限の要素だけで成立するテクノ。キック、ハイハット、1〜2種類のパーカッション音だけで構成されることも珍しくない。その「ない」ことの美学の中で、わずかな音の変化——フィルターの微調整、クリックの位置のずれ——が巨大な出来事になる。テンポはBPM 120〜130でゆったりめ。聴き始めは「何もない」と感じるが、耳が慣れると微細な変化の宇宙が見えてくる。静寂の中の豊かさ、引き算の美学。",
    roots_story:"1990年代半ば、ベルリンのBasic Channel（Moritz von Oswald & Mark Ernestus）がダブの残響感とテクノのミニマリズムを融合させ、ダブテクノ/ミニマルの方向性を示した。Robert Hood（デトロイト）は「Minimal Nation」(1994)で「ミニマルテクノ」という言葉を定義。Richie HawtinはPlastikmanプロジェクトで極端にストリップダウンしたテクノを追求。2000年代にはRicardo Villalobos、Luciano（チリ）がミニマルにラテンの要素を加えた「ミニマルハウス」で世界を席巻。ベルリンのBerghain/Panorama Barがミニマルテクノの聖地として機能した。"},

  {id:"industrial_techno", label:"Industrial\nTechno", cat:"techno", era:"1990s", suno:true,
    desc:"工場の轟音と機械の振動をそのままダンスフロアに持ち込んだような、極めて攻撃的なテクノ。歪んだキック、金属を叩きつけるようなパーカッション、不穏なノイズがBPM 130〜145で容赦なく叩きつける。インダストリアルの不気味さ・暴力性とテクノの反復構造が完全に融合しており、工業地帯の灰色の美学がダンスミュージックになったようなサウンド。暗闘的な緊張感と圧倒的な音圧の中に、不思議な快感がある。",
    roots_story:"1990年代、インダストリアル音楽とテクノの合流が本格化。Surgeon（バーミンガム）とRegis（同）がBirmingham Technoとして知られるハードで暗いスタイルを確立し、Downwardsレーベルを設立。Ansome、Blawan、Paula Templeらが2010年代に新世代のインダストリアルテクノを牽引。Perc Traxレーベルも重要。2010年代後半にはBerghainクラブのブッキングポリシーの影響もあり、インダストリアルテクノはテクノシーン全体のトレンドとなった。Kobosil、SPFDJ、I Hate Modelsらが現在の中心アーティスト。"},

  {id:"dub_techno", label:"Dub Techno", cat:"techno", era:"1994", suno:true,
    desc:"テクノのミニマルなビートにダブの深い残響（リバーブとディレイ）を重ねた、瞑想的で幻想的なサウンド。コードが霧のように空間に広がり、キックとハイハットが奥まった場所からぼんやりと聞こえてくる。すべての音がエコーの海に溶け込み、輪郭がぼやけていく心地よさがある。テンポはBPM 120〜128でゆったり。深夜から明け方にかけて、意識が朦朧とする時間帯に完璧にフィットする。眠りに落ちる直前の意識の状態を音にしたような音楽。",
    roots_story:"1994年、ベルリンのBasic Channel（Moritz von Oswald & Mark Ernestus）が自主レーベルから発表した一連の12インチシングルでダブテクノを確立。ジャマイカのダブのエコー処理とデトロイトテクノのミニマリズムを融合させた独自のサウンドは、一聴してそれとわかる唯一無二のものだった。Chain Reactionレーベル（Basic Channelの傘下）にはMikkel Metal、Vladislav Delay、Monolakeらが集結。DeepChord（アメリカ）は「Liumin」(2007)で環境音とダブテクノを融合。日本のShinichi Atobe「Ship-Scope」(2001)も傑作とされる。"},

  {id:"intelligent_techno", label:"Intelligent\nTechno", cat:"techno", era:"1990s", suno:true,
    desc:"踊ることよりも「聴くこと」に重きを置いたテクノ。複雑に組み合わされたリズムパターン、予測不能な音の配置、緻密な音響デザインが知的好奇心を刺激する。ビートはあるが不規則で、聴いていると脳が音のパズルを解こうとする面白さがある。テンポは様々。イヤホンで細部まで聴き込むと新しい発見がある、何度聴いても飽きない奥深さ。踊るためではなく考えるための電子音楽。ソファに座って深夜に一人で聴くのが最高のシチュエーション。",
    roots_story:"1990年代初頭、Warp Records（イギリス）が「Artificial Intelligence」シリーズ(1992〜)をリリースし、「ソファで聴く電子音楽」というコンセプトを打ち出した。Autechre、Aphex Twin、Black Dog、B12らが所属し、IDM（Intelligent Dance Music）というジャンル名が生まれた。Aphex Twin「Selected Ambient Works 85-92」(1992)は電子音楽史上の傑作。Autechreは極端に複雑なリズムプログラミングで知られ、作品ごとにさらに抽象的な方向へ進んだ。Boards of Canada、Plaid、Squarepusherらもジャンルの重要人物。"},

  {id:"schranz", label:"Schranz", cat:"techno", era:"1990s", suno:true,
    desc:"テクノをさらにハードに、さらに速く、さらにうるさくした極限のスタイル。極端に歪んだキック、金切り声のようなシンセ、鉄板を引っかくようなノイズがBPM 145〜160の超高速で叩きつけられる。「シュランツ」はドイツ語でギシギシ軋む音を表す擬音語。繊細さは皆無だが、その暴力的な音圧の中に奇妙な爽快感がある。巨大なサウンドシステムで浴びると、音が皮膚を突き抜けて内臓を揺さぶる物理的な体験になる。",
    roots_story:"1990年代半ば、ドイツ（特にフランクフルト周辺）のハードテクノシーンから派生。Chris Liebing、DJ Rush（シカゴ出身だがドイツで活躍）が初期の主要アーティスト。名前の由来はドイツのDJ Zenkerが使い始めた俗語とされる。StreetparadeやMayday等のドイツ/オーストリアの大型レイブで特に人気を博した。CLR Records、Works Recordsが主要レーベル。2000年代以降は「ハードテクノ」という呼称に吸収されていく傾向があるが、その超攻撃的な美学は現在のインダストリアルテクノにも受け継がれている。"},
  {id:"techno_kayo", label:"Techno Pop\n(テクノ歌謡)", cat:"synthpop", era:"1978", suno:true,
    desc:"シンセサイザーとドラムマシンを主体にした日本発の電子ポップス。YMO（Yellow Magic Orchestra）に代表される、精密でクールな打ち込みサウンドにポップなメロディが乗るスタイル。西洋のシンセポップと比べて、東洋的な音階やテクノロジーへの親和性が独特の色を加えている。テンポは中速でダンサブル。無機質な電子音の中に日本的な繊細さと遊び心が共存する、知的でスタイリッシュな音楽。テクノ歌謡は歌謡曲にシンセを導入した大衆化バージョン。",
    roots_story:"1978年、YMO（細野晴臣・坂本龍一・高橋幸宏）が結成。「テクノポリス」「ライディーン」(1979)が日本で社会現象的ヒットとなり、海外でも「Behind the Mask」がMichael Jacksonにカバーされるなど国際的評価を得た。Kraftwerkの影響を受けつつも、東洋的メロディとユーモアを取り入れた独自のスタイルを確立。P-MODEL（平沢進）、ヒカシュー、プラスチックスが同時期に活動し「テクノポップ御三家」とも。歌謡曲の世界では松田聖子「SWEET MEMORIES」等にシンセが導入され「テクノ歌謡」という和製ジャンルに。Perfume（中田ヤスタカプロデュース）が2000年代にテクノポップを現代に蘇らせた。"},

  // トランス系
  {id:"trance", label:"Trance", cat:"trance", era:"1990", suno:false,
    desc:"名前の通り、聴く者を恍惚（トランス）状態に導く音楽。長いビルドアップで徐々にテンションを上げ、ブレイクダウンで一瞬の静寂を作り、そこからメインメロディが戻る瞬間の爆発的な高揚感がこのジャンルの真骨頂。キラキラしたシンセのアルペジオ、壮大なパッド、感動的なメロディラインが4つ打ちビートに乗る。テンポはBPM 130〜150。鳥肌が立つような感動と、ひたすら踊り続ける陶酔感を同時に与えてくれる、感情を揺さぶるダンスミュージック。",
    roots_story:"1990年頃、テクノとアシッドハウスの影響下でドイツ・ベルギー・オランダで発生。Sven Väthがフランクフルトのシーンを牽引し、Paul van Dyk、DJ Tiësto、Armin van Buurenがジャンルを世界レベルに押し上げた。Robert Miles「Children」(1996)は世界的大ヒット。A State of Trance（Armin van Buurenのラジオ番組、2001年〜）は1000回以上放送が続く長寿番組に。2000年代にはトランスの細分化が進み、プログレッシブ、アップリフティング、サイケデリックなど無数のサブジャンルが生まれた。"},

  {id:"goa_trance", label:"Goa Trance", cat:"trance", era:"1989", suno:true,
    desc:"インドの香辛料のようにスパイシーで、サイケデリックな渦に引き込まれる電子音楽。うねるシンセラインが蛇のように絡み合い、インド風のスケール（音階）やサンプルが神秘的な空気を加える。テンポはBPM 140〜150と速めで、ビートが止まることなく延々と続く。聴いていると意識が拡張していくような、万華鏡を覗いているような体験。ネオンカラーのビジュアルアートと一体化した、精神を解放するためのトランス音楽。",
    roots_story:"1960年代からヒッピーの聖地だったインド・ゴア州のビーチで、1980年代後半にDJ Laurent、Goa Gil（アメリカ人）らがアシッドハウスやEBMをビーチパーティーでプレイし始めた。インドの文化的環境とサイケデリック体験が融合し、独自のサウンドが形成された。Astral Projection（イスラエル）、Hallucinogen（Simon Posford, イギリス）、Juno Reactor（イギリス）が代表的アーティスト。イスラエルからの旅行者が多くゴアを訪れたことから、イスラエルは今もサイトランスの最大の市場の一つ。"},

  {id:"psytrance", label:"Psychedelic\nTrance", cat:"trance", era:"1990s", suno:true,
    desc:"ゴアトランスの精神性を受け継ぎつつ、より洗練されたプロダクションとバリエーションを持つサイケデリックな電子音楽。高速で駆け抜けるベースライン、次々と変化するシンセのテクスチャー、宇宙的なSE（効果音）がBPM 140〜155の疾走感の上で万華鏡のように展開する。聴覚の端から端まで音で埋め尽くされる情報量の多さが、脳を心地よく圧倒する。野外フェスの星空の下で体験するのが理想的な、精神旅行のための音楽。",
    roots_story:"1990年代半ば、ゴアトランスがインドのゴアビーチから世界に広がり、より多様なスタイルに発展した。Infected Mushroom（イスラエル）はサイトランスを最もポピュラーにしたアーティストで、ロックやメタルの要素も取り入れた。Shpongle（Simon Posford & Raja Ram）はワールドミュージックとの融合で唯一無二の世界を構築。Boom Festival（ポルトガル）、Ozora Festival（ハンガリー）が世界的なサイトランスフェスとして知られる。フルオン、ダークサイ、プログレッシブサイ、フォレストなど無数のサブジャンルに細分化された。"},

  {id:"acid_trance", label:"Acid Trance", cat:"trance", era:"1992", suno:true,
    desc:"TB-303のうねるアシッドサウンドとトランスの高揚感が合体した、トリッピーで陶酔的なスタイル。グニョグニョと変形するアシッドベースラインが催眠的に繰り返され、トランス特有のブレイクダウン→ビルドアップの構成でさらに恍惚感を増幅させる。テンポはBPM 135〜145。アシッドハウスよりハードで速く、トランスより粘りけがある。液体が沸騰するような音のテクスチャーが脳を直撃する、化学反応的な電子音楽。",
    roots_story:"1992年頃、ヨーロッパのトランスシーンでTB-303のサウンドがトランスの文脈で使われ始めた。Hardfloor「Acperience」(1992)がジャンルの金字塔として広く認知されている。Phuture 303、Emmanuel Top（フランス）、Kai Tracid（ドイツ）が代表的アーティスト。Acid Tranceはトランスの中でもアンダーグラウンド寄りのスタイルとして位置づけられ、1990年代のレイブカルチャーと密接に結びついていた。2010年代後半にはアシッドサウンドのリバイバルとともに再び注目されている。"},

  {id:"euro_trance", label:"Euro Trance", cat:"trance", era:"1995", suno:true,
    desc:"トランスのエッセンスをポップスのフォーマットに落とし込んだ、キャッチーで親しみやすいダンスミュージック。覚えやすいシンセのメロディ、女性ボーカルの歌もの、明快なサビ構成で、専門知識がなくても一発で「いい曲」と感じられる間口の広さがある。テンポはBPM 135〜145。感動的なブレイクダウンと爆発的なドロップがあり、フロアで手を上げて叫びたくなる。クラブ初心者でも楽しめる、トランスの大衆化バージョン。",
    roots_story:"1995年頃、ドイツ・オランダを中心にトランスのポップ化が進んだ。DJ Tiësto、Ferry Corsten、Above & Beyondが代表的アーティスト。ATB「9PM (Till I Come)」(1999)はユーロトランスの代表曲で世界中でヒット。Cascadaはボーカルトランスでチャートを席巻。Armin van Buurenの「A State of Trance」ラジオ番組がジャンルの普及に大きく貢献。2000年代にはPaul Oakenfold、Tiësto「Elements of Life」ツアーなど大規模なスタジアム公演も実現。EDMブームの先駆けでもあった。"},

  {id:"euphoric_trance", label:"Euphoric Trance", cat:"trance", era:"1990s", suno:true,
    desc:"トランスの中でも「感動」に全振りしたスタイル。天に昇るようなメロディ、壮大なストリングスパッド、感情を込めたボーカルが、長いビルドアップの果てに解き放たれる瞬間の多幸感は圧巻。テンポはBPM 136〜142。聴いていると理由もなく涙が出てきたり、無性に走り出したくなったりする、感情を極限まで増幅させる音楽。フェスの大トリでプレイされると数万人が同時に手を上げる光景が生まれる。感動のジェットコースター。",
    roots_story:"1990年代後半〜2000年代にトランスの「泣きメロ」を追求する方向が確立。Above & Beyondが最も影響力のあるアーティストで、「Sun & Moon」(2011)、「Thing Called Love」は「泣けるトランス」の代名詞。Gareth Emery、Andrew Rayel、Aly & Filaもジャンルの中心人物。Anjunabeatsレーベル（Above & Beyond主宰）がユーフォリックトランスの総本山。「ABGT（Above & Beyond Group Therapy）」イベントは世界各地で開催され、感動と一体感を売りにしたコミュニティを形成している。"},

  {id:"nrg_trance", label:"NRG Trance", cat:"trance", era:"1990s", suno:true,
    desc:"その名の通りエネルギー（NRG=Energy）を全開にしたトランス。ハードトランスとほぼ同義で、テンポはBPM 140〜155と速い。キックは重くパンチがあり、シンセのリードは鋭くて攻撃的。感動的な要素よりも「ぶちあがる」勢いを重視し、フロアの熱量を最大化する。聴いていると全力疾走している時のような心拍数の上昇を感じる。叙情性よりもアドレナリン、優しさよりも力強さ。拳を突き上げて踊るためのハイオクタン燃料のような音楽。",
    roots_story:"1990年代半ば〜後半、トランスの速度とエネルギーを追求する方向で発展。Scooterはドイツのハードトランス/NRGの代表格で、「Hyper Hyper」(1994)が大ヒット。日本ではパラパラダンスと結びついて独自の人気を博した。Yoji Biomehanika（日本）はNRGトランスの世界的なスターとなり、日本のクラブシーンを代表するDJに。Hennes & Cold、Cosmic Gate（初期）、Pulsedriver（ドイツ）らも重要。Tidy Traxレーベル（イギリス）がNRGトランスの拠点だった。"},

  {id:"progressive_trance", label:"Progressive\nTrance", cat:"trance", era:"1993", suno:false,
    desc:"トランスの高揚感をよりゆっくり、より壮大に展開するスタイル。一般的なトランスのような急激なドロップではなく、何分もかけてじわじわと音を重ね、気づいたら恍惚の頂点にいるような構成。テンポはBPM 128〜138とトランスの中ではやや遅め。繊細なアルペジオ、うねるベースライン、広がりのあるパッドがグラデーション的に変化していく。聴いていると時間感覚が消え、音の流れに身を委ねる深い没入感がある。DJセットの流れの中で真価を発揮する。",
    roots_story:"1993年頃、プログレッシブハウスとトランスの境界で発展。Sasha & Digweedの長時間DJセットがジャンルの美学を体現した。Airwave（ベルギー）、Cygnus X（ドイツ）が初期の代表。2000年代後半〜2010年代にはEric Prydz（Pryda名義）が最も影響力のあるプログレッシブトランス/ハウスのアーティストに。Markus Schulz、Max Graham、John Digweedらがスタイルを発展。Iboga Records（デンマーク）、Sudbeat（Hernan Cattaneo）が重要レーベル。サイトランスのプログレッシブ版（プログレッシブサイ）も関連ジャンルとして存在する。"},

  // ハードコア系
  {id:"rave", label:"Rave", cat:"hardcore", era:"1988", suno:false,
    desc:"数千人が倉庫や野原に集まり、爆音の電子音楽で朝まで踊り続ける——その体験そのものが「レイブ」。音楽的にはアシッドハウスを土台に、より速く、より激しく、よりトリッピーに発展したサウンド。ピアノのスタブ音、ブレイクビート、ホイッスルの音、「Acieeed!」という叫び声がフロアに響く。テンポはBPM 130〜145。音楽というよりも集団的な恍惚体験であり、一体感と自由の空間。汗と笑顔と低音に包まれる原始的な祝祭。",
    roots_story:"1988年、イギリスで「セカンド・サマー・オブ・ラブ」が勃発。アシッドハウスのレコードがイビサ島から持ち込まれ、ロンドン・マンチェスターで違法パーティーが急増した。Shoom（Danny Rampling主催）、Trip（Nicky Holloway）、Spectrum（Paul Oakenfold）が初期の伝説的クラブイベント。数万人規模の野外レイブが社会問題化し、イギリス政府は1994年にCriminal Justice Act（反復ビートの野外パーティーを違法化する法律）を制定。The Prodigy、Orbital、The Shamenがレイブ文化を体現するアーティストとして活躍した。"},

  {id:"hardcore_rave", label:"Hardcore Rave", cat:"hardcore", era:"1990", suno:false,
    desc:"レイブのテンポをさらに上げ、キックの歪みを増し、すべてを「もっと激しく」にした暴力的な加速進化形。テンポはBPM 160〜180以上。歪んだキックドラムが全身を叩き、シンセが金切り声を上げ、スネアが銃声のように炸裂する。速すぎて通常のダンスは不可能で、体を上下に揺さぶるか腕を振り回すのが踊り方。極端に攻撃的なのにどこか祝祭的な陽気さがあり、そのギャップが中毒性を生む。限界を超えた速さの中の快感。",
    roots_story:"1990年頃、レイブシーンの一部がより速くより激しい方向へ進化。オランダではロッテルダムのRotterdam Records、Mokum Recordsが拠点となり、ガバへ発展。イギリスではKniteforce Records周辺で「ハッピーハードコア」方向へ分岐。初期はレイブの延長線上にあったが、テンポの高速化と音の過激化で独自のジャンルとして分離。The Prodigy「Experience」(1992)はレイブとハードコアの境界を行き来する名盤。この流れからガバ、ハッピーハードコア、スピードコアなど多数のサブジャンルが枝分かれした。"},

  {id:"happy_hardcore", label:"Happy Hardcore", cat:"hardcore", era:"1991", suno:false,
    desc:"ハードコアの高速ビートに、驚くほど明るくポップな要素を組み合わせた奇妙な化学反応。ピッチを上げて子供のように可愛くなったボーカル、キラキラしたピアノのフレーズ、ユーロビート的なシンセメロディがBPM 160〜180の超高速で突っ走る。怒りも暗さもゼロ、ひたすらハッピー。頭がおかしくなりそうなほど速いのに陽気で、聴いていると笑ってしまう不思議なジャンル。砂糖に砂糖をかけたような過剰な甘さが癖になる。",
    roots_story:"1991〜92年頃、イギリスのレイブシーンからダーク/ハードな方向とは逆に、明るく楽しい方向へ進んだ一派が登場。DJ Hixxy、DJ Dougal、DJ Sy、Breezがジャンルの中心人物。Kniteforce Records、Essential Platinumが主要レーベル。ピッチアップされたボーカル（通常の曲を速く再生した結果生まれる「チープマンク」効果）が最大のトレードマーク。日本では特に人気が高く、J-Coreの直接の親となった。2000年代にはUK Hardcore、Freeform Hardcoreとして洗練されたスタイルが生まれた。"},

  {id:"gabber", label:"Gabber", cat:"hardcore", era:"1992", suno:true,
    desc:"極端に歪んだキックドラムの「バスドラム」が腹に突き刺さる、オランダ発の暴力的ダンスミュージック。テンポはBPM 160〜200以上。歪みきったキックの一発一発が凶器のように重く、その上にインダストリアルなノイズや叫び声が乗る。スキンヘッド、ナイキのエアマックス、オーストラリア製のトレーニングウェアという独特のファッションと結びつき、サッカーのフーリガン文化とも重なった。暴力的なのにフロアは妙に友好的という不思議な文化。",
    roots_story:"1992年、オランダのロッテルダムでPaul Elstak、DJ Rob、Buzz Fuzz、The Prophet（通称「Rotterdam Terror Corps」周辺）がジャンルを確立。「Gabber」はオランダ語（イディッシュ語由来）で「仲間」の意味。Thunderdomeイベントシリーズ（1992年〜）がガバの聖地となり、数万人を動員。Rotterdam Records、Mokum Recordsが主要レーベル。オランダでは一時メインストリームに浸透し、チャートヒットも生まれた。2020年代にはガバキックのリバイバルがEDM/ポップシーンでも起きている。"},

  {id:"speedcore", label:"Speedcore", cat:"hardcore", era:"1993", suno:true,
    desc:"人間が認識できる限界に挑戦するかのような超高速電子音楽。テンポはBPM 300以上、極端なものは1000BPMを超える。歪みきったキックが機関銃のように連射され、ノイズの壁が聴覚を圧倒する。メロディやハーモニーは皆無で、純粋な速度と音圧の暴力。もはや「踊る」ことは不可能で、頭を振るか立ち尽くすかのどちらか。聴覚的な極限体験であり、エクストリームスポーツに近い感覚。「速さ」そのものが目的化した音楽の極北。",
    roots_story:"1993年頃、ガバの高速化をさらに推し進めたアーティストたちが登場。Disciples of Annihilation、Noisecreator（オランダ）が初期の代表。ドイツのPlanet Core Productionsレーベルが拠点の一つに。日本のm1dy（ミディ）はスピードコアの世界的な重要人物で、独自のユーモアを交えたスタイルで知られる。さらに極端なサブジャンルとしてExtratone（BPM 1000以上）、Splittercore（BPM 600〜1000）も存在する。商業的成功とは無縁だが、極限を追求するコミュニティとして根強く続いている。"},

  {id:"breakcore", label:"Breakcore", cat:"hardcore", era:"1994", suno:true,
    desc:"ブレイクビート（ドラムのフレーズ）を細かく切り刻み、予測不能な順序で再構築した、カオスそのものの電子音楽。「ドタバタ」「ズダダダダ」と暴走するドラムが突然止まったり方向転換したりする、音のジェットコースター。テンポは高速（BPM 160〜200以上）だが一定ではなく、加速と減速を繰り返す。ジャングル、ガバ、ノイズ、クラシック、ジャズ、アニメサンプルなど何でも素材にする雑食性。混沌の中に奇妙な美しさと知性が潜む、反逆の音楽。",
    roots_story:"1994年頃、ジャングル/ドラムンベースのブレイクビーツをより過激に解体・再構築するスタイルが出現。Venetian Snares（カナダ）は7拍子のブレイクコアなど実験的な作品で批評家の絶賛を浴びた。Squarepusher、μ-Ziq（イギリス）はIDMとの境界で活動。ドイツのDigital Hardcore Recordings（Alec Empire主宰のAtari Teenage Riot）はパンク/ノイズとブレイクコアを融合。ロシアのGoreshit、日本のDJ Technorchがシーンの重要人物。Peace Off Records（フランス）、Ad Noiseam（ベルリン）が主要レーベル。"},

  {id:"hardcore_edm", label:"Hardcore EDM", cat:"hardcore", era:"2000s", suno:true,
    desc:"ハードコアの攻撃性を現代的なEDMプロダクションで磨き上げた、高品質で聴きやすいハードコア。歪んだキックとメロディアスなシンセが共存し、感動的なブレイクダウンから暴力的なドロップへ落ちる落差が快感。テンポはBPM 150〜180。旧来のハードコアの粗さを洗い落とし、フェスティバルのメインステージでも映える派手さがある。激しいけれど美しい、暴力的だけどエモーショナル。ハードコア入門に最適なスタイル。",
    roots_story:"2000年代、ハードコアシーンが成熟し、プロダクション品質が飛躍的に向上。Angerfist（オランダ）は仮面を被ったキャラクターで世界的スターに。Miss K8、Nosferatu、Tha Playahらが現代ハードコアシーンを牽引。Thunderdome、Masters of Hardcoreなどの大型イベントが継続開催。Art of Dance社がMasters of Hardcoreなどハードコア大型イベントを、Q-dance社がハードスタイル系のDefqon.1やQlimaxを世界展開。YouTube・SoundCloudの普及でシーンが国際化し、南米やアジアにもファン層が拡大した。"},

  {id:"mainstream_hardcore", label:"Mainstream\nHardcore", cat:"hardcore", era:"2000s", suno:true,
    desc:"ハードコアをよりポップでアクセスしやすくしたスタイル。キャッチーなメロディ、歌えるボーカルフック、分かりやすい曲構成で、ハードコア初心者でも即座に楽しめる。テンポはBPM 160〜175。歪んだキックは健在だが、その上に乗るメロディがポップソング並みに覚えやすい。ハードスタイルとガバの中間的なポジションで、フェスティバルでは「みんなが知ってる曲」として盛り上がりのピークを作る。ハードコア版のヒットチャート音楽。",
    roots_story:"2000年代、オランダのハードコアシーンでよりメロディアスで大衆的な方向性が確立。Evil Activities、Neophyte、Korsakovが代表。Art of Dance社がMasters of Hardcore、Dominatorなどハードコア専門の大型イベントを展開。Neophyte Records、Enzyme Recordsが主要レーベル。オランダではテレビ番組やラジオでもハードコアが流れるほど市民権を得ており、他国のシーンとは一線を画すメインストリーム化を実現した。"},

  {id:"hardstyle", label:"Hardstyle", cat:"hardcore", era:"2000", suno:true,
    desc:"「リバースベース」と呼ばれる独特のキック音が最大の個性。キックが「ドゥーン」と歪みながら跳ねるように鳴り、その一発一発に体が持ち上げられるような浮遊感がある。テンポはBPM 150前後。メロディは感動的で壮大、ブレイクダウンでは美しいピアノやストリングスが流れ、そこからリバースベースが戻る瞬間の爆発力は圧巻。ハードコアの攻撃性とトランスの感動を兼ね備えた、フェスティバルの花形ジャンル。",
    roots_story:"2000年頃、オランダでガバのテンポを少し落とし（BPM 150前後）、メロディアスな要素を加えたスタイルとして誕生。The Prophet、Dana、Showtek（初期）が先駆者。Headhunterzは「感動するハードスタイル」を確立し、ジャンルを世界に広めた最重要人物。Defqon.1、Qlimax（Q-dance主催）が世界最大級のハードスタイルフェスとなり、数万人を動員。Scantraxx、Dirty Workz、Fusionが主要レーベル。2010年代には「ロースタイル」（より暗く重いスタイル）も台頭した。"},

  {id:"j_core", label:"J-Core", cat:"hardcore", era:"2000s", suno:true,
    desc:"日本のアニメ・ゲーム文化とハッピーハードコアが融合した、世界でも独特な電子音楽。アニメソング的な可愛らしい女性ボーカル、ゲーム音楽的なチップチューン要素、キラキラしたシンセが超高速ビート（BPM 170〜200）の上で弾ける。暗さや攻撃性は皆無で、ひたすらカラフルで楽しい。アニメの変身シーンや必殺技のBGMのような高揚感がある。日本のオタク文化が生んだ、世界に輸出されたユニークなハードコア。",
    roots_story:"2000年代、日本の同人音楽シーンからハードコアテクノとアニメ/ゲーム文化を融合させたアーティストが台頭。t+pazolite、DJ Shimamura、Noizenecio、P*Light、Camellia（かめりあ）が代表格。コミックマーケット（コミケ）やM3（音系同人即売会）が作品発表の場となり、HARDCORE TANO*Cなどのレーベル/イベントがシーンを組織化した。音楽ゲーム（beatmania IIDX、SOUND VOLTEXなど）との親和性が高く、ゲームを通じて海外ファンが急増。Camelliaは海外のリズムゲーム「osu!」で絶大な人気を誇り、J-Coreの国際的認知度を飛躍的に高めた。"},

  {id:"nitzhonot", label:"Nitzhonot", cat:"hardcore", era:"1990s", suno:true,
    desc:"中東風のスケール（音階）とトランスの陶酔感が融合した、エキゾチックで独特なサウンド。アラビア風の旋律がシンセで奏でられ、4つ打ちビートの上でうねる。テンポはBPM 140〜155。西洋の電子音楽とは明らかに異なる音階が新鮮で、砂漠の夜空の下での儀式のような神秘的な空気がある。メロディはキャッチーで、一度聴いたら忘れられない独特のフックを持つ。トランスの高揚感に中東のスパイスを効かせた、唯一無二のスタイル。",
    roots_story:"1990年代、イスラエルのトランスシーンから派生。「ニツォノット」はヘブライ語で「きらめき」の意味。Ofer Di、Space Cat、Psydropが代表的アーティスト。イスラエルではゴアトランスが1990年代から非常に人気が高く、兵役を終えた若者がインドのゴアに旅行しトランス文化を持ち帰ったことが背景にある。ニツォノットはそのイスラエルのトランスシーンから生まれた、より速くてメロディアスなスタイル。HOMmega Productions、Phonokol Recordsが主要レーベル。"},

  {id:"hands_up", label:"Hands Up", cat:"hardcore", era:"2000s", suno:true,
    desc:"ユーロダンスのキャッチーさとハードコアのエネルギーを折衷した、フロア向けの高速ダンスポップ。覚えやすいシンセのメロディ、女性ボーカルの歌もの、パンチのあるキックがBPM 140〜150で疾走する。名前の通り「手を上げろ！」と煽るような直球のノリで、考える前に体が反応する分かりやすさ。ユーロトランスより速く、ハードスタイルよりポップ。クラブで最も盛り上がる瞬間を切り取ったような、純粋なパーティーミュージック。",
    roots_story:"2000年代前半、ドイツを中心にユーロダンス/ユーロトランスの流れから発展。Scooter（ドイツ）は「Maria (I Like It Loud)」等のヒットでハンズアップの代表的存在。Cascada「Everytime We Touch」(2005)は世界的大ヒットとなり、ジャンルの認知度を飛躍的に高めた。DJ Manian、ItaloBrothers、Basshunterも主要アーティスト。Zooland Records、Yawa Recordingsが拠点レーベル。日本のパラパラやユーロビートシーンとも親和性が高い。"},

  {id:"hardwave", label:"Hardwave", cat:"hardcore", era:"2010s", suno:true,
    desc:"1980年代のシンセウェーブのレトロな美学に、ハードコアの攻撃性を注入した、ダークでノスタルジックなスタイル。80年代SFのシンセサウンドがネオンのように光りながら、歪んだキックとハードなベースラインが夜の闇を切り裂く。テンポはBPM 140〜165。サイバーパンク映画のカーチェイスシーンのBGMのような、スリリングでスタイリッシュなサウンド。レトロとアグレッシブの融合が生む独特のかっこよさがある。",
    roots_story:"2010年代半ば、シンセウェーブの美学とハードコア/ハードスタイルの攻撃性を融合させたスタイルとして登場。KLOUD、Extra Terra、Stoned Level、1788-Lが代表的アーティスト。Synthwave/RetrowaveコミュニティとHardcore/Hardstyleコミュニティの交差点で生まれた比較的新しいジャンル。NewRetroWave YouTubeチャンネルなどシンセウェーブの発信プラットフォームで注目を集めた。映画「ブレードランナー」的なサイバーパンク美学とダンスフロアの攻撃性を兼ね備えた、ニッチだが成長中のジャンル。"},

  // DnB / ジャングル系
  {id:"breakbeat", label:"Breakbeat", cat:"dnb", era:"1988", suno:false,
    desc:"ドラムの「ブレイク」（間奏のドラムソロ部分）をサンプリングしてループさせた、ファンキーで跳ねるリズムが特徴。4つ打ちと違い、キックとスネアが不均等に配置されたシンコペーションのあるパターンで、人間的な「揺れ」がある。テンポはBPM 120〜140と幅広い。ヒップホップのサンプリング文化とダンスミュージックの融合点にあり、首を縦に振りたくなるグルーヴと踊れるテンポを両立させている。4つ打ちに飽きた耳に新鮮なリズム体験。",
    roots_story:"1980年代後半、ヒップホップのDJたちがファンクやソウルのレコードからドラムブレイクをサンプリングしてループさせる手法が、ダンスミュージックに応用された。「Amen Break」（The Winstons「Amen, Brother」の6秒間のドラムソロ）は最もサンプリングされたブレイクで、ジャングル・DnBの根幹となった。The Chemical Brothers、Fatboy Slim、The Prodigyが「ビッグビート」としてブレイクビーツをロックと融合させ、1990年代後半にメインストリームで大ヒット。Fatboy Slim「The Rockafeller Skank」(1998)が代表曲。"},

  {id:"jungle", label:"Jungle", cat:"dnb", era:"1992", suno:false,
    desc:"超高速で細かく刻まれたブレイクビーツが嵐のように吹き荒れ、その下で地を這うような重い低音のベースラインがゆっくりとうねる。この速いドラムと遅いベースの二層構造がジャングル最大の個性。テンポはBPM 160〜175と非常に速いが、ベースの動きはゆったりしているため、聴感上は速さと重さが同居する不思議な感覚。レゲエ/ダブのサンプル、ラスタ的なMCの語りが挟まることも。都市の夜のエネルギーを凝縮したような、荒々しく原始的な音楽。",
    roots_story:"1992年頃、ロンドンのレイブ/ハードコアシーンからブレイクビートを高速化し、レゲエ/ダブの重低音を組み合わせたスタイルが誕生。カリブ系移民コミュニティの影響が色濃く、レゲエのサウンドシステム文化とレイブが出会った結果生まれた。Goldie「Timeless」(1995)はオーケストラル・ジャングルの金字塔で、タイトル曲は約21分に及ぶ壮大な一曲。LTJ Bukem、DJ Ron、Ronisize & Reprazentが代表アーティスト。パイレーツラジオ（違法FM局）がジャングルの普及に重要な役割を果たし、Kool FM、Rinse FMが伝説的な存在。"},

  {id:"dnb", label:"Drum and Bass", cat:"dnb", era:"1994", suno:false,
    desc:"ジャングルの荒々しさを洗練させ、よりタイトで緻密にしたスタイル。BPM 170前後の高速ブレイクビーツと、ヘヴィーなベースラインの二層構造はジャングルを継承しつつ、より音響的に洗練されている。ドラムのプログラミングは極めて精密で、微妙なゴーストノートやハイハットの配置に職人技が光る。エネルギッシュでありながら知的、攻撃的でありながら美しい。夜のドライブで高速道路を飛ばしている時のスピード感と集中力が似合う音楽。",
    roots_story:"1994〜95年頃、ジャングルがより構造的で制作重視のスタイルへ進化。「ドラムンベース」という名前はGoldieやFabio & Grooveriderが推進した呼称。Andy C（Ram Records主宰）はDnBの「ゴッドファーザー」的存在で、20年以上シーンの頂点に君臨。Roni Size「New Forms」(1997)はマーキュリー賞を受賞し、DnBの芸術的評価を高めた。High Contrast、Chase & Status、Sub Focusがよりメインストリーム寄りのDnBで人気を得た。Hospital Records、RAM Records、Metalheadzが三大レーベル。"},

  {id:"liquid_dnb", label:"Liquid DnB", cat:"dnb", era:"1990s", suno:true,
    desc:"DnBの中で最も美しく聴きやすいスタイル。ジャジーなピアノ、ソウルフルなボーカルサンプル、柔らかいシンセパッドが高速ブレイクビートの上で優雅に流れる。速いテンポ（BPM 170前後）にもかかわらず、不思議と穏やかで心地よい。朝日が差し込むような温かさと、夏の夕暮れのような切なさが同居する。DnBの入門に最適で、BGMとしても成立するメロディアスさがある。リキッド（液体）の名の通り、サラサラと流れるような美しいサウンド。",
    roots_story:"1990年代後半、LTJ Bukemが自身のGood Looking Recordsから発表した作品群でリキッドDnBの方向性を確立。「Logical Progression」(1996)コンピレーションが金字塔。Calibre「Even If」はリキッドDnBの名曲として広く知られる。High Contrast（Hospital Records）は「If We Ever」などのヒットでジャンルを一般化。London Elektricity、Netsky（ベルギー）、Danny Byrdも主要アーティスト。Hospital Recordsがリキッドの総本山で、「Hospitality」イベントシリーズを世界各地で展開している。"},

  {id:"neurofunk", label:"Neurofunk", cat:"dnb", era:"1998", suno:true,
    desc:"DnBの中で最も攻撃的でテクニカルなスタイル。ベースラインが生き物のように変形し、グニョグニョ、ギャリギャリ、ブルブルと聴いたことのない音色を次々に繰り出す。複雑なベースデザインとサウンドデザインが最大の聴きどころで、「どうやってこの音を作っているのか」と考えさせられる技術的な面白さがある。テンポはBPM 170前後。暗く、冷たく、機械的。SF映画のバトルシーンのような緊迫感と攻撃性に満ちた音楽。",
    roots_story:"1998年頃、Ed Rush & Optical「Wormhole」アルバムがニューロファンクの金字塔として広く認められている。「Virus Recordings」レーベル（Ed Rush & Optical主宰）がジャンルの拠点に。Noisia（オランダの3人組）は「ベースデザインの革命家」として2000〜2010年代のニューロファンクを定義した。Mefjus、The Upbeats、Phace & Misanthropが現在の主要アーティスト。Vision Recordings（Noisia）、Blackout Music、Eatbrain Recordsが重要レーベル。プロダクション技術の高さからCM・映画・ゲームのサウンドデザインにも影響を与えている。"},

  {id:"drumstep", label:"Drumstep", cat:"dnb", era:"2010s", suno:true,
    desc:"DnBの高速ブレイクビーツ（BPM 170前後）にダブステップの極太ウォブルベースを組み合わせた、二つのジャンルのハイブリッド。DnBのスピード感とダブステップの重低音インパクトを同時に浴びるような、暴力的なまでにパワフルなサウンド。ドロップの瞬間、高速ドラムと重低音ベースが同時に襲いかかる衝撃は圧倒的。フェスティバルやライブイベントでの破壊力を追求した、エネルギーの爆発。",
    roots_story:"2010年代前半、DnBとダブステップの両シーンで活動するアーティストが自然発生的にスタイルを融合。Excision（カナダ）が最も知名度の高いドラムステップのアーティストで、「X Rated」「Existence VIP」が代表曲。KJ Sawka（ドラマー/プロデューサー）、Barely Alive、Pegboard Nerdsも重要。Monstercat、Rottun Recordingsが主要レーベル。EDMフェスティバルのベースミュージックステージで特に人気が高く、ダブステップとDnBのクロスオーバー層に支持されている。"},

  {id:"drumfunk", label:"Drumfunk", cat:"dnb", era:"2000s", suno:true,
    desc:"生ドラム（特にジャズやファンクのレコード）をサンプリングし、有機的で温かみのあるリズムパターンを構築するDnBのスタイル。打ち込みドラムの冷たさとは対照的に、人間の演奏の微妙な揺れやダイナミクスが残っており、聴いていて心地よい。ベースは控えめで、ドラムのグルーヴそのものが主役。テンポはBPM 170前後だが、有機的なリズムのおかげで体感的にはもっとリラックスした印象。ドラムの美しさに集中する、職人気質の音楽。",
    roots_story:"2000年代、Paradox（イギリス）がドラムファンクの創始者として広く認められている。ファンクやジャズのレコードから複雑なドラムパターンをサンプリングし、細かく切り刻んで再構成する手法を確立。Fanu（フィンランド）、Alaska、Mikal、Bomarr Monkも重要アーティスト。Paradoxの自主レーベルOffset Recordingsがジャンルの拠点。Reinforced Records（4hero主宰の伝説的レーベル）もドラムファンク的な作品を多数リリースした。ミニマルなアプローチが特徴で、大きなシーンを形成してはいないが、DnBファンの間で根強い支持がある。"},

  {id:"darkstep", label:"Darkstep", cat:"dnb", era:"1990s", suno:true,
    desc:"DnBの中で最も暗く、重く、攻撃的なスタイル。歪んだベースが地獄の底から唸りを上げ、インダストリアルなノイズとメタリックなパーカッションが闇を切り裂く。ブレイクビーツは激しく叩きつけられ、一切の温かみを排除した冷酷なサウンドスケープ。テンポはBPM 170〜180。ホラー映画のサウンドトラックとDnBが融合したような、恐怖と興奮が入り混じる音楽。暗闘的なクラブの奥で、闇に溶け込んで聴くべき音楽。",
    roots_story:"1990年代後半、DnBのダークサイドを追求するアーティストが現れた。Technical Itch「The Rukus」はダークステップの初期の代表曲。Current Value（ドイツ）はニューロファンクとの境界で極めて攻撃的なサウンドを展開。Dylan、Limewax、Counterstrike（南アフリカ）も主要アーティスト。Position Chrome、Obscene Recordings、PRSPCT Recordings（オランダ）が重要レーベル。クロスブリード（DnBとガバの融合）やインダストリアルDnBとも重なる領域があり、ハードコアシーンとのクロスオーバーも活発。"},

  // ダブステップ系
  {id:"dubstep", label:"Dubstep", cat:"dubstep", era:"2001", suno:true,
    desc:"ハーフテンポのリズム（BPM 140だが体感は70BPMのように遅く感じる）に、地震のような重低音ベースが乗る。「ウォブルベース」と呼ばれるLFOで変調されたベースがブルブルブルと振動し、スピーカーが壊れそうなほどの低音圧が全身を揺さぶる。スネアが裏拍（3拍目）に来る独特のリズムパターンで、ゆったりと首を振りながら聴くスタイル。ダブの空間的な残響感と、ガレージの跳ねるリズムが出会った、重くて深い音楽。",
    roots_story:"2001年頃、ロンドン南部のクロイドン周辺でUK Garageの重低音を追求する方向が独自のジャンルに発展。Skream「Midnight Request Line」(2005)、Benga、Digital Mystikzが初期の三大アーティスト。FWD>>（Forward）クラブナイトとRinse FMが初期シーンの拠点。2010年にSkrillexがアメリカで「ブロステップ」と呼ばれるより攻撃的なスタイルを爆発的にヒットさせ、ダブステップは世界的ムーブメントに。ただし元祖UKダブステップのファンからは「あれはダブステップではない」との論争も起きた。"},

  {id:"deep_dubstep", label:"Deep Dubstep", cat:"dubstep", era:"2000s", suno:true,
    desc:"ダブステップの中でも静かで深い、瞑想的なスタイル。派手なウォブルベースではなく、サブベース（超低周波のベース）がじわーっと空間を満たし、スパースなリズムとダブ的な残響が幽玄な空気を作る。テンポはBPM 140だが、音数が少ないため体感的にはもっと遅い。暗い部屋で大音量のサブウーファーから流れると、体の内側からマッサージされるような感覚。攻撃性ゼロ、深さ最大。ダブステップの本来のルーツに最も近いスタイル。",
    roots_story:"ダブステップの初期スタイルをそのまま発展させた方向。Mala（Digital Mystikz）が最重要人物で、ジャマイカのダブとの直接的な繋がりを保ち続けた。DMZ（Deep Medi Musik）レーベルがディープダブステップの総本山。Kode9 & The Spaceape（Hyperdub Records）は知的でSF的なアプローチで批評家の絶賛を受けた。Truth（ニュージーランド）、Commodo、Egoless、J:Kenzoも重要アーティスト。ブロステップの商業的成功の裏で、ディープダブステップは一貫してアンダーグラウンドで独自の美学を守り続けている。"},

  {id:"wobble_bass", label:"Wobble Bass", cat:"dubstep", era:"2000s", suno:true,
    desc:"「ワブワブワブ」と揺れるベース音が主役の、ダブステップを象徴するサウンド。LFO（低周波発振器）でベースの音色を高速で変調させることで生まれるこの独特の「うねり」は、聴いたら一発でダブステップとわかるアイコニックな音。テンポはBPM 140。ベースが生き物のようにうねり、形を変え、時にグロテスクなほど歪む。サブウーファーが物理的に空気を動かし、体中の内臓が振動する感覚は大音量でしか味わえない。低音の暴力。",
    roots_story:"ウォブルベースのサウンドが広く認知されたのは、Caspa & Rusko「Cockney Thug」(2006)やRusko「Woo Boost」(2008)の頃。Caspa、Rusko、Doctor Pがウォブルベースを前面に押し出したスタイルの先駆者。2010年以降、Skrillexが「Scary Monsters and Nice Sprites」(2010)で極端に攻撃的なウォブルベースを世界的に普及させた。「ブロステップ」と呼ばれるこのスタイルはダブステップの大衆化に貢献した一方、元祖UKダブステップの重さ・深さとは別物として議論も呼んだ。"},

  {id:"post_dubstep", label:"Post-Dubstep", cat:"dubstep", era:"2010s", suno:true,
    desc:"ダブステップの重低音と空間感覚を受け継ぎつつ、R&B、エレクトロニカ、ガレージなど多様な要素を取り入れた実験的なスタイル。ダブステップの「テンプレート」から自由になり、歌もの、繊細なテクスチャー、複雑なリズムパターンなど表現の幅が広い。テンポはBPM 130〜140。ベースは重いが暴力的ではなく、むしろ知的で内省的。夜の散歩中にイヤホンで聴くのが似合う、大人びた実験的電子音楽。",
    roots_story:"2010年前後、ダブステップの型に収まらない実験的なアーティストが台頭。James Blake「Limit to Your Love」(2010)はR&Bのボーカルとダブステップのサブベースを融合させ、ポストダブステップの代名詞に。Mount Kimbie「Crooks & Lovers」(2010)はインディーロック的な感性との融合。Burial「Untrue」(2007)はUK Garageの幽霊のような美しさで音楽史上の傑作と評される。SBTRKT、Zomby、Darkstarも重要。Hyperdub Recordsがジャンルの知的中心地。"},

  {id:"future_bass", label:"Future Bass", cat:"dubstep", era:"2012", suno:true,
    desc:"ダブステップの重低音をキラキラした明るさで包み込んだ、感情的でカラフルな電子音楽。「シュワシュワ」と揺れるキラキラしたシンセコード、ピッチベンドするベース、感傷的なボーカルチョップ（歌声を細かく刻んだサンプル）が特徴。テンポはBPM 140前後。ダブステップの暗さやアグレッシブさとは対極的で、夕日を見ながら感動して泣くような甘くてエモーショナルな雰囲気。SNSのショート動画のBGMとしても大人気の、現代のネット世代の感性に合った音楽。",
    roots_story:"2012年頃、ポストダブステップの流れの中でより明るく感情的な方向が確立。Flume（オーストラリア）がセルフタイトルアルバム(2012)でフューチャーベースの方向性を定義した最重要人物。Marshmello「Alone」(2016)はYouTubeで10億回再生を超え、ジャンルを完全にメインストリーム化。San Holo、Louis The Child、Slushii、Illeniumも主要アーティスト。Trap Nationなど大型YouTubeチャンネルが普及に大きく貢献。Monstercat、Moving Castleが主要レーベル。"},

  // ユーロダンス系
  {id:"hi_nrg", label:"Hi-NRG", cat:"eurodance", era:"1977", suno:true,
    desc:"ディスコの4つ打ちビートをさらに速く、さらにエネルギッシュにしたダンスミュージック。テンポはBPM 130〜140とディスコより速く、シンセサイザーのシーケンスが機関銃のように駆け抜ける。ディスコのゴージャスなオーケストレーションを電子音に置き換え、より直線的でアグレッシブなグルーヴを追求。ゲイクラブカルチャーと強く結びつき、派手で開放的なエネルギーに満ちている。全力で踊りたい夜のためのハイオクタン燃料。",
    roots_story:"1977年頃、ディスコの一部がより速くエネルギッシュな方向へ進化。Patrick Cowley（サンフランシスコ）がシンセサイザーを駆使したハイエナジーなディスコでジャンルを確立。Sylvester「You Make Me Feel (Mighty Real)」(1978)が大ヒット。CowleyはSylvesterの後の楽曲「Do You Wanna Funk」(1982)等をプロデュースした。Bobby Orlando（Bobby O）はニューヨークからシンセ主体のHi-NRGを量産し、Pet Shop BoysやDivine（映画監督ジョン・ウォーターズのミューズ）を手がけた。ゲイクラブの定番としてサンフランシスコ、ニューヨーク、ロンドンで栄え、ユーロビート・ユーロダンスの直接の先祖となった。"},

  {id:"italo_disco", label:"Italo Disco", cat:"eurodance", era:"1977", suno:true,
    desc:"シンセサイザーとドラムマシンで作られた、きらびやかでロマンチックなイタリア発のディスコ。安っぽいけれど魅力的なシンセの音色、甘いメロディ、英語（イタリア人が歌う独特のアクセント付き）のボーカルが特徴。テンポはBPM 115〜130。アメリカのディスコより軽やかで、どこかチープだけど愛おしい手作り感がある。夏の地中海の空気、80年代のネオンライト、恋の予感——そんなイメージがそのまま音になった、甘酸っぱいダンスミュージック。",
    roots_story:"1977年頃、イタリアのプロデューサーたちがアメリカのディスコを独自に解釈し、シンセサイザーとドラムマシンを全面的に使用したスタイルを生み出した。Giorgio Moroderはミュンヘンで活動したイタリア人だが、Donna Summer「I Feel Love」(1977)でシンセディスコの礎を築いた。ZYX Records（ドイツ）が「Italo Disco」という名前でコンピレーションを出し、ジャンル名が定着。Gazebo「I Like Chopin」(1983)、Den Harrow、Sabrinaが代表格。日本ではスーパーユーロビートシリーズの源流となり、パラパラ文化に直結した。"},

  {id:"eurodance", label:"Eurodance", cat:"eurodance", era:"1989", suno:true,
    desc:"女性ボーカルの歌パートと男性のラップパートが交互に来るという独特の構成が最大の個性。シンセのキャッチーなリフ、4つ打ちのビート、派手なプロダクションがBPM 130〜150で疾走する。テンポが速く、メロディが覚えやすく、一緒に歌える。90年代のクラブを席巻した「みんなが踊れるポップ」で、考える前に体が動く分かりやすさがある。バブル時代のジュリアナ東京的な華やかさと高揚感に満ちた、90年代欧州の象徴的サウンド。",
    roots_story:"1989年頃、Hi-NRG、イタロディスコ、シンセポップの流れが合流してヨーロッパ全土で爆発的ブームに。2 Unlimited「No Limit」(1993)、Snap!「Rhythm Is a Dancer」(1992)、Haddaway「What Is Love」(1993)が世界的大ヒット。La Bouche、Corona、Ace of Baseはこの後も続々とヒットを放った。Maxx、Captain Jack、DJ BoBo（スイス）も人気。日本ではジュリアナ東京（1991〜94年）でユーロダンスが大流行し、ボディコン＋扇子というスタイルが社会現象に。90年代半ばにブームは去ったが、2020年代のTikTokで「What Is Love」等が再評価されている。"},

  {id:"eurobeat", label:"Eurobeat", cat:"eurodance", era:"1990s", suno:true,
    desc:"イタロディスコをさらに速く、さらにシンセを派手にした超高速ダンスミュージック。テンポはBPM 150〜165と非常に速く、キラキラしたシンセのリフが猛スピードで駆け抜ける。ハイトーンのボーカル、ド派手なシンセソロ、シンプルだが中毒性のあるメロディが特徴。聴いていると自然とアクセルを踏み込みたくなる「ドライブミュージック」の王。アニメ「頭文字D」との結びつきで世界的に知られ、峠を攻めるイメージと不可分のジャンル。",
    roots_story:"イタロディスコが1990年代に日本市場向けに高速化・派手化して「ユーロビート」となった。avex trax「Super Eurobeat」シリーズ（1990年〜）は200巻以上リリースされた世界最長寿のコンピレーション。Dave Rodgers「Deja Vu」、Mega NRG Man「Running in the 90's」はアニメ「頭文字D」（1998年〜）に使用され、世界的な知名度を得た。A-Beat C Records、Delta、SCP（イタリア）が制作の中心で、イタリア人プロデューサーが日本市場向けに曲を量産するという独特の構造。日本のパラパラダンスとも密接。"},

  {id:"j_eurobeat", label:"J-Eurobeat", cat:"eurodance", era:"1990s", suno:true,
    desc:"日本人アーティストが歌う日本語のユーロビート。イタリア製ユーロビートのサウンドフォーマットを踏襲しつつ、J-POP的なメロディセンスと日本語の歌詞が乗る。テンポはBPM 150〜160。哀愁のある日本語の歌詞とキラキラしたシンセの組み合わせは独特の切なさがあり、本家とはまた違った味わい。パラパラダンスのイベントやカラオケで特に人気があり、日本独自のダンスミュージック文化を体現するスタイル。",
    roots_story:"1990年代後半、日本でユーロビートブームが最高潮に達する中、日本人アーティストによるユーロビート制作が本格化。芸能人やアイドルがユーロビートをリリースすることもあった。avex traxは「Super Eurobeat」の日本人アーティスト版も展開。安室奈美恵「TRY ME 〜私を信じて〜」(1995)のカバーなど、J-POPとユーロビートの境界は曖昧だった。小室哲哉プロデュース楽曲（TRF、globeなど）もユーロビートの影響を強く受けており、90年代J-POPのダンス路線はJ-ユーロビートの延長線上にあると言える。"},

  {id:"parapara_eurobeat", label:"Parapara\nEurobeat", cat:"eurodance", era:"1999", suno:true,
    desc:"ユーロビートに合わせて踊る「パラパラ」ダンス専用のスタイル。音楽的にはユーロビートそのものだが、振り付けとセットで完成する「踊るための音楽」としての性格が極めて強い。BPM 150前後。決まった手の動き（ハンドモーション）を曲に合わせて全員が同じ振り付けで踊る一体感が最大の魅力。覚えて踊れるようになった時の達成感、フロアで全員の動きが揃った時の高揚感は独特。見ても踊っても楽しい、日本発の参加型ダンスミュージック文化。",
    roots_story:"1999年前後、日本のディスコ/クラブシーンでパラパラダンスのブームが社会現象化。Eurogroove「Night Fever」のパラパラバージョンがヒットし、ヴェルファーレ（東京・六本木のメガクラブ）がパラパラの聖地に。「パラパラ・パラダイス」などのインストラクションビデオがヒット商品となった。Morning娘。「LOVEマシーン」(1999)のダンスもパラパラの影響を受けている。2000年代初頭にはSEB（Super Eurobeat）パラパラがアーケードゲーム化。海外でもanime convention（アニメコンベンション）でパラパラが踊られ、日本のダンス文化として国際的に認知されている。"},

  // EDM系
  {id:"edm", label:"EDM", cat:"edm", era:"2010s", suno:false,
    desc:"Electronic Dance Musicの略称で、2010年代に世界的なブームとなった商業的電子ダンスミュージックの総称。「ビルドアップ→ドロップ」という構成が基本で、DJが両手を上げて煽り、ドロップの瞬間にフロアが爆発する体験を最大化するよう設計されている。テンポはサブジャンルにより様々（BPM 100〜150）。とにかく分かりやすく、派手で、一発でテンションが上がる即効性が命。音楽というよりも体験やイベントの総称に近い面もある。",
    roots_story:"EDMという用語自体は1990年代から存在したが、2010年代にアメリカでメインストリーム化した。David Guetta「When Love Takes Over」(2009)、Skrillex、Deadmau5、Swedish House Mafia「Don't You Worry Child」(2012)がブームの牽引役。Ultra Music Festival（マイアミ）、Electric Daisy Carnival（ラスベガス）、Tomorrowland（ベルギー）が数十万人を動員する巨大フェスに成長。Calvin Harris、The Chainsmokers、Marshmelloがポップチャートを席巻。2015年頃をピークにバブルは沈静化したが、電子音楽がメインストリームに定着するきっかけとなった。"},

  {id:"festival_edm", label:"Festival EDM", cat:"edm", era:"2010s", suno:true,
    desc:"巨大フェスティバルのメインステージで最大の効果を発揮するよう設計された、極限まで「盛り上がり」に特化したEDM。壮大なシンセのビルドアップ、MCの煽り、そして爆発的なドロップ——この一連の流れを繰り返し、数万人の群衆を同時にジャンプさせる。テンポはBPM 126〜130が主流。花火、CO2噴射、レーザー照明とセットで体験するもの。音楽の良し悪しよりも「その場にいる体験」が最大の価値。集団的な多幸感を生み出す装置としての音楽。",
    roots_story:"2010年代前半、EDMフェスティバルの巨大化とともに確立。Swedish House Mafia「Save The World」(2011)がフェスティバルEDMの完成形とも言える曲。Hardwell、Martin Garrix、Dimitri Vegas & Like Mike、Steve Aokiがジャンルの中心人物。DJ Magのトップ100 DJランキングがDJ間の競争を煽り、「フェスで最も盛り上がるDJ」が最高の評価を受ける文化が形成された。Spinnin' Records、Revealed Recordings、STMPD RCRDSが主要レーベル。"},

  {id:"melodic_edm", label:"Melodic EDM", cat:"edm", era:"2010s", suno:true,
    desc:"EDMの派手さと感動的なメロディを融合させた、聴いて泣けるダンスミュージック。ピアノやストリングスの美しいメロディ、感傷的なボーカル、壮大なコード進行が、ビルドアップからドロップへの展開で感情を最大限に増幅させる。テンポはBPM 126〜130。フェスのハイライトでこの手の曲がかかると、数万人が一斉に手を上げて涙する光景が生まれる。感動を科学的に設計したような、エモーショナルの極致。",
    roots_story:"2010年代、EDMに「泣き」の要素を持ち込んだアーティストが人気を博した。Avicii「Levels」(2011)、「Wake Me Up」(2013)が世界的大ヒットとなり、メロディックEDMの代名詞に。彼の2018年の急逝はシーンに大きな衝撃を与えた。Kygo「Firestone」(2014)はトロピカルハウスとメロディックEDMの交差点。Illenium、Seven Lions、Said The Skyは「メロディック・ベースミュージック」として感情的なダブステップと融合。Ophelia Records（Seven Lions主宰）が重要レーベル。"},

  {id:"dark_edm", label:"Dark EDM", cat:"edm", era:"2010s", suno:true,
    desc:"EDMの構成力にダークで不穏な雰囲気を注入したスタイル。明るいEDMの「ハッピーなドロップ」の代わりに、暗く歪んだベース、不気味なシンセ、ホラー的なサンプルがドロップで襲いかかる。テンポはBPM 128〜150。ビルドアップで不安を煽り、ドロップで恐怖と快感が同時に来る独特の体験。ハロウィンイベントやダークなテーマのフェスで真価を発揮する。闇落ちしたEDM、悪役のテーマソングのようなサウンド。",
    roots_story:"2010年代半ば、EDMの明るさに飽きたリスナー層に向けてダークな方向が発展。Rezz（カナダ）が「ヒプノティック・ベース」と呼ばれる催眠的でダークなスタイルで人気を獲得し、ジャンルの代表格に。1788-L、Svdden Death、Marauda、He$h、GRAVESもダークEDMの主要アーティスト。Liquid Stranger、SullivenはよりEDMとダブステップの境界で活動。ハロウィン期間のEDMフェスでは特に需要が高い。"},

  {id:"heavy_edm", label:"Heavy EDM", cat:"edm", era:"2010s", suno:true,
    desc:"ドロップの重量感を極限まで追求したEDM。ビルドアップでテンションを上げた後に落ちるドロップで、極太のベースと歪んだシンセが文字通り床を揺らす破壊力を見せる。テンポはBPM 128〜150。メタルのヘッドバンギングとEDMのドロップを融合させたような、フィジカルな衝撃を重視するスタイル。モッシュピット（激しく体をぶつけ合う行為）がEDMフェスで発生するのはこのジャンルの影響。暴力的に重い、体当たりの音楽。",
    roots_story:"Excision（カナダ）が「ベースミュージックの帝王」としてヘビーEDMを代表。自身のLost Lands Festival（2017年〜）は世界最大級のベースミュージックフェスに成長。Skrillex「Bangarang」(2011)がヘビーなベースドロップをメインストリームに浸透させた先駆け。Virtual Riot、Subtronics、Wooli、Kayzo（ハードスタイルとの融合）も重要。Subsidia Records（Excision主宰）、Disciple Records、Never Say Dieが主要レーベル。"},

  {id:"pop_edm", label:"Pop EDM", cat:"edm", era:"2010s", suno:true,
    desc:"ポップソングのキャッチーさとEDMのビート・プロダクションを完全に融合させた、チャートヒット狙いのダンスポップ。歌えるメロディ、親しみやすいボーカル、適度なビルドアップとドロップが、ラジオでもクラブでもフェスでも通用する万能型サウンドを形成。テンポはBPM 120〜130。EDMの専門知識がなくても楽しめ、メロディを口ずさみたくなる大衆性が最大の武器。世界で最も売れる音楽フォーマットの一つ。",
    roots_story:"David Guetta ft. Sia「Titanium」(2011)がポップEDMの完成形として世界的大ヒット。Calvin Harrisは「Summer」(2014)、Rihanna「We Found Love」(2011)等でポップとEDMの境界を消し去った。Zedd ft. Foxes「Clarity」(2012)はグラミー賞を受賞。The Chainsmokers「Closer」(2016)はBillboardホット100で12週連続1位。Marshmello、Kygo、Martin Garrixもポップ寄りの楽曲で巨大なヒットを連発。現在のポップミュージックのプロダクションにEDM的要素は完全に浸透している。"},

  {id:"edm_trap", label:"EDM Trap", cat:"edm", era:"2012", suno:true,
    desc:"ヒップホップのトラップのリズムパターン（キレのある三連符ハイハット、重い808ベース）にEDMのシンセと派手なプロダクションを組み合わせたスタイル。テンポはBPM 140前後だがハーフタイム感覚で、ゆったり首を振りながらドロップでは拳を突き上げる。ヒップホップの黒いグルーヴとEDMの白いシンセが共存する、クロスオーバーサウンド。「トゥルルルル」という三連ハイハットのロールが聴こえたらこのジャンル。",
    roots_story:"2012年頃、Baauer「Harlem Shake」がYouTubeのミーム（模倣動画）として爆発的に拡散し、EDMトラップを世界中に認知させた。RL Grime「Core」(2014)はジャンルの代表曲。Flosstradamus、TNGHT（Hudson Mohawke & Lunice）が初期の主要アーティスト。Diplo（Mad Decent）はトラップとワールドミュージックを融合させた独自の路線を開拓。Yellow Claw（オランダ）はヨーロッパからEDMトラップを発信。Mad Decent、OWSLA（Skrillex主宰）が重要レーベル。ヒップホップとEDMの両方のファン層にリーチできることが強み。"},

  // シンセウェーブ系
  {id:"synthwave", label:"Synthwave", cat:"synthwave", era:"2000s", suno:false,
    desc:"1980年代への郷愁を現代の技術で再現した、ノスタルジックな電子音楽。80年代のSF映画やカーチェイスシーンを連想させるシンセサイザーの音色、ゲートリバーブのかかったドラム、ネオンに照らされた夜の高速道路のイメージ。テンポはBPM 80〜120の中速。存在しなかった80年代の記憶——レトロフューチャーの世界——を音で構築する。サイバーパンクのビジュアルと相性が抜群で、紫とピンクの色彩が脳内に浮かぶ。実際の80年代より80年代っぽい音楽。",
    roots_story:"2000年代半ば、フランスのCollege「A Real Hero」やKavinsky「Nightcall」がスタイルの先駆けに。映画「Drive」(2011)のサウンドトラックにKavinskyが起用されたことでジャンルが一気に知名度を得た。Perturbator、Carpenter Brut（フランス）はよりダークで攻撃的なスタイルを開拓。Com Truise（アメリカ）はチルでメランコリックな方向。YouTube/BandcampがJアンルの普及に決定的な役割を果たし、NewRetroWaveチャンネルが数百万登録者を獲得。Blood Musicレーベル（フィンランド）が主要拠点。"},

  {id:"retrowave", label:"Retrowave", cat:"synthwave", era:"2000s", suno:false,
    desc:"シンセウェーブとほぼ同義で、80年代のポップカルチャー（映画、テレビ、ゲーム）の美学を現代に蘇らせたスタイル。よりポップでアクセスしやすい傾向があり、80年代風のボーカル曲も多い。テンポはBPM 100〜120。シンセウェーブが映画「ブレードランナー」的なSF感を重視するのに対し、レトロウェーブは映画「バック・トゥ・ザ・フューチャー」的な明るい80年代ノスタルジーに寄っている。聴いていると80年代のアメリカの郊外をスケボーで走っている気分になる。",
    roots_story:"シンセウェーブという名前とレトロウェーブという名前はほぼ同時期に並行して使われ始めた。レトロウェーブはよりポップ・アクセシブルなスタイルを指す傾向がある。The Midnight「Days of Thunder」(2014)、FM-84「Running in the Night」(2016)はレトロウェーブの代表曲で、80年代風のボーカルポップとシンセが融合。Timecop1983、Gunship、The Bad Dreamsも主要アーティスト。NewRetroWaveとSynthetix（SoundCloudコミュニティ）がジャンルの発信拠点。Spotifyの「Synthwave/Retrowave」プレイリストが数百万フォロワーを獲得し、リスナー層を拡大させた。"},

  {id:"vaporwave", label:"Vaporwave", cat:"synthwave", era:"2010", suno:false,
    desc:"80〜90年代のエレベーターミュージック、ショッピングモールのBGM、企業CM曲などを極端にスローダウンし、リバーブをかけ、切り刻んで再構築したインターネット発の音楽。聴いていると、誰もいないショッピングモールを深夜に歩いているような不思議な郷愁と不気味さを感じる。テンポは極端に遅く（BPM 60〜90）、時間が歪んだような浮遊感がある。消費社会への皮肉なのか、純粋なノスタルジーなのか——そのあいまいさ自体がこのジャンルの魅力。ギリシャ彫刻とウィンドウズ95の美学。",
    roots_story:"2010年、Macintosh Plus（Vektroid）の「フローラルの専門店」がTumblrで拡散し、ヴェイパーウェーブを一気に認知させた。日本語のカタカナ表記、90年代のWindowsの画面、ギリシャ彫刻、ヤシの木——これらのビジュアルがアイコニックなジャンルの美学として定着。SAINT PEPSI「Hit Vibes」(2013)はヴェイパーウェーブの代表作で、80年代ファンクをサンプリングで再構築した「フューチャーファンク」というサブジャンルも生んだ。blank banshee「0」はトラップとヴェイパーウェーブを融合。音楽ジャンルであると同時にインターネット・アートムーブメントとしての側面が強い。"},

  {id:"darksynth", label:"Darksynth", cat:"synthwave", era:"2010s", suno:false,
    desc:"シンセウェーブのレトロな美学をダークでアグレッシブな方向に振り切ったスタイル。80年代ホラー映画やスラッシャー映画のサウンドトラックを連想させる不穏なシンセ、ヘビーメタル的な歪んだギター、インダストリアルな打撃音が融合する。テンポはBPM 100〜140と幅広い。ネオンの光が血の色に変わったような——シンセウェーブのノスタルジーが殺意を帯びたサウンド。ゲーム「DOOM」のサウンドトラック的な、戦闘モードの電子音楽。",
    roots_story:"2010年代前半、シンセウェーブの中でもメタルやインダストリアルの影響を取り入れたアーティストが台頭。Perturbator「Dangerous Days」(2014)がダークシンスの金字塔。Carpenter Brut「Trilogy」(2015)はライブでのエネルギッシュなパフォーマンスでも知られる。Dan Terminus、GosT、Mega Drive、Dance With The Deadも主要アーティスト。ゲーム「Hotline Miami」(2012)のサウンドトラックがダークシンス/シンセウェーブの知名度を飛躍的に高めた。Blood Music、Synthwave Lives Hereが主要レーベル/コミュニティ。"},

  {id:"sovietwave", label:"Sovietwave", cat:"synthwave", era:"2010s", suno:true,
    desc:"旧ソ連の美学——コンクリートの団地、宇宙開発のプロパガンダ、雪に覆われた広大な平原——をシンセウェーブのサウンドで表現した、極めてニッチで独特なジャンル。メランコリックなシンセメロディ、冷たいパッド、時折挿入されるロシア語のサンプルが、冷戦時代への奇妙な郷愁を生む。テンポはゆったり（BPM 80〜110）。ソ連に住んだことがなくても感じる「存在しない記憶への郷愁」——まさにレトロフューチャーのロシア版。寒くて暗くて美しい。",
    roots_story:"2010年代半ば、主にロシア・旧ソ連圏のアーティストがシンセウェーブにソ連の美学を取り入れた。Utro（ロシア語で「朝」）、Molchat Doma（厳密にはポストパンクだがソビエト美学で知られる）、Electroforezなどが関連アーティスト。YouTubeで「sovietwave mix」として人気を集め、コメント欄には旧ソ連圏出身者の郷愁のコメントと、ソ連を知らない世代の「なぜかノスタルジーを感じる」というコメントが並ぶ。ヴェイパーウェーブの「存在しなかった過去へのノスタルジー」というコンセプトのロシア的解釈とも言える。政治的なメッセージはほぼなく、純粋に美学的なジャンル。"},

  // ヒップホップ系
  {id:"lofi_hiphop", label:"Lo-fi Hip Hop", cat:"hiphop", era:"1990s", suno:true,
    desc:"意図的に音質を落とした（ローファイ=低忠実度）、チルで温かみのあるヒップホップビート。レコードのプチプチノイズ、ジャズピアノのサンプル、ゆるいドラムパターンが、カフェや自室でまったりする時間を演出する。テンポはBPM 70〜90とゆったり。ボーカルはないか控えめで、勉強や作業のBGMとして完璧にフィットする。不完全さが心地よく、磨きすぎない手触りが安心感を与える。YouTubeの「lofi hip hop radio - beats to relax/study to」で世界的に定着した、現代のBGM文化の代表。",
    roots_story:"1990年代、J Dilla（デトロイト）が独特のヨレたビート（「ドランクビート」と呼ばれる意図的にずらしたリズム）とソウル/ジャズのサンプリングで、ローファイヒップホップの原型を作った。Nujabes（瀬葉淳、日本）は「Metaphorical Music」(2003)等でジャズとヒップホップを優雅に融合させ、アニメ「サムライチャンプルー」(2004)の音楽で国際的に知られた。2017年、ChilledCow（現Lofi Girl）のYouTubeチャンネルが「勉強用BGM」として24時間ライブ配信を開始し、数千万再生を記録。ローファイヒップホップはインターネット時代の「環境音楽」として定着した。"},

  {id:"miami_bass", label:"Miami Bass", cat:"hiphop", era:"1985", suno:true,
    desc:"Roland TR-808ドラムマシンの超低音キックとベースが文字通り車を揺らすほどの重低音で鳴り響く、フロリダ発のヒップホップ。カーオーディオの巨大なサブウーファーで鳴らすことを前提に設計されており、低音が腹に響くというよりも体が浮くような感覚。テンポはBPM 120〜140と速め。歌詞はパーティー、セクシュアリティ、車をテーマにしたものが多い。フロリダの太陽と夜のクラブが交差する、低音で支配するバウンスミュージック。",
    roots_story:"1985年頃、マイアミの2 Live Crew「2 Live Crew Is What We Are」(1986)がジャンルを確立。Afrika Bambaataa「Planet Rock」のエレクトロサウンドとサザンヒップホップが融合した形。Uncle Al、DJ Magic Mikeが初期の重要アーティスト。2 Live Crewの露骨な歌詞は検閲裁判に発展し（1990年、フロリダ州で「わいせつ」と判定されたが後に覆された）、言論の自由の議論に。808ベースを極端に強調するスタイルはクランク、トラップの直接の先祖であり、現代のベースミュージック全体に影響を与えた。"},

  {id:"baile_funk", label:"Baile Funk", cat:"hiphop", era:"1980s", suno:true,
    desc:"ブラジルのファヴェーラ（スラム街）から生まれた、生々しいエネルギーに満ちたダンスミュージック。マイアミベースの808ベースとボーカルチャント、ブラジル独自のパーカッションリズム（バトゥカーダ）が融合し、体が勝手に腰を振り始めるグルーヴを生む。テンポはBPM 130前後。セクシーで挑発的、ストリートの生活感がむき出し。リオデジャネイロの暑い夜、密集した路地裏で爆音で踊る人々のエネルギーがそのまま音になった音楽。",
    roots_story:"1980年代後半、リオデジャネイロのファヴェーラで開催されるダンスパーティー「バイリ・ファンキ」で、DJたちがマイアミベースのレコードをプレイしたのが起源。DJ Marlboro「DJ Marlboro Apresenta Funk Brasil」(1989)がジャンルの最初のコンピレーション。MC Naldinho、Claudinho & Buchechêが1990年代に人気を博した。2000年代にはDJ Diplo（アメリカ）がドキュメンタリー「Favela on Blast」(2008)で世界に紹介。M.I.A.「Paper Planes」にも影響。現在ではAnitta、MC Kevinho、Pedro Sampaioらがブラジルのポップチャートを席巻するメインストリーム音楽に成長。"},

  {id:"trap", label:"Trap", cat:"hiphop", era:"2000s", suno:false,
    desc:"アメリカ南部のストリートから生まれた、重くダークなヒップホップ。Roland TR-808の「ブーン」と沈む超低音キックとベース、機関銃のように連射される三連符のハイハット（「トゥルルルル」）、暗い雰囲気のシンセパッドが基本構成。テンポはBPM 130〜170だがハーフタイムで体を揺らすため、体感的にはゆったり。歌詞はストリートライフ、ドラッグ、成功と挫折をテーマにしたものが多い。2010年代以降のヒップホップの主流サウンドとなり、ポップスにも多大な影響を与えた。",
    roots_story:"「トラップ」はアメリカ南部のスラングでドラッグの取引所を意味する。T.I.「Trap Muzik」(2003)がジャンル名の由来。Young Jeezy「Let's Get It: Thug Motivation 101」(2005)、Gucci Mane「Trap House」(2005)がアトランタのトラップシーンを確立。プロデューサーLex Luger、Zaytoven、Mike WiLL Made-Itが独特のサウンドを定義した。2010年代にFuture、Migos「Bad and Boujee」(2016)、Travis Scott「Astroworld」(2018)がメインストリームを制覇。808ベースと三連ハイハットのパターンは現在のポップミュージック全般に浸透している。"},

  // チップチューン
  {id:"chiptune", label:"Chiptune", cat:"chiptune", era:"1980s", suno:true,
    desc:"ファミコンやゲームボーイのサウンドチップが奏でる「ピコピコ」した電子音で作られた音楽。矩形波・三角波・ノイズという極めて限られた音色だけで驚くほど豊かなメロディとリズムを生み出す。レトロゲームを遊んだ世代にはノスタルジー、知らない世代には新鮮な「デジタルの温かみ」がある。テンポは楽曲による。制約の中の創造性が最大の魅力で、少ない音数だからこそメロディの良し悪しがごまかせない。8ビットの世界に宿る無限の表現力。",
    roots_story:"1980年代、ファミコン（NES）、ゲームボーイ、Commodore 64などのゲーム機やホームコンピュータに搭載された音源チップ（PSG、SID等）で音楽を作る文化が発生。初期は「デモシーン」と呼ばれるプログラマーのサブカルチャーで、コンピュータの限界に挑戦するデモ作品の音楽として発展。Commodore 64のSIDチップは特に音楽的な表現力が高く、Rob Hubbard、Martin Galway、Ben Daglishらのゲーム音楽が伝説に。2000年代にはゲームボーイにLSDjソフトを入れて作曲するスタイルが流行し、Anamanaguchi、Sabrepulse、Bit Shifterらがライブパフォーマンスで人気を得た。日本のゲーム音楽作曲家（近藤浩治、植松伸夫ら）もチップチューンの重要な源流。"},

  // シンセウェーブ系

  {s:"synthwave",  t:"sovietwave",      w:50, desc:"旧ソ連美学との融合"},

  // チップチューン
